goal: >
  Implement tickets from .sdd/backlog/open/ by priority (p0 first, then p1, p2).
  Read each ticket file for requirements. Implement, write tests, run
  uv run ruff check src/ and uv run pytest tests/unit/RELEVANT_FILE.py -x -q.
  Commit each completed task. Do NOT invent new tickets or create tasks
  beyond what is in the backlog files.

cli: auto  # auto-detect: claude + qwen

max_agents: 6  # 3 Claude Code + 3 Qwen (free tier)

# Route tasks to two agents: Claude Code (primary) + Qwen (secondary, free).
# Claude handles complex tasks (manager, architect, security, backend).
# Qwen handles simpler tasks (qa, docs, frontend) — qwen3.6-plus is free.
routing:
  manager: claude-opus         # planning — strongest reasoning
  architect: claude-opus       # design decisions
  security: claude-opus        # deep analysis
  backend: claude-sonnet       # bulk implementation
  frontend: qwen               # UI work (qwen3.6-plus, free)
  qa: qwen                     # test writing (qwen3.6-plus, free)
  reviewer: qwen               # cross-model review (different model catches different bugs)
  docs: qwen                   # documentation (free)

# Runtime-enforced provider/model pins.
role_model_policy:
  manager:
    model: opus
    effort: max
  architect:
    model: opus
    effort: max
  security:
    model: opus
    effort: max
  backend:
    model: sonnet
    effort: high
  frontend:
    model: sonnet
    effort: high
  qa:
    model: sonnet
    effort: high
  reviewer:
    model: sonnet
    effort: high
  docs:
    model: sonnet
    effort: high

# Fallback: if Qwen fails, retry on Claude Code
fallback:
  enabled: true
  target: claude-sonnet        # fallback agent
  log: true                    # log fallback events to .sdd/metrics/fallbacks.jsonl

budget: "$0"  # no cap — run until rate limits, then wait and resume

constraints:
  - "Python 3.12+, strict typing (Pyright strict), Ruff linting"
  - "File-based state in .sdd/ only — no databases"
  - "Short-lived agents only — no long-running sessions"
  - "Run tests: uv run python scripts/run_tests.py -x (NOT pytest tests/ directly)"
  - "Do NOT modify files outside your task scope"
  - "Commit with descriptive messages after completing each task"
  - "Move completed tickets to .sdd/backlog/closed/"
  - "Default branch is main — never push to master"

quality_gates:
  enabled: true
  lint: true
  lint_command: "ruff check ."
  type_check: false        # slow; enable if you want pyright gate
  tests: false             # enable if you want tests to run as a merge gate

context_files:
  - docs/DESIGN.md
  - CLAUDE.md
  - docs/the-bernstein-way.md

agency:
  path: /Users/sasha/IdeaProjects/cloned/agency-agents
