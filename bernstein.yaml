goal: >
  Continue developing Bernstein: read .sdd/backlog/open/ for prioritized tickets,
  pick the highest-priority ones (333-336 first, then 337+), implement them,
  run tests, commit, and move completed tickets to .sdd/backlog/closed/.
  Focus on agent reliability, cost tracking, and quality gates.

cli: auto  # use all detected agents: claude, codex, gemini

max_agents: 6

# Route tasks to the best agent per role.
# Claude gets 80%+ of work ($200 Max plan = best limits + models).
# Codex/Gemini for cross-review and cheap tasks.
routing:
  manager: claude-opus         # planning — strongest reasoning (80.8% SWE-bench)
  architect: claude-opus       # design decisions
  security: claude-opus        # deep analysis
  backend: claude-sonnet       # bulk implementation (79.6% SWE-bench, unlimited on Max)
  frontend: claude-sonnet      # UI work
  qa: claude-sonnet            # test writing
  reviewer: codex-gpt-5.4     # cross-model review (different model catches different bugs)
  docs: gemini-flash           # documentation (free tier, fast)

# Fallback: if non-Claude agent fails, retry on Claude Code
fallback:
  enabled: true
  target: claude-sonnet        # fallback agent
  log: true                    # log fallback events to .sdd/metrics/fallbacks.jsonl

budget: "$0"  # no cap — run until rate limits, then wait and resume

constraints:
  - "Python 3.12+, strict typing (Pyright strict), Ruff linting"
  - "File-based state in .sdd/ only — no databases"
  - "Short-lived agents only — no long-running sessions"
  - "Run tests: uv run python scripts/run_tests.py -x (NOT pytest tests/ directly)"
  - "Do NOT modify files outside your task scope"
  - "Commit with descriptive messages after completing each task"
  - "Move completed tickets to .sdd/backlog/closed/"
  - "Default branch is main — never push to master"

quality_gates:
  enabled: true
  lint: true
  lint_command: "ruff check ."
  type_check: false        # slow; enable if you want pyright gate
  tests: false             # enable if you want tests to run as a merge gate

context_files:
  - docs/DESIGN.md
  - CLAUDE.md
  - docs/the-bernstein-way.md

agency:
  path: /Users/sasha/IdeaProjects/cloned/agency-agents
