# Bernstein CI template for GitLab
#
# Add this to your project root as ``.gitlab-ci.yml``.
# Provides lint, type-check, unit tests, and a self-healing
# integration with the Bernstein orchestrator.

stages:
  - quality
  - test
  - Bernstein

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  BERNSTEIN_SERVER_URL: "http://127.0.0.1:8052"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .cache/pip
    - .venv/

# ---------------------------------------------------------------------------
# Quality gates
# ---------------------------------------------------------------------------

ruff check:
  stage: quality
  image: python:3.12-slim
  script:
    - pip install --quiet ruff
    - ruff check src/
  rules:
    - when: always

ruff format:
  stage: quality
  image: python:3.12-slim
  script:
    - pip install --quiet ruff
    - ruff format --check src/
  rules:
    - when: always

pyright:
  stage: quality
  image: python:3.12-slim
  script:
    - pip install --quiet pyright
    - pyright src/
  rules:
    - when: always

# ---------------------------------------------------------------------------
# Tests
# ---------------------------------------------------------------------------

unit tests:
  stage: test
  image: python:3.12-slim
  script:
    - pip install --quiet pytest
    - pytest tests/unit/ -x -q
  rules:
    - when: always

# ---------------------------------------------------------------------------
# Bernstein self-healing integration
#
# On failure, send a webhook to the Bernstein orchestrator so it can
# automatically create a ci-fix task.
# ---------------------------------------------------------------------------

.bernstein_webhook:
  rules:
    - if: $CI_PIPELINE_SOURCE == "webhook" && $CI_PIPELINE_SOURCE != "trigger"
      when: never
    - when: on_failure

Bernstein ci-fix report:
  stage: Bernstein
  image: curlimages/curl:latest
  script:
    - |
      if [ "$CI_JOB_STATUS" = "failed" ]; then
        curl -s -X POST "$BERNSTEIN_WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -H "x-gitlab-token: $GITLAB_WEBHOOK_TOKEN" \
          -d "{
            \"object_kind\": \"pipeline\",
            \"object_attributes\": {
              \"id\": $CI_PIPELINE_ID,
              \"ref\": \"$CI_COMMIT_REF_NAME\",
              \"sha\": \"$CI_COMMIT_SHA\",
              \"status\": \"failed\",
              \"url\": \"$CI_PIPELINE_URL\"
            },
            \"project\": {
              \"name\": \"$CI_PROJECT_NAME\",
              \"path_with_namespace\": \"$CI_PROJECT_PATH\"
            },
            \"user\": {
              \"name\": \"$GITLAB_USER_NAME\"
            },
            \"builds\": [
              {
                \"name\": \"$CI_JOB_NAME\",
                \"stage\": \"$CI_JOB_STAGE\",
                \"status\": \"failed\"
              }
            ]
          }"
      fi
  rules:
    - when: on_failure
  variables:
    GITLAB_WEBHOOK_TOKEN: "$BERNSTEIN_GITLAB_WEBHOOK_TOKEN"
    BERNSTEIN_WEBHOOK_URL: "$BERNSTEIN_SERVER_URL/webhooks/gitlab"
