apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bernstein-state-pvc
  namespace: default
  labels:
    app: bernstein
    component: state-storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 50Gi
  # Optional: selector to bind to specific PV
  # selector:
  #   matchLabels:
  #     app: bernstein
---
# ConfigMap for PVC size - allows easy override via Helm/kustomize
apiVersion: v1
kind: ConfigMap
metadata:
  name: bernstein-pvc-config
  namespace: default
  labels:
    app: bernstein
data:
  storage-size: "50Gi"
  storage-class: "standard"
  access-mode: "ReadWriteOnce"
  # Reclaim policy options: Delete (default), Retain, Recycle
  reclaim-policy: "Delete"
