global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: bernstein
    environment: docker-compose

scrape_configs:
  - job_name: bernstein
    static_configs:
      - targets: ['bernstein-server:8052']
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: bernstein-server

  # OTel Collector self-metrics (pipeline health, dropped spans, queue depth)
  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8888   # collector internal metrics
          - otel-collector:8889   # Bernstein metrics re-exported by collector
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
