{{- if .Values.operator.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "bernstein.fullname" . }}-operator
  labels:
    {{- include "bernstein.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "bernstein.fullname" . }}-operator
  labels:
    {{- include "bernstein.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
rules:
  # CRD access
  - apiGroups: ["bernstein.io"]
    resources: ["bernsteinplans", "bernsteinruns"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["bernstein.io"]
    resources: ["bernsteinplans/status", "bernsteinruns/status"]
    verbs: ["get", "patch", "update"]
  # Job management
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Pod logs for agent output
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Secrets for auth token reads
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  # Events for status reporting
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "bernstein.fullname" . }}-operator
  labels:
    {{- include "bernstein.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
subjects:
  - kind: ServiceAccount
    name: {{ include "bernstein.fullname" . }}-operator
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "bernstein.fullname" . }}-operator
  apiGroup: rbac.authorization.k8s.io
{{- end }}
