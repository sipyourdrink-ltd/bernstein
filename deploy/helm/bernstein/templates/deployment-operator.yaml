{{- if .Values.operator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bernstein.fullname" . }}-operator
  labels:
    {{- include "bernstein.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "bernstein.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        {{- include "bernstein.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: operator
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "bernstein.fullname" . }}-operator
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: operator
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - "python"
            - "-m"
            - "bernstein.core.operator"
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: BERNSTEIN_SERVER_URL
              value: {{ include "bernstein.serverURL" . | quote }}
            - name: BERNSTEIN_AGENT_IMAGE
              value: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            - name: BERNSTEIN_AUTH_SECRET
              value: {{ include "bernstein.authSecretName" . | quote }}
            {{- if .Values.providerKeys.existingSecret }}
            - name: BERNSTEIN_PROVIDER_KEYS_SECRET
              value: {{ include "bernstein.providerKeysSecretName" . | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
