apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bernstein.fullname" . }}-config
  labels:
    {{- include "bernstein.labels" . | nindent 4 }}
data:
  BERNSTEIN_SERVER_URL: {{ include "bernstein.serverURL" . | quote }}
  BERNSTEIN_BIND_HOST: "0.0.0.0"
  BERNSTEIN_CLUSTER_ENABLED: "true"
  BERNSTEIN_DATABASE_URL: {{ include "bernstein.databaseURL" . | quote }}
  BERNSTEIN_REDIS_URL: {{ include "bernstein.redisURL" . | quote }}
