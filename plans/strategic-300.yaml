        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "WEB-008: Implement data export endpoints (JSON, CSV) for all resources"
        description: >
          Add /export/tasks, /export/costs, /export/agents endpoints that return paginated
          data in JSON or CSV format (via Accept header or ?format=csv). Support date range
          filtering for historical data.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "WEB-009: Add Grafana dashboard YAML generator"
        description: >
          grafana_dashboard.py exists in core but does not generate importable Grafana JSON.
          Generate a complete Grafana dashboard definition (JSON model) with panels for: task
          throughput, agent utilization, cost over time, error rates, and latency
          distributions. Export via bernstein export grafana.
        role: devops
        priority: p1
        complexity: medium
        scope: medium

      - title: "WEB-010: Implement API request/response logging for debugging"
        description: >
          StructuredAccessLogMiddleware logs access but does not capture request bodies or
          response payloads. Add optional verbose logging (configurable, off by default) that
          records full request/response for debugging API integration issues.
        role: backend
        priority: p1
        complexity: low
        scope: small

      - title: "WEB-011: Add paginated task list API with sorting and filtering"
        description: >
          The /tasks endpoint returns all tasks as a single list. For runs with 100+ tasks,
          this is slow and transfers unnecessary data. Add pagination (?page=1&limit=20),
          sorting (?sort=priority), and filtering (?status=claimed&role=backend).
