  # =========================================================================
  # Dimension 12: Configuration & Validation (18 tasks)
  # =========================================================================
  - name: "Configuration & Validation"
    description: >
      Improve configuration: JSON Schema validation, cross-field validation,
      env var expansion, config migration, hot-reload, multi-scope cascade,
      templates, and encryption.
    steps:
      # --- P0 (5 tasks) ---
      - title: "CFG-001: Implement JSON Schema validation for bernstein.yaml"
        description: >
          bernstein.yaml is parsed without schema validation. Invalid keys are silently
          ignored, typos in field names produce no error, and missing required fields cause
          cryptic runtime errors. Publish a JSON Schema for bernstein.yaml and validate at
          parse time with clear error messages per violation.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "CFG-002: Add cross-field validation for conflicting settings"
        description: >
          Settings can conflict: max_agents: 10 with budget: $0 (agents spawn but cannot
          run), auto_decompose: true with internal_llm_provider: "" (decomposition needs an
          LLM). Add cross-field validators that detect and report conflicts at config load
          time.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "CFG-003: Implement secure environment variable expansion in config"
        description: >
          Config values like ${ANTHROPIC_API_KEY} should expand from environment variables,
          but the current expansion is inconsistent (some paths expand, others do not).
          Implement uniform ${VAR} expansion across all config fields with a fallback
          mechanism (${VAR:-default}).
        role: backend
        priority: p0
        complexity: low
        scope: small

      - title: "CFG-004: Add config migration between major versions"
        description: >
          When Bernstein upgrades to a new major version, config field names or structures
          may change. Add a migration system that detects the config version, applies
          necessary transformations, and writes the migrated config. bernstein config migrate
          runs the migration explicitly.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "CFG-005: Validate all file paths in config exist before run starts"
        description: >
          context_files, agency.path, template paths, and other config fields reference
          filesystem paths. If any path does not exist, the run will fail mid-execution.
          Validate all config-referenced paths during startup with clear messages:
          "context_file 'docs/DESIGN.md' does not exist".
        role: backend
        priority: p0
        complexity: low
        scope: small

      # --- P1 (8 tasks) ---
      - title: "CFG-006: Implement hot-reload for runtime configuration changes"
        description: >
          config_watcher.py detects drift but does not apply changes. For safe-to-reload
          fields (budget, max_agents, quality_gate settings, notification config), apply
          changes without restarting the orchestrator. For unsafe fields (storage backend,
          auth), log a warning that restart is required.
        role: backend
        priority: p1
        complexity: high
        scope: large

      - title: "CFG-007: Add multi-scope configuration (project, user, workspace, env)"
        description: >
          Configuration has project (bernstein.yaml) and workspace (.sdd/config.yaml) scopes,
          but there is no user-level config (~/.bernstein/config.yaml) for preferences like
          default model, notification settings, and TUI theme. Implement a cascade: env vars
          > CLI flags > project > workspace > user > defaults.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "CFG-008: Implement config templates for common use cases"
        description: >
          Provide pre-built config templates: bernstein init --template ci (headless, strict
          gates, conservative budget), bernstein init --template dev (interactive, relaxed
