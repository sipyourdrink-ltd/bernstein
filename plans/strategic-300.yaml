  # =========================================================================
  # Dimension 8: Claude Code Deep Integration (20 tasks)
  # =========================================================================
  - name: "Claude Code Deep Integration"
    description: >
      Deepen Claude Code integration: ToolUseContext tracking, CLAUDE.md injection,
      streaming event parsing, subagent governance, exit code mapping, prompt
      caching optimization, and session resume.
    steps:
      # --- P0 (5 tasks) ---
      - title: "CLAUDE-001: Adopt ToolUseContext for tracking which tools each agent uses"
        description: >
          Claude Code provides ToolUseContext with tool invocation details. Capture this
          context per agent session to understand: which tools were used most, which tools
          failed, and whether tool usage patterns correlate with task success. This data
          drives better task routing and prompt optimization.
        role: backend
        priority: p0
        complexity: high
        scope: large

      - title: "CLAUDE-002: Implement CLAUDE.md auto-injection per worktree"
        description: >
          Claude Code reads CLAUDE.md for project context. Each worktree should have a
          generated CLAUDE.md that includes: task-specific instructions, role constraints,
          allowed file paths, and links to relevant context files. The spawner should
          generate this dynamically based on the task definition.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "CLAUDE-003: Parse Claude Code streaming events for real-time progress tracking"
        description: >
          Claude Code emits streaming events that include tool use, thinking, and output.
          Instead of waiting for the agent to exit, parse these events in real-time (from the
          --output-format stream-json flag) to update the TUI with live progress: current
          file being edited, tests being run, errors encountered.
        role: backend
        priority: p0
        complexity: high
        scope: large

      - title: "CLAUDE-004: Implement context inheritance for Claude Code subagents"
        description: >
          When Claude Code spawns its own subagents (via its native subagent capability),
          those subagents start without Bernstein's task context. Inject Bernstein's task
          context, role constraints, and file ownership rules into Claude Code's subagent
          configuration so they operate within Bernstein's governance framework.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "CLAUDE-005: Add proper Claude Code exit code interpretation"
        description: >
          Claude Code has specific exit codes for different outcomes (success, error, user
          interrupt, context overflow). The adapter currently treats all non-zero exits as
          failures. Map each exit code to the appropriate AbortReason or TransitionReason for
          accurate retry and escalation decisions.
        role: backend
        priority: p0
        complexity: low
        scope: small

      # --- P1 (10 tasks) ---
      - title: "CLAUDE-006: Implement prompt caching optimization based on shared context analysis"
        description: >
          prompt_caching.py detects cache breaks but does not actively optimize for caching.
          Analyze the system prompt structure across agents and reorder content so that shared
          prefixes (project description, coding standards, tool definitions) are stable
          across spawns, maximizing Anthropic's prompt cache hits and reducing cost by up to
          90% on cached tokens.
        role: backend
        priority: p1
        complexity: high
        scope: large

      - title: "CLAUDE-007: Add Claude Code message normalization for consistent log parsing"
        description: >
          Claude Code's output format varies between versions and modes (stream-json, json,
          text). Implement a message normalizer that converts all output variants into a
          single internal format for consistent parsing by the orchestrator, janitor, and
          metrics systems.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "CLAUDE-008: Implement Claude Code model-specific prompt optimization"
        description: >
          Opus, Sonnet, and Haiku have different strengths. Optimize system prompts per
          model: Opus gets architectural context and complex reasoning instructions; Sonnet
          gets focused implementation instructions with examples; Haiku gets template-driven,
          highly constrained prompts.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "CLAUDE-009: Add Claude Code /compact command trigger based on context usage"
        description: >
          When context_degradation_detector.py detects quality degradation, proactively
          trigger Claude Code's /compact command to compress the conversation context rather
          than killing and re-spawning the agent.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "CLAUDE-010: Implement Claude Code permission profile injection"
        description: >
          Claude Code supports permission profiles that control which tools and file paths
          are allowed. Generate per-task permission profiles from Bernstein's permission
          matrix and inject them via the --permission-profile flag or settings.local.json.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "CLAUDE-011: Add Claude Code cost tracking via usage API"
        description: >
          Parse Claude Code's token usage from stream-json output and map to Bernstein's cost
          tracking model. Include cache_read_tokens and cache_creation_tokens for accurate
          cost calculation with prompt caching.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "CLAUDE-012: Implement Claude Code session resume for interrupted agents"
        description: >
          When an agent is interrupted (rate limit, network error) and needs to retry, use
          Claude Code's --resume flag to continue the previous session rather than starting
          from scratch, preserving context and reducing token waste.
        role: backend
        priority: p1
        complexity: high
        scope: large

      - title: "CLAUDE-013: Add Claude Code tool result injection for quality gate results"
        description: >
          When quality gates fail mid-task, inject the failure details as a tool result into
          the agent's conversation so it can fix the issues without a full restart.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "CLAUDE-014: Implement Claude Code max_turns coordination with task timeouts"
        description: >
          Claude Code's --max-turns flag should be calculated based on the task's timeout and
          estimated turns per minute. A 30-minute task with an estimated 2 turns/minute
          should get --max-turns 60, not the default value.
        role: backend
        priority: p1
        complexity: low
        scope: small

      - title: "CLAUDE-015: Add Claude Code agent.json card parsing for capability discovery"
        description: >
          Claude Code exposes an agent card with its capabilities. Parse this card on startup
          to dynamically discover supported features (tools, models, context window size)
          rather than hardcoding assumptions in the adapter.
        role: backend
        priority: p1
        complexity: low
        scope: small

      # --- P2 (5 tasks) ---
      - title: "CLAUDE-016: Implement Claude Code batch API integration for non-urgent tasks"
        description: >
          Use Anthropic's Batch API for tasks that do not need real-time results (docs
          generation, code review, test writing). Batch tasks can be submitted and results
          polled, reducing cost by 50%.
        role: backend
        priority: p2
        complexity: high
        scope: large

      - title: "CLAUDE-017: Add Claude Code custom tool injection per task"
        description: >
          Allow tasks to define custom MCP tools that are available only to that task's
          agent. For example, a database migration task could have a validate_migration tool
          that checks the migration against the production schema.
        role: backend
        priority: p2
        complexity: medium
        scope: medium

      - title: "CLAUDE-018: Implement Claude Code multi-model conversation routing"
        description: >
          Within a single agent session, route different phases to different models: planning
          phase to Opus, implementation to Sonnet, cleanup to Haiku. Requires Claude Code
          API-level integration beyond CLI flags.
        role: backend
        priority: p2
        complexity: high
        scope: large

      - title: "CLAUDE-019: Add Claude Code conversation export for post-mortem analysis"
        description: >
          Export the full Claude Code conversation (system prompt, user messages, assistant
          messages, tool results) to a structured format for post-mortem analysis of failed
          tasks.
        role: backend
        priority: p2
        complexity: low
        scope: small

      - title: "CLAUDE-020: Implement Claude Code telemetry correlation"
        description: >
          When both Bernstein and Claude Code emit OTel traces, correlate them using a shared
          trace context (W3C traceparent header) so distributed tracing tools show the full
          span from task creation through agent execution to completion.
        role: devops
        priority: p2
        complexity: medium
        scope: medium

  # =========================================================================
  # Dimension 9: MCP & Protocol Ecosystem (18 tasks)
  # =========================================================================
  - name: "MCP & Protocol Ecosystem"
    description: >
      Strengthen MCP support: health monitoring, config validation, tool
      normalization, transport abstraction, lazy startup, auth lifecycle,
      A2A federation, and ACP integration.
    steps:
      # --- P0 (4 tasks) ---
      - title: "MCP-001: Implement MCP server health monitoring with auto-restart"
        description: >
          MCPManager starts MCP servers but does not monitor their health after startup. If
          an MCP server crashes mid-run, agents lose access to tools silently. Add periodic
          health probes and automatic restart with exponential backoff.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "MCP-002: Add MCP server configuration validation on startup"
        description: >
          Invalid MCP configuration (wrong command path, missing env vars, bad URL) causes
          cryptic errors at spawn time. Validate all MCP server configurations during
          orchestrator startup, before any agents are spawned, with clear error messages for
          each validation failure.
        role: backend
        priority: p0
        complexity: low
        scope: small

      - title: "MCP-003: Implement MCP tool normalization across different server implementations"
        description: >
          Different MCP servers expose tools with inconsistent naming, parameter formats, and
          error handling. Add a normalization layer that standardizes tool names (snake_case),
          validates parameter schemas, and wraps errors in a consistent format.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "MCP-004: Add MCP transport abstraction (stdio, SSE, StreamableHTTP)"
        description: >
          MCPServerConfig supports stdio and SSE transports, but the emerging StreamableHTTP
          transport is not supported. Abstract the transport layer so new transports can be
          added without modifying the manager.
        role: backend
        priority: p0
        complexity: high
        scope: large

      # --- P1 (9 tasks) ---
      - title: "MCP-005: Implement lazy MCP server discovery and on-demand startup"
        description: >
          Currently all configured MCP servers start at orchestrator launch. For runs that
          use only a subset of tools, this wastes resources. Start MCP servers on demand when
          an agent's task requires tools from that server.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "MCP-006: Add MCP server auth lifecycle management (token refresh, re-auth)"
        description: >
          MCP servers that require authentication (OAuth, API keys) may need token refresh
          during long runs. Add auth lifecycle hooks to the MCP manager that refresh tokens
          before expiry.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "MCP-007: Implement MCP resource caching for frequently accessed resources"
        description: >
          MCP resources (file contents, database schemas) that do not change frequently are
          re-fetched on every agent request. Add a TTL-based cache for MCP resources with
          configurable expiration per resource type.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "MCP-008: Add MCP elicitation handling (server-initiated prompts)"
        description: >
          MCP servers can send elicitation requests (asking the user for information). In a
          multi-agent context, these need to be routed to the appropriate handler: interactive
          mode shows a prompt, headless mode uses configured defaults, or escalates to the
          approval gate.
        role: backend
        priority: p1
        complexity: high
        scope: large

      - title: "MCP-009: Implement A2A protocol federation with external orchestrators"
        description: >
          The A2A handler (a2a.py) supports task lifecycle mapping but is not used by any
          real consumer. Implement a federation client that can send tasks to external
          A2A-compatible orchestrators and receive results, enabling cross-team collaboration.
        role: architect
        priority: p1
        complexity: critical
        scope: large

      - title: "MCP-010: Add per-task MCP server filtering (only expose relevant tools)"
        description: >
          All MCP tools are available to all agents. A documentation task does not need
          database tools, and a security task does not need deployment tools. Add per-task
          MCP tool filtering based on role and task scope.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "MCP-011: Implement MCP server metrics collection (tool call latency, error rates)"
        description: >
          Track per-server and per-tool metrics: call count, latency distribution, error
          rate, and timeout count. Expose as Prometheus metrics and use for health monitoring.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "MCP-012: Add MCP server version compatibility checking"
        description: >
          MCP protocol versions may be incompatible. Check server protocol version against
          adapter requirements during startup and warn or block if versions are incompatible.
        role: backend
        priority: p1
        complexity: low
        scope: small

      - title: "MCP-013: Implement ACP protocol integration for IDE agent communication"
        description: >
          acp.py has an ACP handler for IDE agent communication. Complete the integration so
          that JetBrains and VS Code extensions can communicate with Bernstein via the ACP
          protocol, enabling seamless IDE-orchestrator coordination.
        role: backend
        priority: p1
        complexity: high
        scope: large

      # --- P2 (5 tasks) ---
      - title: "MCP-014: Add MCP server marketplace with one-click installation"
        description: >
          Create a registry of vetted MCP servers (database, web search, file analysis, etc.)
          with installation commands. bernstein mcp install <server-name> downloads,
          configures, and registers the server.
        role: backend
        priority: p2
        complexity: critical
        scope: large

      - title: "MCP-015: Implement MCP tool usage analytics for optimization recommendations"
        description: >
          Analyze which MCP tools are used most frequently and which are never used. Recommend
          removing unused servers to reduce resource consumption and startup time.
        role: backend
        priority: p2
        complexity: medium
        scope: medium

      - title: "MCP-016: Add MCP server sandboxing (run in container)"
        description: >
          MCP servers run as unsandboxed subprocesses with full system access. Add optional
          container sandboxing for MCP servers, especially those from untrusted sources.
        role: security
        priority: p2
        complexity: high
        scope: large

      - title: "MCP-017: Implement MCP protocol test suite for server validation"
        description: >
          Provide a bernstein mcp test <server-name> command that validates a server against
          the MCP specification: tool listing, schema validation, error handling, and edge
          cases.
        role: qa
        priority: p2
        complexity: medium
        scope: medium

      - title: "MCP-018: Add MCP tool composition (chain multiple tools into workflows)"
        description: >
          Allow defining composite MCP tools that chain multiple server calls: e.g., a
          "deploy" tool that runs build, test, and deploy steps across different MCP servers.
        role: backend
        priority: p2
        complexity: high
        scope: large

  # =========================================================================
  # Dimension 10: Testing & Quality Gates (25 tasks)
  # =========================================================================
  - name: "Testing & Quality Gates"
    description: >
      Strengthen testing: end-to-end pipeline tests, state machine edge cases,
      concurrency tests, timeout testing, adapter consistency, quality gate
      regression, chaos testing, and performance benchmarks.
    steps:
      # --- P0 (8 tasks) ---
      - title: "TEST-001: Add integration tests for the full spawn-execute-verify pipeline"
        description: >
          The integration test directory has scenario tests but no test exercises the
          complete pipeline: create task -> spawn agent (mock adapter) -> agent writes output
          -> janitor verifies -> merge. This end-to-end path is the most critical and has no
          automated coverage.
        role: qa
        priority: p0
        complexity: high
        scope: large

      - title: "TEST-002: Add state machine transition tests for all edge cases"
        description: >
          lifecycle.py defines allowed transitions but edge cases (double-transition,
          transition during shutdown, transition after timeout) are not systematically tested.
          Generate a transition matrix test that verifies every (from_status, to_status) pair
          is either allowed (with correct side effects) or rejected with
          IllegalTransitionError.
        role: qa
        priority: p0
        complexity: medium
        scope: medium

      - title: "TEST-003: Add concurrency tests for overlapping tick processing"
        description: >
          The orchestrator is designed for single-threaded ticks, but concurrent access from
          HTTP handlers, background threads (heartbeat, config watcher), and the tick pipeline
          can produce race conditions. Add tests that simulate concurrent access to shared
          state (task store, agent sessions, WAL) and verify correctness.
        role: qa
        priority: p0
        complexity: high
        scope: large

      - title: "TEST-004: Add timeout behavior tests for all blocking operations"
        description: >
          Many operations have configurable timeouts (spawn, heartbeat, MCP probe, HTTP
          calls) but timeout behavior is not tested. For each timeout-capable operation, add
          a test that forces the timeout and verifies: graceful degradation, correct error
          propagation, and resource cleanup.
        role: qa
        priority: p0
        complexity: medium
        scope: medium

      - title: "TEST-005: Add error path coverage for spawner failure modes"
        description: >
          spawner.py has many error paths (adapter not found, worktree failure, rate limit,
          prompt too long, model unavailable) but most are only tested individually. Add a
          failure injection test that exercises each error path and verifies the correct
          FailureCategory is returned and the correct retry strategy is applied.
        role: qa
        priority: p0
        complexity: medium
        scope: medium

      - title: "TEST-006: Add adapter consistency tests across all 24+ adapters"
        description: >
          Each adapter implements the CLIAdapter protocol, but consistency is not enforced by
          tests. Add a parametrized test that instantiates every adapter and verifies:
          spawn() returns a SpawnResult, is_installed() is callable, detect_tier() returns
          valid ApiTierInfo, and build_command() produces valid CLI arguments.
        role: qa
        priority: p0
        complexity: high
        scope: large

      - title: "TEST-007: Implement quality gate regression tests (gates that should fail DO fail)"
        description: >
          Quality gates are tested for passing cases, but there are no tests verifying that
          deliberately bad code (syntax errors, type violations, failing tests, leaked
          secrets) correctly triggers gate failures. Add negative test cases for each gate
          type.
        role: qa
        priority: p0
        complexity: medium
        scope: medium

      - title: "TEST-008: Add chaos test for server restart during active orchestration"
        description: >
          test_server_restart.py and test_server_kill.py exist in the chaos directory but
          need expansion. Test: (1) kill server while agents are running, (2) restart server
          and verify agent reconnection, (3) verify no tasks are lost or double-processed,
          (4) verify WAL recovery replays uncommitted decisions.
        role: qa
        priority: p0
        complexity: high
        scope: large

      # --- P1 (10 tasks) ---
      - title: "TEST-009: Implement property-based testing for task store operations"
        description: >
          Use Hypothesis to generate random sequences of task store operations (create, claim,
          complete, fail, cancel) and verify invariants: total tasks equals sum of status
          counts, no task has two active agents, completed tasks have completion data.
        role: qa
        priority: p1
        complexity: medium
        scope: medium

      - title: "TEST-010: Add fuzzing for configuration parser"
        description: >
          The YAML config parser processes untrusted input from bernstein.yaml. Fuzz the
          parser with malformed YAML, extremely large values, recursive references, and
          embedded binary data. Verify graceful error handling with clear messages.
        role: qa
        priority: p1
        complexity: medium
        scope: medium

      - title: "TEST-011: Add performance benchmarks for critical paths (tick, spawn, merge)"
        description: >
          Establish performance baselines: tick execution under 100ms, spawn preparation
          under 500ms, merge under 2s. Add benchmark tests that run in CI and fail if
          performance regresses by more than 20%.
        role: qa
        priority: p1
        complexity: medium
        scope: medium

      - title: "TEST-012: Implement test coverage thresholds per module"
        description: >
          Current test coverage is unmeasured per module. Set minimum coverage thresholds:
          core/ at 80%, adapters/ at 70%, cli/ at 60%, tui/ at 50%. Fail CI if coverage drops
          below thresholds.
        role: qa
        priority: p1
        complexity: medium
        scope: medium

      - title: "TEST-013: Add snapshot tests for CLI output formatting"
        description: >
          CLI commands produce formatted output (tables, colors, progress bars). Add snapshot
          tests that capture expected output for key commands (bernstein status, bernstein
          cost, bernstein agents list) and detect regressions in formatting.
        role: qa
        priority: p1
        complexity: medium
        scope: medium

      - title: "TEST-014: Implement mock adapter for deterministic integration testing"
        description: >
          adapters/mock.py exists but its behavior is too simplistic. Enhance it with:
