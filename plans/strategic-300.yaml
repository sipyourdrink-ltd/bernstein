name: strategic-300
description: "300-task strategic roadmap for Bernstein market dominance"
version: "2.0"

stages:
  # =========================================================================
  # Dimension 1: Orchestrator Core Hardening (23 tasks)
  # =========================================================================
  - name: "Orchestrator Core Hardening"
    description: >
      Harden the orchestrator core: error classification, circuit breakers,
      retry logic, crash recovery, structured logging, and tick pipeline
      reliability. The orchestrator is the beating heart of Bernstein.
    steps:
      # --- P0 (8 tasks) ---
      - title: "ORCH-001: Classify all spawner exceptions into recoverable vs fatal categories"
        description: >
          spawner.py catches SpawnError and RateLimitError but many other exceptions
          (OSError, subprocess.TimeoutExpired, JSONDecodeError from malformed agent output)
          fall through to a generic catch. Add an ErrorClassifier that maps every exception
          to a canonical FailureCategory enum (transient, permanent, resource_exhaustion,
          config_error) so retry and escalation logic can make informed decisions.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "ORCH-002: Add circuit breaker state machine with half-open recovery probes"
        description: >
          The existing circuit_breaker.py handles scope and budget violations by writing
          .kill files, but there is no provider-level circuit breaker that opens after N
          consecutive spawn failures and periodically probes to check recovery. Implement a
          three-state (closed/open/half-open) breaker per provider with configurable
          thresholds and a half-open probe interval.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "ORCH-003: Implement exponential backoff with jitter for all HTTP calls to task server"
        description: >
          The orchestrator uses httpx calls to the task server in tick_pipeline.py and
          task_lifecycle.py. Most have no retry logic -- a single transient HTTP failure
          (connection reset, 502, timeout) causes the tick to fail. Wrap all server calls
          in a retry decorator with exponential backoff, jitter, and a configurable
          max_retries.
        role: backend
        priority: p0
        complexity: low
        scope: small

      - title: "ORCH-004: Prevent cascading failure when task server becomes unreachable mid-run"
        description: >
          If the FastAPI task server crashes or becomes unreachable, all in-flight
          orchestrator ticks fail simultaneously and agents continue executing without
          coordination. Implement a degraded mode where the orchestrator pauses spawning,
          preserves agent state to WAL, and retries server contact with backoff rather
          than crashing the entire run.
        role: backend
        priority: p0
        complexity: high
        scope: large

      - title: "ORCH-005: Add heartbeat timeout escalation ladder (warn, signal, kill)"
        description: >
          HeartbeatMonitor in heartbeat.py has a single timeout_s (default 120s). When an
          agent goes silent, it jumps directly to stale detection. Implement a three-tier
          escalation: (1) warn at 60s and log, (2) send SIGUSR1/wakeup signal at 90s,
          (3) SIGTERM at 120s, (4) SIGKILL at 150s. Make all thresholds configurable.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "ORCH-006: Guard against concurrent tick execution causing double-spawns"
        description: >
          ConcurrencyGuard in concurrency_guard.py uses a generation counter but the
          orchestrator's main loop can still produce overlapping ticks if the previous tick
          stalls on I/O. Add a non-blocking lock acquisition at tick entry that skips the
          tick entirely if the previous one is still running, logging the skip for
          diagnostics.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "ORCH-007: Implement WAL replay on crash recovery with idempotent re-execution"
        description: >
          wal.py records orchestrator decisions and detects uncommitted entries on startup,
          but there is no replay logic that actually re-executes the uncommitted decisions.
          Implement a WAL replay engine that reads uncommitted entries, checks whether the
          corresponding action already took effect (idempotency check), and replays only
          the delta.
        role: backend
        priority: p0
        complexity: high
        scope: large

      - title: "ORCH-008: Add structured error context to all orchestrator log messages"
        description: >
          Many logger.exception() calls in orchestrator.py, task_lifecycle.py, and
          agent_lifecycle.py provide minimal context (no task_id, session_id, or tick
          number). Wrap all exception handlers with a LogContext that includes run_id,
          tick_number, task_id, and session_id so that log analysis tools can correlate
          failures across subsystems.
        role: backend
        priority: p0
        complexity: low
        scope: small

      # --- P1 (10 tasks) ---
      - title: "ORCH-009: Extract orchestrator.py into focused sub-modules"
        description: >
          At 4,035 lines, orchestrator.py is the largest file in the codebase. The
          OrchestratorNudgeManager, startup/shutdown logic, and run configuration should be
          extracted into nudge_manager.py, orchestrator_lifecycle.py, and
          orchestrator_config.py while preserving the facade pattern.
        role: backend
        priority: p1
        complexity: high
        scope: large

      - title: "ORCH-010: Add tick duration budget with automatic skip of non-critical work"
        description: >
          When the tick pipeline takes longer than expected (slow git ops, network latency),
          critical operations like heartbeat checks and kill signal processing get delayed.
          Add a tick time budget where critical operations run first, and non-critical work
          (metrics export, config drift check, nudge processing) is skipped when the budget
          is exceeded.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "ORCH-011: Implement graceful degradation when memory guard triggers"
        description: >
          MemoryGuard detects high memory usage but the response is binary (continue or
          crash). Add graduated responses: at 80% -- pause new spawns and trigger GC; at
          90% -- drain lowest-priority agents; at 95% -- emergency shutdown with state
          preservation.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "ORCH-012: Add orchestrator health score combining all subsystem signals"
        description: >
          health_score.py exists but is not wired into the tick pipeline. Aggregate signals
          from heartbeat monitor, circuit breaker, memory guard, WAL integrity, and server
          connectivity into a single 0-100 health score exposed on /health/score and
          displayed in the TUI.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "ORCH-013: Implement configurable tick interval with adaptive scaling"
        description: >
          The tick interval is currently fixed. Under light load (1-2 agents, all healthy),
          ticking every 2 seconds wastes CPU. Under heavy load (10+ agents, failures
          occurring), faster ticks would catch problems sooner. Implement adaptive tick
          scaling that decreases the interval when failures are detected and increases it
          when everything is healthy.
        role: backend
        priority: p1
        complexity: low
        scope: small

      - title: "ORCH-014: Add structured telemetry spans for every tick phase"
        description: >
          The telemetry module (telemetry.py) supports OTel spans but only start_span is
          used sporadically. Add spans for each tick phase (fetch_tasks, spawn,
          heartbeat_check, reap, merge, quality_gate) so Jaeger/Tempo traces show exactly
          where time is spent per tick.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "ORCH-015: Implement orchestrator self-test on startup"
        description: >
          Before entering the main loop, the orchestrator should validate that all required
          external dependencies are functional: git is available, the task server is
          reachable, at least one adapter is installed, the .sdd/ directory is writable, and
          WAL integrity is intact. Fail fast with actionable error messages rather than
          crashing mid-run.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "ORCH-016: Add per-tick metrics counters (tasks_spawned, tasks_completed, errors)"
        description: >
          Prometheus counters exist in prometheus.py but many tick-level events are not
          instrumented. Add counters for: ticks_total, ticks_skipped (concurrent guard),
          tasks_spawned_per_tick, tasks_completed_per_tick, tasks_failed_per_tick,
          heartbeat_failures_detected, and merges_attempted.
        role: backend
        priority: p1
        complexity: low
        scope: small

      - title: "ORCH-017: Implement deterministic shutdown ordering (agents before server)"
        description: >
          The shutdown sequence in orchestrator.py sends ShutdownInProgress but the ordering
          between agent SIGTERM, WAL flush, server shutdown, and MCP manager cleanup is not
          strictly sequenced. Implement a shutdown phase sequence: (1) stop spawning,
          (2) signal all agents, (3) wait grace period, (4) flush WAL, (5) close server,
          (6) cleanup MCP.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "ORCH-018: Add dead letter queue for permanently failed tasks"
        description: >
          Tasks that exhaust all retries are marked failed but there is no structured dead
          letter queue for post-mortem analysis. Create a .sdd/dead_letter/ directory where
          permanently failed tasks are written with full context (agent logs, diff, error
          classification, retry history) for human review or automated retry later.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      # --- P2 (5 tasks) ---
      - title: "ORCH-019: Implement orchestrator checkpoint/restore for long-running plans"
        description: >
          For plans with 50+ tasks spanning hours, the ability to checkpoint the orchestrator
          state and resume from that checkpoint after a machine reboot would eliminate the
          need to re-run completed work. Serialize full orchestrator state (task graph, agent
          sessions, WAL position, cost accumulator) to a checkpoint file.
        role: backend
        priority: p2
        complexity: critical
        scope: large

      - title: "ORCH-020: Add orchestrator plugin extension points (pre-tick, post-tick hooks)"
        description: >
          Allow external code to hook into the orchestrator tick pipeline without modifying
          core code. Define pre_tick, post_tick, pre_spawn, post_spawn extension points
          using the existing pluggy infrastructure.
        role: backend
        priority: p2
        complexity: medium
        scope: medium

      - title: "ORCH-021: Implement orchestrator canary mode for testing config changes"
        description: >
          Run a second orchestrator instance in read-only mode that processes the same task
          stream but only simulates spawning. Compare its decisions against the primary to
          validate config changes, routing policy updates, or new adapter versions before
          they go live.
        role: backend
        priority: p2
        complexity: high
        scope: large

      - title: "ORCH-022: Add anomaly detection on tick duration distribution"
        description: >
          Track tick duration as a time series and alert when ticks consistently exceed the
          95th percentile of historical duration, indicating performance degradation (disk
          I/O, git lock contention, network issues).
        role: backend
        priority: p2
        complexity: medium
        scope: medium

      - title: "ORCH-023: Implement rate-limited logging to prevent log flooding during cascading failures"
        description: >
          During cascading failures, the same error can be logged thousands of times per
          minute. Add a rate-limiting log filter that deduplicates identical messages and
          emits a summary ("message X repeated N times in last 60s") instead.
        role: backend
        priority: p2
        complexity: low
        scope: small

  # =========================================================================
  # Dimension 2: Task Lifecycle & State Machine (19 tasks)
  # =========================================================================
  - name: "Task Lifecycle & State Machine"
    description: >
      Harden the task lifecycle FSM: idempotent transitions, subtask coordination,
      file ownership validation, timeout handling, dependency management, and
      task metadata enrichment.
    steps:
      # --- P0 (5 tasks) ---
      - title: "TASK-001: Add idempotency tokens to all task state transitions"
        description: >
          Concurrent ticks can attempt the same transition on a task (e.g., two ticks both
          try to close a task that just completed). Add a transition_id (UUID) to every
          transition_task / transition_agent call and make the store reject duplicate
          transition_ids, preventing double-transitions.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "TASK-002: Implement WAITING_FOR_SUBTASKS timeout with automatic escalation"
        description: >
          When a parent task spawns subtasks, it enters a waiting state. If a subtask hangs
          or its agent dies without reporting, the parent waits indefinitely. Add a
          configurable timeout (default 30min) after which the parent task is escalated to
          the manager agent or marked for human review.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "TASK-003: Validate file ownership before allowing task claim"
        description: >
          Two tasks can claim ownership of overlapping files, leading to merge conflicts
          when both agents modify the same code. Before a task is claimed, validate that its
          owned_files do not overlap with any other currently claimed task's files. Block the
          claim and re-queue if overlap is detected.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "TASK-004: Add transition guard that prevents claimed->done without completion data"
        description: >
          The lifecycle allows claimed->done transitions, but if the agent process exits
          without writing completion data (crash, OOM, SIGKILL), the task is marked done
          with no evidence of work. Add a guard that requires non-empty completion data (at
          minimum, a diff or agent log reference) before allowing the done transition.
        role: backend
        priority: p0
        complexity: low
        scope: small

      - title: "TASK-005: Prevent orphaned subtasks when parent task is cancelled"
        description: >
          Cancelling a parent task (via API or CLI) does not automatically cancel its
          in-flight subtasks. The subtasks continue executing, consuming resources and
          potentially merging work that will be discarded. Implement cascading cancellation
          that propagates cancel signals to all descendant tasks.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      # --- P1 (9 tasks) ---
      - title: "TASK-006: Implement task dependency cycle detection before plan execution"
        description: >
          TaskGraph in graph.py supports dependency edges but does not validate for cycles
          at plan load time. A cycle would cause tasks to wait on each other indefinitely.
          Add topological sort validation at plan parsing time with clear error messages
          identifying the cycle.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "TASK-007: Add task priority aging to prevent starvation of low-priority tasks"
        description: >
          tick_pipeline.py has _PRIORITY_AGE_THRESHOLD_SECONDS (300s) and
          _PRIORITY_BOOST_AMOUNT (1), but the boost is applied once and then the task can
          still be starved. Implement continuous aging where priority improves by 1 every 5
          minutes, with a configurable ceiling.
        role: backend
        priority: p1
        complexity: low
        scope: small

      - title: "TASK-008: Add task status history with timestamps for each transition"
        description: >
          Tasks currently store only their current status. Add a
          status_history: list[StatusTransition] field that records every transition with
          timestamp, actor, and reason. This enables duration analysis (how long was each
          task in each state?) and is required for SLA monitoring.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "TASK-009: Implement task decomposition validation (subtask completeness check)"
        description: >
          When the manager agent decomposes a task into subtasks, there is no validation
          that the subtasks cover the parent task's requirements. Add a decomposition
          validator that checks: (1) all parent owned_files are covered by at least one
          subtask, (2) subtask priorities do not exceed parent priority, (3) estimated
          effort sums are reasonable.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "TASK-010: Add task retry budget tracking (max retries per task, per run)"
        description: >
          Tasks can be retried, but there is no centralized retry budget. A single difficult
          task could consume all retries while other tasks wait. Track retry_count per task
          and per run, with configurable limits (default: 3 per task, 20 per run).
        role: backend
        priority: p1
        complexity: low
        scope: small

      - title: "TASK-011: Implement atomic task batch transitions for plan stage completion"
        description: >
          When a plan stage completes, each task in the stage transitions individually. If
          the server crashes mid-batch, some tasks move forward while others stay behind.
          Implement atomic batch transitions where all tasks in a stage transition together
          or none do, using WAL for atomicity.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "TASK-012: Add task completion confidence score from janitor verification"
        description: >
          The janitor returns pass/fail, but many completions are ambiguous. Add a
          confidence score (0.0-1.0) to JanitorResult that reflects how many completion
          signals passed, quality gate results, and intent verification score. Tasks below a
          configurable threshold (default 0.7) are flagged for human review instead of
          auto-closing.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "TASK-013: Implement task tagging and filtering for selective re-runs"
        description: >
          Add user-defined tags to tasks (e.g., @security, @refactor, @frontend) so that
          partial re-runs can target specific categories: bernstein run --tag security
          re-runs only security-tagged tasks.
        role: backend
        priority: p1
        complexity: low
        scope: small

      - title: "TASK-014: Add task progress estimation based on historical role/scope duration"
        description: >
          Track historical duration per (role, scope, complexity) tuple and use it to
          estimate remaining time for in-flight tasks. Display ETA in the TUI status view
          and expose via the /status API.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      # --- P2 (5 tasks) ---
      - title: "TASK-015: Implement task templates for common patterns"
        description: >
          Allow users to define reusable task templates that pre-fill role, scope,
          complexity, completion_signals, and quality_gate overrides. Reduce boilerplate in
          large plans.
        role: backend
        priority: p2
        complexity: medium
        scope: medium

      - title: "TASK-016: Add task diff preview before merge approval"
        description: >
          Before a completed task's changes are merged, generate a human-readable diff
          summary showing files changed, lines added/removed, and test results. Display in
          the TUI and API for quick review.
        role: backend
        priority: p2
        complexity: medium
        scope: medium

      - title: "TASK-017: Implement task splitting based on file count heuristics"
        description: >
          Tasks that touch more than N files (configurable, default 10) are statistically
          more likely to fail or produce poor-quality output. Add automatic splitting advice
          that suggests decomposition when file count exceeds the threshold.
        role: backend
        priority: p2
        complexity: medium
        scope: medium

      - title: "TASK-018: Add task affinity hints for agent selection"
        description: >
          Allow tasks to specify affinity for specific agents or models (e.g., "prefer opus
          for this task" or "must use the same agent that completed task X") to improve
          continuity and context reuse.
        role: backend
        priority: p2
        complexity: low
        scope: small

      - title: "TASK-019: Implement task dependency visualization in CLI"
        description: >
          bernstein graph exists but the output is minimal. Add ASCII-art or Mermaid-format
          dependency graph output showing task states, critical path, and blocked tasks.
        role: backend
        priority: p2
        complexity: medium
        scope: medium

  # =========================================================================
  # Dimension 3: Agent Spawning & Management (22 tasks)
  # =========================================================================
  - name: "Agent Spawning & Management"
    description: >
      Improve agent spawning reliability: failure categorization, worktree isolation,
      prompt size validation, model fallback, MCP readiness, zombie cleanup, and
      adapter lifecycle management.
    steps:
      # --- P0 (7 tasks) ---
      - title: "AGENT-001: Categorize all spawn failures into actionable failure types"
        description: >
          SpawnError and RateLimitError are the only spawn exception types. Add
          AdapterNotInstalledError, ModelNotAvailableError, PromptTooLongError,
          WorktreeCreationError, PermissionDeniedError, and ResourceExhaustedError. The
          spawner uses the category to decide retry strategy (retry vs escalate vs
          fail-fast).
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "AGENT-002: Validate worktree isolation after creation (file leakage check)"
        description: >
          After WorktreeManager.create(), verify that the worktree is fully isolated:
          (1) .sdd/ directory is not shared with the main repo, (2) symlinked directories
          (node_modules, .venv) are read-only from the worktree's perspective, (3) no
          hardlinks leak state between worktrees. Fail the spawn if isolation is violated.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "AGENT-003: Add prompt size pre-check before spawning agent"
        description: >
          Large context files, long system prompts, and accumulated lessons can push the
          initial prompt beyond the model's context window. Before spawning, estimate the
          prompt token count (using the rough ~4 chars per token heuristic in
          prompt_caching.py) and compare against the model's context limit. If it exceeds
          80%, truncate context files; if it exceeds 95%, fail with a clear message.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "AGENT-004: Implement model fallback chain for all error types (not just 529)"
        description: >
          ModelFallbackTracker in model_fallback.py only triggers on consecutive HTTP 529
          errors. Extend it to handle: 429 rate limits, connection timeouts, 503 service
          unavailable, and "model not available" errors. Make the fallback chain configurable
          in bernstein.yaml (e.g., opus -> sonnet -> gemini -> qwen).
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "AGENT-005: Validate MCP server startup before agent spawn"
        description: >
          MCPManager starts MCP servers as subprocesses but does not verify they are actually
          ready before the agent starts. If an MCP server fails to initialize (missing
          binary, port conflict, auth error), the agent starts without it and may produce
          incorrect results silently. Add a readiness probe (health endpoint or stderr
          parsing) with a configurable timeout.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "AGENT-006: Fix zombie agent process cleanup on abnormal orchestrator exit"
        description: >
          If the orchestrator is killed (SIGKILL, power loss), spawned agent processes
          become orphaned zombies that continue running and modifying files. On startup,
          scan for PID files in .sdd/runtime/pids/, check if processes are still alive, and
          send SIGTERM to any orphaned agents before starting new work.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "AGENT-007: Add agent spawn rate limiting to prevent provider throttling"
        description: >
          Spawning 6 agents simultaneously against the same provider (e.g., Anthropic API)
          can trigger rate limits. Add a configurable spawn rate limiter (default: max 2
          spawns per 10 seconds per provider) to spread out initial requests.
        role: backend
        priority: p0
        complexity: low
        scope: small

      # --- P1 (10 tasks) ---
      - title: "AGENT-008: Implement agent warm pool for fast re-spawning"
        description: >
          Spawning an agent (worktree creation, MCP startup, adapter initialization) takes
          5-15 seconds. For iterative workflows where the same role is needed repeatedly,
          maintain a warm pool of pre-provisioned worktrees with MCP servers already running,
          reducing spawn latency to under 2 seconds.
        role: backend
        priority: p1
        complexity: high
        scope: large

      - title: "AGENT-009: Add per-adapter health monitoring and automatic disabling"
        description: >
          Track success rate, average latency, and error rate per adapter. If an adapter's
          error rate exceeds a threshold (default 50% over last 10 spawns), automatically
          disable it and route to alternatives. Re-enable after a configurable cooldown with
          a probe spawn.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "AGENT-010: Implement agent output normalization across all adapters"
        description: >
          The Claude adapter uses --json-schema for structured output, but other adapters
          (Codex, Gemini, Qwen) return free-form text. Implement a normalization layer that
          extracts structured completion data (status, summary, files_changed) from all
          adapter outputs using regex patterns and optional LLM parsing.
        role: backend
        priority: p1
        complexity: high
        scope: large

      - title: "AGENT-011: Add adapter conformance test suite that runs against real binaries"
        description: >
          test_adapter_conformance.py exists but tests against mocks. Add an optional
          conformance suite (behind a --live flag) that spawns each installed adapter with a
          trivial task and verifies: successful spawn, heartbeat emission, structured output,
          and clean shutdown.
        role: qa
        priority: p1
        complexity: high
        scope: large

      - title: "AGENT-012: Implement agent context inheritance for subtask agents"
        description: >
          When a parent task is decomposed into subtasks, each subtask agent starts from
          scratch with no knowledge of the parent's context. Pass the parent agent's final
          context summary (key decisions, architectural context, files explored) to subtask
          agents via the spawn_prompt.py context builder.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "AGENT-013: Add agent process resource limits (CPU, memory, disk I/O)"
        description: >
          The container sandbox (sandbox.py) supports resource limits, but non-sandboxed
          agents have no limits. Add OS-level resource constraints for non-sandboxed spawns
          using ulimit (Unix) or job objects (Windows) to prevent a single agent from
          consuming all system resources.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "AGENT-014: Implement staggered agent shutdown during drain mode"
        description: >
          During drain mode, all agents receive SIGTERM simultaneously, causing a thundering
          herd of merge attempts. Stagger shutdown signals with a configurable delay between
          agents (default 5s) so merges are processed sequentially.
        role: backend
        priority: p1
        complexity: low
        scope: small

      - title: "AGENT-015: Add adapter auto-detection based on installed CLI tools"
        description: >
          agent_discovery.py discovers available agents, but users must manually configure
          which adapter to use. Auto-detect installed CLI tools (claude, codex, gemini, etc.)
          on startup and make them available as routing targets without explicit
          configuration.
        role: backend
        priority: p1
        complexity: low
        scope: small

      - title: "AGENT-016: Implement agent session continuity across retries"
        description: >
          When a task is retried, a completely new agent session starts with no memory of the
          previous attempt. For retries caused by transient errors (rate limits, timeouts),
          pass the previous agent's log summary and diff to the retry agent so it can resume
          where the previous attempt left off rather than starting from scratch.
        role: backend
        priority: p1
        complexity: high
        scope: large

      - title: "AGENT-017: Add spawn dry-run mode that validates everything except actual process creation"
        description: >
          Allow bernstein run --dry-run to go deeper than plan display: validate that each
          task's target adapter is installed, the model is available, prompt size is within
          limits, worktree creation would succeed, and MCP servers are configured -- without
          actually spawning anything.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      # --- P2 (5 tasks) ---
      - title: "AGENT-018: Implement agent performance profiling (spawn time, token rate, completion time)"
        description: >
          Track per-agent performance metrics and surface them in bernstein recap: spawn
          latency, tokens per minute, time to first output, total completion time. Use these
          metrics to inform routing decisions.
        role: backend
        priority: p2
        complexity: medium
        scope: medium

      - title: "AGENT-019: Add agent skill badges visible in status display"
        description: >
          worker_badges.py exists but is not wired to the TUI. Display per-agent capability
          badges (reasoning_strength, tool_support, language_proficiency) in the status view
          so users can see why a particular agent was chosen for a task.
        role: frontend
        priority: p2
        complexity: low
        scope: small

      - title: "AGENT-020: Implement adapter plugin SDK for third-party agent integration"
        description: >
          Define a stable adapter plugin interface so third-party CLI agents can be
          integrated without modifying Bernstein core. Publish the interface as a separate
          package with versioned compatibility guarantees.
        role: architect
        priority: p2
        complexity: critical
        scope: large

      - title: "AGENT-021: Add agent utilization dashboard showing active vs idle time per session"
        description: >
          Many agents spend time idle waiting for LLM responses. Track and display the ratio
          of active (tool use, writing) vs waiting (API call pending) time to help users
          optimize concurrency settings.
        role: frontend
        priority: p2
        complexity: medium
        scope: medium

      - title: "AGENT-022: Implement speculative agent pre-spawning based on task graph look-ahead"
        description: >
          When the task graph shows that a task's dependencies are nearly complete, pre-spawn
          the agent for that task so it is ready to start immediately when dependencies
          resolve. Reduce the critical path delay between sequential stages.
        role: backend
        priority: p2
        complexity: high
        scope: large

  # =========================================================================
  # Dimension 4: Permission & Security (22 tasks)
  # =========================================================================
  - name: "Permission & Security"
    description: >
      Harden security: command pattern evasion, path traversal, denial tracking,
      prompt injection detection, auth hardening, secret scanning, RBAC, and
      policy engine integration.
    steps:
      # --- P0 (8 tasks) ---
      - title: "SEC-001: Harden Bash command pattern matching against evasion"
        description: >
          auto_approve.py matches commands against allow/deny patterns, but patterns can be
          evaded with encoding tricks: r\\x6d -rf /, backtick substitution, $(echo rm) -rf,
          or environment variable expansion ($RM -rf). Add a normalization layer that
          resolves common evasion techniques before pattern matching.
        role: security
        priority: p0
        complexity: medium
        scope: medium

      - title: "SEC-002: Implement path traversal hardening for all file operations"
        description: >
          permissions.py uses fnmatch for path matching, but relative paths with ../ can
          escape allowed directories. Resolve all paths to absolute before permission
          checking and reject any path that resolves outside the project root or worktree.
        role: security
        priority: p0
        complexity: medium
        scope: medium

      - title: "SEC-003: Add permission denial tracking and alerting"
        description: >
          When a permission check denies an action, it is logged but there is no aggregation
          or alerting. Track denial events per agent session with counts and patterns. Alert
          (via notification channels) when an agent accumulates more than N denials
          (configurable, default 5), as this may indicate a misconfigured task scope or
          adversarial prompt injection.
        role: security
        priority: p0
        complexity: medium
        scope: medium

      - title: "SEC-004: Prevent prompt injection via task descriptions"
        description: >
          Task descriptions from bernstein.yaml or API are passed directly into agent system
          prompts. A malicious task description could inject instructions that override
          safety constraints. Add a prompt injection detection layer that scans task
          descriptions for known injection patterns (role-play instructions,
          ignore-previous-instructions, etc.) and quarantines suspicious tasks.
        role: security
        priority: p0
        complexity: high
        scope: large

      - title: "SEC-005: Harden the auth middleware to prevent token replay attacks"
        description: >
          server.py uses bearer token auth with _PUBLIC_PATHS exempt. The token is static
          and long-lived. Add: (1) token expiration with auto-refresh, (2) token binding to
          the run_id so tokens from previous runs cannot be replayed, (3) rate limiting per
          token to prevent brute force.
        role: security
        priority: p0
        complexity: medium
        scope: medium

      - title: "SEC-006: Add secret scanning to agent output before merge"
        description: >
          guardrails.py has secret detection patterns, but they are regex-based and miss many
          secret formats. Integrate with trufflehog or a comprehensive regex set (AWS keys,
          GCP tokens, GitHub PATs, Slack webhooks, database URLs) and hard-block merge when
          secrets are detected in the diff.
        role: security
        priority: p0
        complexity: medium
        scope: medium

      - title: "SEC-007: Implement file permission enforcement at the git hook level"
        description: >
          The permission matrix in permissions.py is enforced by the guardrails after
          completion, but a misbehaving agent can still modify protected files during
          execution. Install a pre-commit hook in each worktree that blocks commits touching
          denied paths, providing real-time enforcement rather than post-hoc detection.
        role: security
        priority: p0
        complexity: medium
        scope: medium

      - title: "SEC-008: Add RBAC for API endpoints (admin, operator, viewer roles)"
        description: >
          All authenticated API requests have the same privileges. An API token used for
          monitoring (GET /status) can also cancel tasks or modify configuration. Implement
          role-based access control with at least three roles: admin (full access), operator
          (task management), viewer (read-only).
        role: security
        priority: p0
        complexity: high
        scope: large

      # --- P1 (9 tasks) ---
      - title: "SEC-009: Implement layered permission decision graph with audit trail"
        description: >
          DecisionGraph in policy_engine.py evaluates layered decisions but does not persist
          the decision chain. For each permission check, record the full decision graph
          (which layers were evaluated, which rules matched, final decision) to an
          audit-friendly format for compliance review.
        role: security
        priority: p1
        complexity: medium
        scope: medium

      - title: "SEC-010: Add auto-mode classifier that adjusts permission strictness based on context"
        description: >
          In CI/headless mode, permission prompts cannot reach a human, so auto_approve must
          be both safe and permissive. Implement a context-aware classifier that: in
          interactive mode, is conservative (more ASK decisions); in CI mode, is liberal for
          safe operations and hard-blocks dangerous ones; in audit mode, logs everything.
        role: security
        priority: p1
        complexity: medium
        scope: medium

      - title: "SEC-011: Implement permission hooks for external policy engines"
        description: >
          Allow enterprise users to integrate external policy engines (OPA/Rego, Cedar,
          custom webhooks) as permission decision sources. Define a PermissionHook protocol
          that accepts (agent_role, action, resource) and returns (allow, deny, escalate).
        role: security
        priority: p1
        complexity: medium
        scope: medium

      - title: "SEC-012: Add sandbox escape detection for containerized agents"
        description: >
          sandbox.py runs agents in Docker/Podman containers, but there is no detection of
          attempted sandbox escapes. Monitor for: mount namespace changes, network access
          attempts when network_mode=none, capability escalation, and file writes outside
          mounted volumes.
        role: security
        priority: p1
        complexity: medium
        scope: medium

      - title: "SEC-013: Implement API key rotation support for long-running orchestrations"
        description: >
          key_rotation.py exists but is not integrated into the spawn pipeline. For
          orchestrations lasting hours, API keys may expire or be rotated externally. Wire
          key rotation into the adapter layer so that new spawns always use the freshest
          credentials without restarting the orchestrator.
        role: security
        priority: p1
        complexity: medium
        scope: medium

      - title: "SEC-014: Add network isolation validation for sandboxed agents"
        description: >
          When network_mode=none is configured, verify that the container actually has no
          network access by running a connectivity probe inside the container before handing
          control to the agent. Log a security warning if the probe succeeds.
        role: security
        priority: p1
        complexity: low
        scope: small

      - title: "SEC-015: Implement command allowlist per task scope"
        description: >
          Beyond per-role command permissions, allow per-task command restrictions. A task
          scoped to "write tests" should not need pip install, npm publish, or docker build.
          Add a task.allowed_commands field that further restricts the role-level allowlist.
        role: security
        priority: p1
        complexity: medium
        scope: medium

      - title: "SEC-016: Add differential privacy to telemetry exports"
        description: >
          differential_privacy.py exists but is not wired into the telemetry pipeline. Before
          exporting metrics to external systems (Prometheus, Datadog, OTLP), apply
          differential privacy noise to token counts, cost figures, and timing data to
          prevent reconstruction of proprietary code characteristics.
        role: security
        priority: p1
        complexity: medium
        scope: medium

      - title: "SEC-017: Implement sensitive file detection and handling"
        description: >
          Add a configurable list of sensitive file patterns (*.pem, *.key, .env*,
          *credentials*, *secret*) that are automatically excluded from agent context and
          trigger a security alert if an agent attempts to read or modify them.
        role: security
        priority: p1
        complexity: low
        scope: small

      # --- P2 (5 tasks) ---
      - title: "SEC-018: Add two-factor approval for destructive operations"
        description: >
          For operations like git push --force, database migrations, or production deploys,
          require two separate approvals (e.g., CLI confirmation + Slack approval) before
          proceeding.
        role: security
        priority: p2
        complexity: medium
        scope: medium

      - title: "SEC-019: Implement security posture scoring per run"
        description: >
          After each run, compute a security posture score based on: permissions denied vs
          escalated, secrets detected, sandbox violations, audit log integrity, and policy
          compliance. Display in the run report.
        role: security
        priority: p2
        complexity: medium
        scope: medium

      - title: "SEC-020: Add supply chain security verification for adapter binaries"
        description: >
          Before trusting an adapter binary (claude, codex, gemini), verify its integrity
          using checksums, code signing, or package manager verification. Warn when using
          unverified binaries.
        role: security
        priority: p2
        complexity: high
        scope: large

      - title: "SEC-021: Implement permission inheritance for nested task hierarchies"
        description: >
          Subtasks should inherit and potentially narrow (never widen) their parent task's
          permission scope. A security-scoped parent's subtasks should not be able to access
          frontend files even if the subtask role is "frontend".
        role: security
        priority: p2
        complexity: medium
        scope: medium

      - title: "SEC-022: Add security event correlation across multiple runs"
        description: >
          Track security events across runs to detect patterns: an agent that repeatedly
          triggers secret detection, a role that consistently hits permission denials, or a
          task pattern that leads to sandbox escapes.
        role: security
        priority: p2
        complexity: high
        scope: large

  # =========================================================================
  # Dimension 5: Hook System Expansion (17 tasks)
  # =========================================================================
  - name: "Hook System Expansion"
    description: >
      Expand and unify the hook system: complete event taxonomy, blocking hooks,
      webhook support, async dispatch, pattern matching, and declarative
      configuration.
    steps:
      # --- P0 (3 tasks) ---
      - title: "HOOK-001: Define the complete hook event taxonomy (28+ events)"
        description: >
          Design and document the full hook event taxonomy: task.created, task.claimed,
          task.completed, task.failed, task.retried, agent.spawned, agent.heartbeat,
          agent.completed, agent.killed, agent.stalled, merge.started, merge.completed,
          merge.conflict, quality_gate.passed, quality_gate.failed, budget.threshold,
          budget.exceeded, config.drift, orchestrator.tick, orchestrator.startup,
          orchestrator.shutdown, plan.loaded, plan.stage_completed, permission.denied,
          permission.escalated, secret.detected, circuit_breaker.tripped,
          cluster.node_joined.
        role: architect
        priority: p0
        complexity: medium
        scope: medium

      - title: "HOOK-002: Implement blocking hook support (hooks that can veto actions)"
        description: >
          Current hooks are fire-and-forget notifications. Add blocking hooks that can return
          allow or deny for pre-action events (pre_merge, pre_spawn, pre_approve). A
          blocking hook that returns deny prevents the action and logs the reason. Implement
          a timeout (default 5s) so a hung hook does not block the orchestrator.
        role: backend
        priority: p0
        complexity: high
        scope: large

      - title: "HOOK-003: Add HTTP webhook handler for remote hook consumers"
        description: >
          Allow hooks to be configured as HTTP POST webhooks (e.g., send a notification to
          Slack, PagerDuty, or a custom endpoint when a task fails). Support configurable
          retry, timeout, and authentication (bearer token, HMAC signature).
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      # --- P1 (9 tasks) ---
      - title: "HOOK-004: Implement async hook registry with concurrent execution"
        description: >
          Multiple hooks on the same event should execute concurrently, not sequentially.
          Implement an async hook dispatcher that runs all registered handlers for an event
          in parallel, collects results, and applies blocking decisions (any deny = denied).
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "HOOK-005: Add exec handler type (run shell command on hook event)"
        description: >
          Allow hooks to execute arbitrary shell commands: on_task_failed: exec:
          "notify-send 'Task {task_id} failed'". Support variable interpolation for event
          fields and configurable timeout.
        role: backend
        priority: p1
        complexity: low
        scope: small

      - title: "HOOK-006: Add prompt handler type (inject additional context on hook event)"
        description: >
          Allow hooks to inject additional prompt context into agent spawns:
          on_agent_spawned: prompt: "Remember to run tests after every change". This enables
          project-specific instructions without modifying role templates.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "HOOK-007: Implement hook pattern matching (filter by task role, status, adapter)"
        description: >
          Hooks should support conditional execution: on_task_completed: when:
          { role: security, scope: large }. Implement a pattern matching engine that
          evaluates hook conditions against event attributes.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "HOOK-008: Unify Claude Code hooks and pluggy hooks into single event bus"
        description: >
          hooks_receiver.py and plugins/hookspecs.py are separate systems. Route all Claude
          Code hook events through the same event bus that pluggy hooks use, so a single hook
          registration API handles both internal and external events.
        role: backend
        priority: p1
        complexity: high
        scope: large

      - title: "HOOK-009: Add hook execution metrics (latency, success rate, error rate)"
        description: >
          Track per-hook execution time, success/failure counts, and timeout occurrences.
          Expose as Prometheus metrics and in the bernstein status output so users can
          identify slow or failing hooks.
        role: backend
        priority: p1
        complexity: low
        scope: small

      - title: "HOOK-010: Implement hook configuration in bernstein.yaml"
        description: >
          Currently, hooks require Python code or pluggy plugin registration. Add declarative
          hook configuration in bernstein.yaml that supports exec, http, and prompt handler
          types without any code.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "HOOK-011: Add hook event replay for debugging"
        description: >
          Store all hook events in .sdd/runtime/hooks/events.jsonl and provide a
          bernstein hooks replay --from <timestamp> command that re-emits stored events to
          registered handlers for debugging hook configurations.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "HOOK-012: Implement hook priority ordering (high-priority hooks execute first)"
        description: >
          When multiple blocking hooks are registered on the same event, execution order
          matters. Add a priority field (1-10) to hook registrations so critical hooks
          (security, compliance) execute before convenience hooks (notifications, metrics).
        role: backend
        priority: p1
        complexity: low
        scope: small

      # --- P2 (5 tasks) ---
      - title: "HOOK-013: Add hook templates for common patterns (Slack, PagerDuty, Jira)"
        description: >
          Provide pre-built hook templates that users can activate with minimal
          configuration: hooks: slack_on_failure: { channel: "#alerts", events:
          [task.failed, circuit_breaker.tripped] }.
        role: backend
        priority: p2
        complexity: medium
        scope: medium

      - title: "HOOK-014: Implement hook composition (chain multiple handlers on one event)"
        description: >
          Allow hook chains where the output of one handler feeds into the next: event ->
          validate -> transform -> notify. Each step can modify the event payload or abort
          the chain.
        role: backend
        priority: p2
        complexity: medium
        scope: medium

      - title: "HOOK-015: Add hook dry-run mode for testing configurations"
        description: >
          bernstein hooks test --event task.failed --payload '{...}' sends a synthetic event
          through all registered hooks and shows what would happen without actually executing
          side effects.
        role: backend
        priority: p2
        complexity: low
        scope: small

      - title: "HOOK-016: Implement rate-limited hooks to prevent notification storms"
        description: >
          When many tasks fail in quick succession, each failure triggers its own hook
          notification. Add hook-level rate limiting (e.g., max 1 Slack notification per
          event type per 60 seconds) with batching of suppressed events.
        role: backend
        priority: p2
        complexity: low
        scope: small

      - title: "HOOK-017: Add hook event schema validation"
        description: >
          Validate that hook payloads conform to documented event schemas before dispatching.
          Reject malformed events with clear error messages to catch integration bugs early.
        role: backend
        priority: p2
        complexity: low
        scope: small

  # =========================================================================
  # Dimension 6: TUI & Terminal UX (20 tasks)
  # =========================================================================
  - name: "TUI & Terminal UX"
    description: >
      Improve TUI stability and features: resize handling, rendering fixes,
      terminal fallback, keybindings, visual status indicators, split panes,
      accessibility, and theme support.
    steps:
      # --- P0 (3 tasks) ---
      - title: "TUI-001: Fix terminal resizing crash in TUI app"
        description: >
          Rapidly resizing the terminal while the TUI is running can cause layout
          calculation errors and crashes in Textual. Add a resize debounce handler that
          delays layout recalculation until resizing settles (200ms debounce) and catches
          layout errors gracefully.
        role: frontend
        priority: p0
        complexity: medium
        scope: medium

      - title: "TUI-002: Fix TUI rendering artifacts when agent count exceeds visible rows"
        description: >
          When more agents are active than fit on screen, the scrollable agent list leaves
          rendering artifacts (partial lines, color bleed) on some terminal emulators.
          Implement proper viewport clipping and scroll buffer management.
        role: frontend
        priority: p0
        complexity: medium
        scope: medium

      - title: "TUI-003: Add graceful TUI fallback for terminals that do not support Textual"
        description: >
          When the terminal does not support the features Textual requires (e.g., basic SSH
          terminals, screen sessions, CI logs), the TUI crashes or displays garbage. Detect
          terminal capabilities on startup and fall back to a Rich-based simple status
          display.
        role: frontend
        priority: p0
        complexity: low
        scope: small

      # --- P1 (10 tasks) ---
      - title: "TUI-004: Implement keybinding system with configurable shortcuts"
        description: >
          keybindings.py exists at the top level but is not integrated into the TUI. Define
          default keybindings (q=quit, h=help, t=tasks, a=agents, l=logs, c=cost, g=graph,
          /=search) and allow user customization via ~/.bernstein/keybindings.yaml.
        role: frontend
        priority: p1
        complexity: medium
        scope: medium

      - title: "TUI-005: Add visual distinction for all agent states"
        description: >
          The TUI shows agents but does not visually distinguish between states. Add
          color-coded status indicators: green=running, yellow=spawning, orange=stalled,
          blue=merging, red=failed, gray=idle. Include animated spinners for in-progress
          states.
        role: frontend
        priority: p1
        complexity: medium
        scope: medium

      - title: "TUI-006: Implement cost sparkline in TUI sidebar"
        description: >
          Display a real-time sparkline chart of cost accumulation over time in the TUI
          sidebar. Use Unicode block characters for a compact visualization that shows spend
          rate trends.
        role: frontend
        priority: p1
        complexity: low
        scope: small

      - title: "TUI-007: Add copy-to-clipboard support for task IDs, agent logs, and error messages"
        description: >
          Allow users to select text in the TUI and copy it to the system clipboard using
          standard terminal escape sequences (OSC 52). Add a y keybinding to yank the
          currently selected item's ID or log content.
        role: frontend
        priority: p1
        complexity: low
        scope: small

      - title: "TUI-008: Implement TUI split-pane view (tasks + live agent log)"
        description: >
          Add a split-pane layout where the left pane shows the task list and the right pane
          shows the live log output of the selected agent. Allow switching focus between
          panes with Tab.
        role: frontend
        priority: p1
        complexity: high
        scope: large

      - title: "TUI-009: Add TUI notification toast for important events"
        description: >
          Show brief toast notifications in the TUI for important events: task completed,
          agent killed, budget threshold reached, merge conflict. Toasts auto-dismiss after
          5 seconds or on keypress.
        role: frontend
        priority: p1
        complexity: low
        scope: small

      - title: "TUI-010: Implement task progress bar with completion percentage"
        description: >
          Show a progress bar per task based on: (1) heartbeat progress_pct if available,
          (2) elapsed time vs estimated duration, (3) completion signal status. Aggregate
          into a run-level progress bar at the top.
        role: frontend
        priority: p1
        complexity: medium
        scope: medium

      - title: "TUI-011: Add TUI dark/light theme support"
        description: >
          color_mode.py exists but is not used by the TUI. Add theme switching
          (dark/light/system) with t keybinding and persistence in user config.
        role: frontend
        priority: p1
        complexity: low
        scope: small

      - title: "TUI-012: Implement TUI command palette (fuzzy search for all actions)"
        description: >
          Add a command palette (activated by : or Ctrl+P) that provides fuzzy search across
          all available TUI actions, similar to VS Code's command palette.
        role: frontend
        priority: p1
        complexity: medium
        scope: medium

      - title: "TUI-013: Add TUI accessibility mode (screen reader friendly output)"
        description: >
          Add an accessibility mode that outputs structured, screen-reader-friendly text
          instead of visual widgets. Ensure all status information is conveyed through text,
          not just color or position.
        role: frontend
        priority: p1
        complexity: medium
        scope: medium

      # --- P2 (7 tasks) ---
      - title: "TUI-014: Implement vim-mode keybindings for TUI navigation"
        description: >
          Add hjkl navigation, / for search, gg/G for top/bottom, and : for command mode.
          Gated behind a vim_mode: true config option.
        role: frontend
        priority: p2
        complexity: medium
        scope: medium

      - title: "TUI-015: Add TUI agent timeline visualization (Gantt chart)"
        description: >
          Display a horizontal timeline showing when each agent was active, with task labels.
          This gives a visual overview of parallelism utilization and helps identify
          bottlenecks.
        role: frontend
        priority: p2
        complexity: high
        scope: large

      - title: "TUI-016: Implement TUI persistent layout customization"
        description: >
          Allow users to resize panes, hide/show panels, and save their preferred layout to
          ~/.bernstein/tui_layout.yaml.
        role: frontend
        priority: p2
        complexity: medium
        scope: medium

      - title: "TUI-017: Add TUI mouse support for panel interaction"
        description: >
          Enable mouse click to select tasks, scroll with mouse wheel, and drag to resize
          panes. Textual supports mouse input natively.
        role: frontend
        priority: p2
        complexity: low
        scope: small

      - title: "TUI-018: Implement TUI task detail overlay with full context"
        description: >
          Pressing Enter on a task opens a full-screen overlay showing: description, agent
          assignment, current status, log tail, diff preview, quality gate results, and cost.
        role: frontend
        priority: p2
        complexity: medium
        scope: medium

      - title: "TUI-019: Add TUI session recording and playback"
        description: >
          Record TUI screen state changes to a file so that completed runs can be replayed
          as a terminal movie. Useful for team reviews and demos.
        role: frontend
        priority: p2
        complexity: high
        scope: large

      - title: "TUI-020: Implement TUI notification badge for background events"
        description: >
          When the user is focused on one panel, show badge counts on other panels indicating
