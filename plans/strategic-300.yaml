  # =========================================================================
  # Dimension 13: Cost Tracking & Budgets (17 tasks)
  # =========================================================================
  - name: "Cost Tracking & Budgets"
    description: >
      Improve cost tracking: budget race conditions, per-model token breakdown,
      real-time display, estimation, enforcement actions, cache tracking,
      anomaly analysis, and forecasting.
    steps:
      # --- P0 (3 tasks) ---
      - title: "COST-001: Fix budget enforcement race condition between concurrent spawns"
        description: >
          When multiple agents complete simultaneously, their costs are recorded
          independently. If two agents complete at 90% budget each, the total can exceed 100%
          before the check fires. Add atomic budget checking with a lock that prevents
          spawning new agents while cost updates are being processed.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "COST-002: Implement per-model token breakdown in cost reports"
        description: >
          The RunCostReport has ModelCostBreakdown but it is not populated by all adapters.
          Ensure every adapter reports: input_tokens, output_tokens, cache_read_tokens,
          cache_creation_tokens, and model name. Without accurate token breakdowns, cost
          optimization is guesswork.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "COST-003: Add real-time cost tracking visible during run"
        description: >
          Cost is tracked internally but not surfaced until bernstein cost is run after
          completion. Add real-time cost display in the TUI sidebar and expose current cost
          via the /costs/current API endpoint updated after each agent completion.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      # --- P1 (9 tasks) ---
      - title: "COST-004: Implement cost estimation before turn (pre-spawn projection)"
        description: >
          Before spawning an agent, estimate the expected cost based on: task scope, role,
          model, and historical data for similar tasks. Display the estimate in --dry-run and
          use it to make budget-aware spawn decisions.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "COST-005: Add budget enforcement actions (pause, downgrade model, abort)"
        description: >
          At budget thresholds, the current response is warning logs. Add configurable
          enforcement actions: at 80% -- downgrade remaining tasks to cheaper models; at 95%
          -- pause spawning and notify; at 100% -- abort run with cost report.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "COST-006: Implement cache token tracking for prompt caching savings"
        description: >
          Anthropic charges differently for cached vs uncached tokens. Track cache_read_tokens
          separately and calculate actual savings. Display cache hit rate and savings in cost
          reports.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "COST-007: Add cost hooks for external notification (Slack, email, webhook)"
        description: >
          Wire cost threshold events into the hook system: budget.threshold_80,
          budget.threshold_95, budget.exceeded. Allow users to configure notifications for
          cost events.
        role: backend
        priority: p1
        complexity: low
        scope: small

      - title: "COST-008: Implement per-agent cost attribution and leaderboard"
        description: >
          Track cumulative cost per agent session and rank agents by cost efficiency (cost per
          successfully completed task). Display in bernstein cost --agents for identifying
          expensive patterns.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "COST-009: Add historical cost comparison across runs"
        description: >
          cost_history.py tracks historical data. Add bernstein cost compare <run-1> <run-2>
          that shows: total cost delta, per-model breakdown delta, and identifies which tasks
          were more/less expensive.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "COST-010: Implement cost forecasting based on plan complexity"
        description: >
          Given a plan file, forecast total cost before execution using: historical
          cost-per-task-type averages, model pricing, and estimated token consumption.
          Display as part of --dry-run output.
        role: backend
        priority: p1
        complexity: high
        scope: large

      - title: "COST-011: Add cost anomaly root cause analysis"
        description: >
          cost_anomaly.py detects anomalies but does not explain them. When an anomaly is
          detected, analyze: which agent was responsible, what was different about the task,
          whether context size was unusually large, and whether retries inflated cost.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "COST-012: Implement model cost comparison recommender"
        description: >
          After a run, analyze which tasks could have used a cheaper model without quality
          loss. Recommend model downgrades for future runs: "Task X used opus ($0.83) but
          similar tasks succeeded with sonnet ($0.12) -- consider downgrading".
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      # --- P2 (5 tasks) ---
      - title: "COST-013: Add cost allocation tags for department/project billing"
        description: >
          Allow cost allocation tags in bernstein.yaml (cost_tags: { department: engineering,
          project: auth-migration }) that are included in cost reports for chargeback.
        role: backend
        priority: p2
        complexity: medium
        scope: medium

      - title: "COST-014: Implement cost optimization autopilot"
        description: >
          An automated mode that adjusts model selection in real-time based on cost targets.
          If the run is trending over budget, automatically downgrade non-critical tasks. If
          under budget, allow upgrades for complex tasks.
        role: backend
        priority: p2
        complexity: high
        scope: large

      - title: "COST-015: Add cost visualization in web dashboard"
        description: >
          Add cost charts to the web dashboard: spend over time, per-model breakdown pie
          chart, budget utilization gauge, and per-task cost bar chart.
        role: frontend
        priority: p2
        complexity: medium
        scope: medium

      - title: "COST-016: Implement cost-aware task scheduling"
        description: >
          Schedule expensive tasks (large scope, opus model) first when budget is fresh, and
          defer cheaper tasks to the end. This ensures critical work gets done even if budget
          is exhausted.
        role: backend
        priority: p2
        complexity: high
        scope: large

      - title: "COST-017: Add multi-currency cost display support"
        description: >
          Cost is currently displayed in USD. Add configurable currency display with automatic
          conversion using a configurable exchange rate.
        role: backend
        priority: p2
        complexity: low
        scope: small

