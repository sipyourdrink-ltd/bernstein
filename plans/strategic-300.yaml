        priority: p1
        complexity: medium
        scope: medium

      - title: "DOC-005: Write performance tuning guide"
        description: >
          Cover: optimal max_agents for different API tiers, concurrency vs cost tradeoffs,
          prompt caching optimization, worktree vs branch isolation, and hardware
          requirements for different workload sizes.
        role: docs
        priority: p1
        complexity: medium
        scope: medium

      - title: "DOC-006: Write deployment guide for common environments"
        description: >
          Cover: local development setup, CI/CD integration (GitHub Actions, GitLab CI),
          Docker deployment, Kubernetes/Helm deployment, and team shared server deployment.
          Each with complete configuration examples.
        role: docs
        priority: p1
        complexity: high
        scope: large

      - title: "DOC-007: Write cost optimization guide"
        description: >
          Cover: model selection strategies, prompt caching best practices, budget
          configuration, batch API usage for non-urgent work, and cost monitoring setup.
        role: docs
        priority: p1
        complexity: medium
        scope: medium

      - title: "DOC-008: Write hook system developer guide with examples"
        description: >
          Cover: all hook events, handler types (exec, http, prompt), blocking vs
          non-blocking hooks, pattern matching, and complete examples for common use cases
          (Slack notifications, CI triggers, custom quality gates).
        role: docs
        priority: p1
        complexity: medium
        scope: medium

      - title: "DOC-009: Write security hardening guide"
        description: >
          Cover: permission matrix configuration, sandbox setup, audit mode, secret
          management, network isolation, API authentication, and compliance reporting.
        role: docs
        priority: p1
        complexity: medium
        scope: medium

      - title: "DOC-010: Create interactive quickstart tutorial"
        description: >
          Write a step-by-step tutorial that takes users from zero to a completed multi-agent
          run in under 10 minutes. Include: installation, first run, understanding output,
          checking results, and next steps.
        role: docs
        priority: p1
        complexity: high
        scope: large

      - title: "DOC-011: Write migration guides from competing tools (CrewAI, LangGraph)"
        description: >
          migration-from-crewai.md and migration-from-langgraph.md exist but are light on
          practical conversion steps. Add detailed mapping guides: how CrewAI agents map to
          Bernstein roles, how LangGraph workflows map to Bernstein plans.
        role: docs
        priority: p1
        complexity: medium
        scope: medium

      # --- P2 (6 tasks) ---
      - title: "DOC-012: Write architecture decision records (ADRs) for key decisions"
        description: >
          Document the rationale behind key architectural decisions: why file-based state, why
          short-lived agents, why no embedded LLM, why pluggy for plugins, why Click for CLI.
        role: docs
        priority: p2
        complexity: medium
        scope: medium

      - title: "DOC-013: Create video tutorials for key workflows"
        description: >
          Record terminal-based tutorials (using asciinema) for: first run, multi-agent
          orchestration, debugging a failed task, cost optimization, and custom hooks.
        role: docs
        priority: p2
        complexity: high
        scope: large

      - title: "DOC-014: Write cost formula documentation with worked examples"
        description: >
          Document exactly how costs are calculated: model pricing table, token counting
          methodology, cache discount calculation, and budget enforcement formula. Include
          worked examples.
        role: docs
        priority: p2
        complexity: low
        scope: small

      - title: "DOC-015: Add runbook templates for operational scenarios"
        description: >
          Provide runbook templates for: "run is over budget", "agent is stuck in a loop",
          "merge conflict during orchestration", "server crashed mid-run", and "security
          alert during execution".
        role: docs
        priority: p2
        complexity: medium
        scope: medium

      - title: "DOC-016: Write plugin development guide with example plugin"
        description: >
          Document the pluggy hook specifications, how to write a plugin, how to package and
          distribute it, and provide a complete example plugin (e.g., custom quality gate).
        role: docs
        priority: p2
        complexity: medium
        scope: medium

      - title: "DOC-017: Create a glossary of Bernstein-specific terms"
        description: >
          Define all Bernstein-specific terms: tick, spawn, reap, drain, janitor, circuit
          breaker, fast path, quality gate, bulletin board, worktree isolation, etc.
        role: docs
        priority: p2
        complexity: low
        scope: small

  # =========================================================================
  # Dimension 15: Enterprise & Scale (20 tasks)
  # =========================================================================
  - name: "Enterprise & Scale"
    description: >
      Enterprise features: multi-tenant isolation, cluster auth, audit
      integrity, compliance reporting, SLA monitoring, SSO, task stealing,
      quotas, data residency, disaster recovery, and auto-scaling.
    steps:
      # --- P0 (5 tasks) ---
      - title: "ENT-001: Implement multi-tenant task isolation in shared server deployments"
        description: >
          tenanting.py normalizes tenant IDs but the task store, WAL, and metrics are not
          tenant-scoped. In a shared server deployment, tasks from different tenants can see
          each other. Add tenant_id scoping to all data paths: .sdd/{tenant_id}/, API routes
          with tenant context, and tenant-filtered queries.
        role: architect
        priority: p0
        complexity: high
        scope: large

      - title: "ENT-002: Harden cluster node registration against impersonation"
        description: >
          NodeRegistry in cluster.py accepts node registrations without authentication. A
          malicious actor could register a fake node and steal tasks. Add mutual TLS or
          JWT-based authentication for node registration and heartbeats.
        role: security
        priority: p0
        complexity: medium
        scope: medium

      - title: "ENT-003: Implement audit log integrity verification on startup"
        description: >
          The HMAC-chained audit log (audit.py) is tamper-evident, but integrity is only
          verified on demand (bernstein audit verify). Add automatic verification on
          orchestrator startup that checks the last N entries (configurable, default 100) and
          warns if integrity is compromised.
        role: security
        priority: p0
        complexity: medium
        scope: medium

      - title: "ENT-004: Add compliance reporting for SOC 2 evidence collection"
        description: >
          bernstein audit export --period Q1-2026 exists but the export format is raw JSONL.
          Transform the export into a structured compliance package: control mappings (CC6.1,
          CC7.2), evidence summaries, Merkle root attestation, and PDF-ready formatting.
        role: architect
        priority: p0
        complexity: high
        scope: large

      - title: "ENT-005: Implement SLA monitoring with breach alerting"
        description: >
          slo_tracker.py tracks SLOs but there is no breach detection or alerting. Add
          configurable SLA definitions (e.g., "95% of tasks complete within 30 minutes") with
          real-time monitoring and alert notifications when SLA breach is imminent or actual.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      # --- P1 (9 tasks) ---
      - title: "ENT-006: Implement SSO/OIDC authentication for web dashboard and API"
        description: >
          oauth_pkce.py implements OAuth PKCE flow. Extend to support full OIDC integration
          with enterprise IdPs (Okta, Azure AD, Google Workspace). Map IdP groups to
          Bernstein RBAC roles.
        role: security
        priority: p1
        complexity: high
        scope: large

      - title: "ENT-007: Add cluster mode task stealing for load balancing"
        description: >
          When one cluster node is overloaded and another is idle, the idle node should be
          able to steal unclaimed tasks from the overloaded node. Implement task stealing with
          proper locking to prevent double-claims.
        role: backend
        priority: p1
        complexity: high
        scope: large

      - title: "ENT-008: Implement per-tenant rate limiting and quota enforcement"
        description: >
          In multi-tenant mode, each tenant should have configurable quotas: max concurrent
          agents, max tasks per hour, max cost per day. Enforce at the API layer and display
          quota usage in tenant dashboards.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "ENT-009: Add data residency controls for compliance"
        description: >
          The ModelPolicy in router.py supports required_region but there is no enforcement
          layer that validates actual data flow. Add data residency validation that verifies
          API calls go to compliant regions and blocks non-compliant routing.
        role: security
        priority: p1
        complexity: medium
        scope: medium

      - title: "ENT-010: Implement disaster recovery with cross-region replication"
        description: >
          disaster_recovery.py exists but is not a full DR solution. Implement: state
          snapshot to S3/GCS, cross-region replication for the task store, automated failover
          detection, and recovery runbook generation.
        role: devops
        priority: p1
        complexity: critical
        scope: large

      - title: "ENT-011: Add IP allowlisting enforcement for API access"
        description: >
          ip_allowlist.py exists in core. Wire it into the server middleware so that API
          requests from non-allowlisted IPs are rejected with a 403. Support CIDR ranges and
          auto-allowlisting of cluster node IPs.
        role: security
        priority: p1
        complexity: low
        scope: small

      - title: "ENT-012: Implement audit log export to external SIEM systems"
        description: >
          Export audit events in real-time to external SIEM systems (Splunk, Elasticsearch,
          CloudWatch) via configurable exporters. Support syslog, webhook, and file-based
          export.
        role: devops
        priority: p1
        complexity: medium
        scope: medium

      - title: "ENT-013: Add cluster auto-scaling based on task queue depth"
        description: >
          When the task queue grows beyond a configurable threshold, automatically request
          additional worker nodes (via cloud APIs or Kubernetes HPA). Scale down when the
          queue is empty.
        role: devops
        priority: p1
        complexity: high
        scope: large

      - title: "ENT-014: Implement enterprise license management"
        description: >
          Add license key validation for enterprise features (cluster mode, SSO, audit
          export, multi-tenant). Free tier gets single-node, community features. Enterprise
          tier unlocks all capabilities.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      # --- P2 (6 tasks) ---
      - title: "ENT-015: Add team collaboration features (shared plans, run sharing)"
        description: >
          Allow teams to share plans, view each other's runs, and collaborate on task review.
          Implement via shared server with team-scoped access control.
        role: backend
        priority: p2
        complexity: high
        scope: large

      - title: "ENT-016: Implement organizational policy templates"
        description: >
          Allow org admins to define policy templates that are automatically applied to all
          projects: required quality gates, mandatory audit mode, model restrictions, and cost
          limits.
        role: architect
        priority: p2
        complexity: medium
        scope: medium

      - title: "ENT-017: Add usage analytics dashboard for org administrators"
        description: >
          Provide an org-level dashboard showing: total cost across teams, most active
          projects, model usage distribution, quality gate pass rates, and trending security
          issues.
        role: frontend
        priority: p2
        complexity: high
        scope: large

      - title: "ENT-018: Implement federated authentication for cross-org collaboration"
        description: >
          Allow agents from different organizations to collaborate on shared tasks via A2A
          federation with cross-org authentication and authorization.
        role: security
        priority: p2
        complexity: critical
        scope: large

      - title: "ENT-019: Add compliance dashboard with control status tracking"
        description: >
          Track compliance control status (SOC 2, ISO 27001, EU AI Act) in a dashboard that
          shows: controls met, controls at risk, evidence gaps, and remediation
          recommendations.
        role: frontend
        priority: p2
        complexity: high
        scope: large

      - title: "ENT-020: Implement blue-green deployment support for zero-downtime upgrades"
        description: >
          Allow running two versions of Bernstein simultaneously, with traffic gradually
          shifted from old to new. If the new version shows errors, automatically roll back.
        role: devops
        priority: p2
        complexity: high
        scope: large
