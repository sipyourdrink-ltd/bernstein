        role: frontend
        priority: p2
        complexity: low
        scope: small

  # =========================================================================
  # Dimension 7: Web Dashboard & API (22 tasks)
  # =========================================================================
  - name: "Web Dashboard & API"
    description: >
      Improve the web dashboard and API: CORS, rate limiting, SSE fixes,
      OpenAPI spec, authentication, WebSocket, versioning, export, and
      mobile-responsive layout.
    steps:
      # --- P0 (5 tasks) ---
      - title: "WEB-001: Implement CORS configuration for web dashboard access"
        description: >
          The FastAPI server has no CORS middleware. Browsers accessing the dashboard from a
          different origin (e.g., VS Code webview, localhost:3000 frontend) are blocked. Add
          configurable CORS with sensible defaults (allow localhost:* origins, configurable
          for production).
        role: backend
        priority: p0
        complexity: low
        scope: small

      - title: "WEB-002: Add rate limiting per API endpoint to prevent abuse"
        description: >
          RequestRateLimitMiddleware exists but applies a single global rate limit. Add
          per-endpoint rate limiting: write endpoints (POST/PUT/DELETE) get stricter limits
          (30/min), read endpoints (GET) get higher limits (300/min), and the /events SSE
          endpoint gets connection limits (10 concurrent).
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "WEB-003: Fix SSE event stream memory leak on disconnected clients"
        description: >
          The /events SSE endpoint maintains an in-memory buffer of events per client. When
          clients disconnect without clean close, the buffer is never freed. Add disconnect
          detection (heartbeat ping), buffer size limits, and cleanup on connection timeout.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "WEB-004: Generate and serve OpenAPI specification from route definitions"
        description: >
          FastAPI auto-generates OpenAPI docs at /docs and /openapi.json, but the current
          routes use untyped dict responses. Add Pydantic response models to all endpoints so
          the OpenAPI spec is accurate and useful for client SDK generation.
        role: backend
        priority: p0
        complexity: medium
        scope: medium

      - title: "WEB-005: Add authentication to the web dashboard"
        description: >
          The dashboard at /dashboard is listed in _PUBLIC_PATHS and requires no
          authentication. Anyone with network access can view task details, agent status, and
          cost information. Add session-based auth for the dashboard with a configurable
          password or token.
        role: security
        priority: p0
        complexity: medium
        scope: medium

      # --- P1 (10 tasks) ---
      - title: "WEB-006: Implement real-time WebSocket frontend for live dashboard updates"
