        priority: p1
        complexity: low
        scope: small

      - title: "CFG-012: Implement config override via CLI flags for all key settings"
        description: >
          Allow CLI overrides for commonly changed settings: bernstein run --max-agents 3
          --budget 5 --model sonnet. CLI flags override config file values for that run only.
        role: backend
        priority: p1
        complexity: medium
        scope: medium

      - title: "CFG-013: Add config lint command for best practice suggestions"
        description: >
          bernstein config lint analyzes the configuration and suggests improvements:
          "Warning: budget is $0 -- agents may run without spending limits", "Suggestion:
          enable quality_gates.type_check for Python projects", "Info: consider setting
          max_agents based on your API tier".
