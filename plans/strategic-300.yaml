          exceeded, permission denied) and have no centralized troubleshooting resource. Write
          a guide with: symptom, cause, diagnosis steps, and resolution for each failure
          mode.
        role: docs
        priority: p0
        complexity: high
        scope: large

      - title: "DOC-002: Create state machine diagrams for task and agent lifecycles"
        description: >
          The lifecycle FSM is defined in code (lifecycle.py) but never visualized. Generate
          Mermaid state diagrams showing: all task states, all agent states, allowed
          transitions, and transition triggers. Include in DESIGN.md and the web docs.
        role: docs
        priority: p0
        complexity: medium
        scope: medium

      - title: "DOC-003: Write adapter selection guide with comparison matrix"
        description: >
          Users need to choose between 24+ adapters. Create a comparison matrix showing:
