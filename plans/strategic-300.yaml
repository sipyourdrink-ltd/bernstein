        priority: p2
        complexity: high
        scope: large

      - title: "WEB-017: Add API batch operations endpoint for task management"
        description: >
          Allow batch task operations: POST /api/v1/tasks/batch { action: "cancel",
          ids: [...] } for cancel, retry, re-prioritize, and tag operations.
