<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bernstein Mission Control</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0d1117',
            surface: '#161b22',
            'surface-2': '#1c2128',
            border: '#30363d',
            text: '#c9d1d9',
            muted: '#8b949e',
            accent: '#58a6ff',
          },
          fontFamily: {
            mono: ['JetBrains Mono', 'Fira Code', 'SF Mono', 'Menlo', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0d1117; color: #c9d1d9; }
    @keyframes pulse-green { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulse-dot { animation: pulse-green 2s ease-in-out infinite; }
    @keyframes slide-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .slide-in { animation: slide-in 0.2s ease-out; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #161b22; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }
    .gantt-bar { transition: width 0.3s ease; }
    .log-line { font-size: 11px; line-height: 1.4; }
    /* Tab styles */
    .tab-btn { border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab-btn.active { border-bottom-color: #58a6ff; color: #c9d1d9; }
    .tab-btn:not(.active) { color: #8b949e; }
    .tab-btn:hover:not(.active) { color: #c9d1d9; }
  </style>
</head>
<body class="min-h-screen font-sans antialiased" x-data="missionControl()">

  <!-- Header -->
  <header class="bg-surface border-b border-border px-4 py-2.5 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none" class="shrink-0">
        <rect width="32" height="32" rx="6" fill="#58a6ff" fill-opacity="0.15"/>
        <path d="M8 24V10l8-4 8 4v14l-8 4-8-4z" stroke="#58a6ff" stroke-width="1.5" fill="none"/>
        <path d="M16 6v22M8 10l8 4 8-4" stroke="#58a6ff" stroke-width="1.5" fill="none"/>
      </svg>
      <div>
        <h1 class="text-sm font-semibold text-text tracking-wide">MISSION CONTROL</h1>
        <p class="text-[10px] text-muted uppercase tracking-widest">Bernstein Orchestrator</p>
      </div>
    </div>
    <div class="flex items-center gap-5">
      <!-- Connection status -->
      <div class="flex items-center gap-1.5 text-xs">
        <span class="inline-block w-1.5 h-1.5 rounded-full"
              :class="connected ? 'bg-green-500 pulse-dot' : 'bg-red-500'"></span>
        <span class="text-muted" x-text="connected ? 'Live' : 'Offline'"></span>
      </div>
      <!-- Elapsed -->
      <div class="text-xs font-mono text-muted" x-text="elapsedFormatted"></div>
      <!-- Refresh indicator -->
      <div class="text-[10px] text-muted/50" x-text="'Updated ' + lastUpdate"></div>
    </div>
  </header>

  <!-- Stats Bar -->
  <div class="bg-surface border-b border-border px-4 py-2">
    <div class="flex items-center gap-4 flex-wrap text-xs">
      <template x-for="s in statItems" :key="s.label">
        <div class="flex items-center gap-1.5">
          <span class="inline-block w-1.5 h-1.5 rounded-full" :class="s.dotClass"></span>
          <span class="text-muted" x-text="s.label"></span>
          <span class="font-semibold font-mono" :class="s.valueClass" x-text="s.value"></span>
        </div>
      </template>
      <div class="border-l border-border h-4 mx-1"></div>
      <!-- Progress bar -->
      <div class="flex items-center gap-2 flex-1 min-w-[120px] max-w-[200px]">
        <div class="flex-1 h-1.5 bg-border rounded-full overflow-hidden">
          <div class="h-full bg-green-500 rounded-full transition-all duration-500"
               :style="'width:' + progressPct + '%'"></div>
        </div>
        <span class="text-muted font-mono text-[10px]" x-text="progressPct + '%'"></span>
      </div>
    </div>
  </div>

  <!-- Main Grid Layout -->
  <div class="grid grid-cols-12 gap-0 h-[calc(100vh-88px)]">

    <!-- Left Column: Agent Grid (3 cols) -->
    <div class="col-span-3 border-r border-border overflow-y-auto p-3 space-y-2">
      <div class="flex items-center justify-between mb-1">
        <h2 class="text-[10px] font-semibold text-muted uppercase tracking-widest">Agents</h2>
        <span class="text-[10px] text-muted font-mono" x-text="agents.length + ' active'"></span>
      </div>

      <!-- Agent Cards -->
      <template x-for="agent in agents" :key="agent.id">
        <div class="bg-surface border border-border rounded-lg p-2.5 slide-in cursor-pointer hover:border-accent/40 transition-colors"
             @click="selectAgent(agent.id)">
          <div class="flex items-center justify-between mb-1.5">
            <div class="flex items-center gap-1.5">
              <span class="inline-block w-2 h-2 rounded-full"
                    :class="agent.status === 'working' ? 'bg-green-500 pulse-dot' : agent.status === 'idle' ? 'bg-yellow-500' : 'bg-gray-500'"></span>
              <span class="font-mono text-[11px] text-text" x-text="agent.id.slice(0, 12)"></span>
            </div>
            <span class="text-[10px] px-1.5 py-0.5 rounded bg-accent/10 text-accent font-medium" x-text="agent.role"></span>
          </div>
          <!-- Model + Runtime -->
          <div class="flex items-center justify-between text-[10px] text-muted mb-1.5">
            <span x-text="agent.model"></span>
            <span class="font-mono" x-text="formatRuntime(agent.runtime_s)"></span>
          </div>
          <!-- Task progress -->
          <template x-for="task in agent.tasks" :key="task.id">
            <div class="mb-1">
              <div class="flex items-center justify-between text-[10px] mb-0.5">
                <span class="text-text truncate max-w-[140px]" x-text="task.title"></span>
                <span class="text-muted font-mono" x-text="task.progress + '%'"></span>
              </div>
              <div class="h-1 bg-border rounded-full overflow-hidden">
                <div class="h-full rounded-full transition-all duration-300"
                     :class="task.status === 'done' ? 'bg-green-500' : task.status === 'failed' ? 'bg-red-500' : 'bg-accent'"
                     :style="'width:' + task.progress + '%'"></div>
              </div>
            </div>
          </template>
          <!-- Cost -->
          <div class="flex items-center justify-between text-[10px] mt-1 pt-1 border-t border-border/50">
            <span class="text-muted">Cost</span>
            <span class="font-mono text-green-400" x-text="'$' + agent.cost_usd.toFixed(2)"></span>
          </div>
        </div>
      </template>

      <template x-if="agents.length === 0">
        <div class="text-center py-8">
          <p class="text-xs text-muted">No active agents</p>
        </div>
      </template>
    </div>

    <!-- Center Column: Tasks + Gantt (6 cols) -->
    <div class="col-span-6 border-r border-border flex flex-col overflow-hidden">

      <!-- Tabs -->
      <div class="flex border-b border-border px-3">
        <button class="tab-btn px-3 py-2 text-xs font-medium" :class="centerTab === 'tasks' && 'active'"
                @click="centerTab = 'tasks'">Task Board</button>
        <button class="tab-btn px-3 py-2 text-xs font-medium" :class="centerTab === 'gantt' && 'active'"
                @click="centerTab = 'gantt'">Timeline</button>
        <button class="tab-btn px-3 py-2 text-xs font-medium" :class="centerTab === 'files' && 'active'"
                @click="centerTab = 'files'">File Locks</button>
      </div>

      <!-- Task Board -->
      <div x-show="centerTab === 'tasks'" class="flex-1 overflow-auto p-3">
        <div class="overflow-x-auto rounded-lg border border-border">
          <table class="w-full text-xs">
            <thead class="bg-surface sticky top-0">
              <tr class="border-b border-border">
                <th class="px-3 py-2 text-left text-[10px] font-medium text-muted uppercase tracking-wider cursor-pointer hover:text-accent"
                    @click="sortTasks('id')">ID</th>
                <th class="px-3 py-2 text-left text-[10px] font-medium text-muted uppercase tracking-wider cursor-pointer hover:text-accent"
                    @click="sortTasks('title')">Title</th>
                <th class="px-3 py-2 text-left text-[10px] font-medium text-muted uppercase tracking-wider cursor-pointer hover:text-accent"
                    @click="sortTasks('role')">Role</th>
                <th class="px-3 py-2 text-left text-[10px] font-medium text-muted uppercase tracking-wider cursor-pointer hover:text-accent"
                    @click="sortTasks('status')">Status</th>
                <th class="px-3 py-2 text-left text-[10px] font-medium text-muted uppercase tracking-wider">Progress</th>
                <th class="px-3 py-2 text-left text-[10px] font-medium text-muted uppercase tracking-wider cursor-pointer hover:text-accent"
                    @click="sortTasks('priority')">Pri</th>
                <th class="px-3 py-2 text-left text-[10px] font-medium text-muted uppercase tracking-wider">Actions</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-border">
              <template x-for="task in sortedTasks" :key="task.id">
                <tr class="hover:bg-surface-2/50 transition-colors">
                  <td class="px-3 py-1.5 font-mono text-[10px] text-muted" x-text="task.id.slice(0, 8)"></td>
                  <td class="px-3 py-1.5 text-text max-w-[200px] truncate" x-text="task.title"></td>
                  <td class="px-3 py-1.5"><span class="text-accent" x-text="task.role"></span></td>
                  <td class="px-3 py-1.5">
                    <span class="px-1.5 py-0.5 rounded text-[10px] font-medium"
                          :class="statusBadge(task.status)" x-text="task.status"></span>
                  </td>
                  <td class="px-3 py-1.5">
                    <div class="flex items-center gap-1.5">
                      <div class="w-16 h-1 bg-border rounded-full overflow-hidden">
                        <div class="h-full rounded-full transition-all"
                             :class="task.status === 'done' ? 'bg-green-500' : 'bg-accent'"
                             :style="'width:' + task.progress + '%'"></div>
                      </div>
                      <span class="text-[10px] text-muted font-mono" x-text="task.progress + '%'"></span>
                    </div>
                  </td>
                  <td class="px-3 py-1.5 font-mono text-muted" x-text="task.priority"></td>
                  <td class="px-3 py-1.5">
                    <div class="flex items-center gap-1" x-show="!['done','failed','cancelled'].includes(task.status)">
                      <button x-show="['open','claimed','in_progress'].includes(task.status)"
                              @click.stop="spawnTask(task.id)"
                              :disabled="taskActionLoading === task.id"
                              class="px-1.5 py-0.5 text-[10px] rounded bg-green-900/40 text-green-400 hover:bg-green-800/60 disabled:opacity-40 transition-colors"
                              title="Spawn agent now">▶</button>
                      <button x-show="task.status === 'open'"
                              @click.stop="prioritizeTask(task.id)"
                              :disabled="taskActionLoading === task.id"
                              class="px-1.5 py-0.5 text-[10px] rounded bg-accent/10 text-accent hover:bg-accent/20 disabled:opacity-40 transition-colors"
                              title="Bump to priority 0">↑</button>
                      <button x-show="['claimed','in_progress'].includes(task.status)"
                              @click.stop="killTaskAgent(task)"
                              :disabled="taskActionLoading === task.id"
                              class="px-1.5 py-0.5 text-[10px] rounded bg-yellow-900/40 text-yellow-400 hover:bg-yellow-800/60 disabled:opacity-40 transition-colors"
                              title="Kill agent">✕</button>
                      <button x-show="!['done','failed','cancelled'].includes(task.status)"
                              @click.stop="cancelTask(task.id)"
                              :disabled="taskActionLoading === task.id"
                              class="px-1.5 py-0.5 text-[10px] rounded bg-red-900/30 text-red-400 hover:bg-red-900/50 disabled:opacity-40 transition-colors"
                              title="Cancel task">⊘</button>
                    </div>
                  </td>
                </tr>
              </template>
              <template x-if="tasks.length === 0">
                <tr><td colspan="7" class="px-3 py-8 text-center text-muted text-xs">No tasks yet</td></tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Gantt Timeline -->
      <div x-show="centerTab === 'gantt'" class="flex-1 overflow-auto p-3">
        <div class="space-y-1">
          <template x-for="task in ganttTasks" :key="task.id">
            <div class="flex items-center gap-2 h-6">
              <div class="w-[120px] shrink-0 text-[10px] text-muted truncate" x-text="task.title"></div>
              <div class="flex-1 relative h-4 bg-border/30 rounded overflow-hidden">
                <div class="gantt-bar absolute top-0 left-0 h-full rounded"
                     :class="task.status === 'done' ? 'bg-green-500/60' : task.status === 'failed' ? 'bg-red-500/60' : task.status === 'open' ? 'bg-gray-600/40' : 'bg-accent/50'"
                     :style="'width:' + task.progress + '%; left:' + ganttOffset(task) + '%'">
                </div>
                <div class="absolute inset-0 flex items-center px-1">
                  <span class="text-[9px] font-mono text-white/70" x-text="task.id.slice(0, 6)"></span>
                </div>
              </div>
              <span class="w-8 text-right text-[10px] font-mono"
                    :class="task.status === 'done' ? 'text-green-400' : 'text-muted'"
                    x-text="task.progress + '%'"></span>
            </div>
          </template>
          <template x-if="tasks.length === 0">
            <div class="text-center py-8 text-xs text-muted">No tasks to display</div>
          </template>
        </div>
      </div>

      <!-- File Lock Map -->
      <div x-show="centerTab === 'files'" class="flex-1 overflow-auto p-3">
        <template x-if="Object.keys(fileLocks).length > 0">
          <div class="space-y-1">
            <template x-for="[file, info] in Object.entries(fileLocks)" :key="file">
              <div class="flex items-center gap-2 px-2 py-1 rounded bg-surface hover:bg-surface-2 transition-colors">
                <svg class="w-3.5 h-3.5 text-yellow-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                <span class="font-mono text-[11px] text-text flex-1 truncate" x-text="file"></span>
                <span class="text-[10px] text-accent font-mono" x-text="info.agent.slice(0, 10)"></span>
              </div>
            </template>
          </div>
        </template>
        <template x-if="Object.keys(fileLocks).length === 0">
          <div class="text-center py-8 text-xs text-muted">No file locks active</div>
        </template>
      </div>
    </div>

    <!-- Right Column: Logs + Costs + Alerts + Merge Queue (3 cols) -->
    <div class="col-span-3 flex flex-col overflow-hidden">

      <!-- Right panel tabs -->
      <div class="flex border-b border-border px-2">
        <button class="tab-btn px-2 py-2 text-[10px] font-medium" :class="rightTab === 'logs' && 'active'"
                @click="rightTab = 'logs'">Logs</button>
        <button class="tab-btn px-2 py-2 text-[10px] font-medium" :class="rightTab === 'costs' && 'active'"
                @click="rightTab = 'costs'">Costs</button>
        <button class="tab-btn px-2 py-2 text-[10px] font-medium" :class="rightTab === 'merge' && 'active'"
                @click="rightTab = 'merge'">Merge Q</button>
        <button class="tab-btn px-2 py-2 text-[10px] font-medium relative" :class="rightTab === 'alerts' && 'active'"
                @click="rightTab = 'alerts'">
          Alerts
          <span x-show="alerts.length > 0"
                class="absolute -top-0.5 -right-0.5 w-3.5 h-3.5 rounded-full bg-red-500 text-white text-[8px] font-bold flex items-center justify-center"
                x-text="alerts.length"></span>
        </button>
      </div>

      <!-- Live Logs -->
      <div x-show="rightTab === 'logs'" class="flex-1 flex flex-col overflow-hidden">
        <!-- Agent selector + kill -->
        <div class="px-2 py-1.5 border-b border-border flex gap-1.5 items-center">
          <select class="flex-1 bg-bg border border-border rounded px-2 py-1 text-xs text-text font-mono"
                  x-model="selectedAgent" @change="connectAgentStream()">
            <option value="">Select agent...</option>
            <template x-for="a in agents" :key="a.id">
              <option :value="a.id" x-text="a.id.slice(0, 12) + ' (' + a.role + ')'"></option>
            </template>
          </select>
          <button x-show="selectedAgent"
                  @click="killSelectedAgent()"
                  :disabled="killLoading"
                  class="px-2 py-1 text-[10px] rounded bg-red-900/40 text-red-400 hover:bg-red-800/60 disabled:opacity-40 transition-colors whitespace-nowrap"
                  title="Kill agent">Kill</button>
        </div>
        <!-- Log output -->
        <div class="flex-1 overflow-auto bg-bg p-2 font-mono" id="log-container"
             x-ref="logContainer">
          <template x-if="selectedAgent && logLines.length > 0">
            <div>
              <template x-for="(line, i) in logLines" :key="i">
                <div class="log-line text-text/80 whitespace-pre-wrap break-all" x-text="line"></div>
              </template>
            </div>
          </template>
          <template x-if="!selectedAgent">
            <div class="text-center py-8 text-xs text-muted">Select an agent to view logs</div>
          </template>
          <template x-if="selectedAgent && logLines.length === 0">
            <div class="text-center py-8 text-xs text-muted">No log output yet</div>
          </template>
        </div>
      </div>

      <!-- Cost Burn Chart + Breakdown -->
      <div x-show="rightTab === 'costs'" class="flex-1 overflow-auto p-2 space-y-3">
        <!-- Burn chart (SVG) -->
        <div class="bg-surface rounded-lg border border-border p-2">
          <div class="flex items-center justify-between mb-1">
            <span class="text-[10px] text-muted uppercase tracking-widest">Cost Burn</span>
            <span class="text-xs font-mono text-green-400" x-text="'$' + totalCost.toFixed(2)"></span>
          </div>
          <svg class="w-full" viewBox="0 0 300 80" preserveAspectRatio="none">
            <!-- Grid lines -->
            <line x1="0" y1="20" x2="300" y2="20" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
            <line x1="0" y1="40" x2="300" y2="40" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
            <line x1="0" y1="60" x2="300" y2="60" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
            <!-- Cost line -->
            <polyline :points="costChartPoints" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linejoin="round"/>
            <!-- Area fill -->
            <polygon :points="costAreaPoints" fill="url(#costGradient)" opacity="0.3"/>
            <defs>
              <linearGradient id="costGradient" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.4"/>
                <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
              </linearGradient>
            </defs>
          </svg>
        </div>

        <!-- Cost by role breakdown -->
        <div class="bg-surface rounded-lg border border-border p-2">
          <span class="text-[10px] text-muted uppercase tracking-widest">By Role</span>
          <div class="mt-1.5 space-y-1">
            <template x-for="[role, cost] in Object.entries(costByRole).sort((a,b) => b[1]-a[1])" :key="role">
              <div class="flex items-center gap-2">
                <span class="text-[10px] text-muted w-16 truncate" x-text="role"></span>
                <div class="flex-1 h-1.5 bg-border rounded-full overflow-hidden">
                  <div class="h-full bg-accent rounded-full" :style="'width:' + (totalCost > 0 ? (cost/totalCost*100) : 0) + '%'"></div>
                </div>
                <span class="text-[10px] font-mono text-text w-12 text-right" x-text="'$' + cost.toFixed(2)"></span>
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- Merge Queue -->
      <div x-show="rightTab === 'merge'" class="flex-1 overflow-auto p-2">
        <template x-if="mergeQueue.length > 0">
          <div class="space-y-1.5">
            <template x-for="(job, i) in mergeQueue" :key="i">
              <div class="bg-surface border border-border rounded p-2">
                <div class="flex items-center gap-1.5 mb-0.5">
                  <span class="text-[10px] font-mono text-accent" x-text="'#' + (i + 1)"></span>
                  <span class="text-xs text-text truncate" x-text="job.task_title || job.task_id"></span>
                </div>
                <div class="text-[10px] text-muted font-mono" x-text="job.session_id?.slice(0, 12) || '-'"></div>
              </div>
            </template>
          </div>
        </template>
        <template x-if="mergeQueue.length === 0">
          <div class="text-center py-8">
            <svg class="w-6 h-6 text-muted/30 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p class="text-xs text-muted">Merge queue empty</p>
          </div>
        </template>
      </div>

      <!-- Alerts -->
      <div x-show="rightTab === 'alerts'" class="flex-1 overflow-auto p-2">
        <template x-if="alerts.length > 0">
          <div class="space-y-1.5">
            <template x-for="(alert, i) in alerts" :key="i">
              <div class="rounded-lg p-2 border slide-in"
                   :class="alert.level === 'error' ? 'bg-red-900/20 border-red-500/30' : 'bg-yellow-900/20 border-yellow-500/30'">
                <div class="flex items-center gap-1.5 mb-0.5">
                  <svg x-show="alert.level === 'error'" class="w-3.5 h-3.5 text-red-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                  </svg>
                  <svg x-show="alert.level === 'warning'" class="w-3.5 h-3.5 text-yellow-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                  </svg>
                  <span class="text-xs font-medium" :class="alert.level === 'error' ? 'text-red-400' : 'text-yellow-400'"
                        x-text="alert.message"></span>
                </div>
                <p class="text-[10px] text-muted pl-5" x-text="alert.detail"></p>
              </div>
            </template>
          </div>
        </template>
        <template x-if="alerts.length === 0">
          <div class="text-center py-8">
            <svg class="w-6 h-6 text-green-500/30 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p class="text-xs text-muted">All clear</p>
          </div>
        </template>
      </div>
    </div>
  </div>

  <script>
    function missionControl() {
      return {
        connected: false,
        startTime: Date.now(),
        elapsed: 0,
        elapsedFormatted: '00:00:00',
        lastUpdate: 'never',
        eventSource: null,

        // Data
        stats: { total: 0, open: 0, claimed: 0, done: 0, failed: 0, agents: 0, cost_usd: 0 },
        tasks: [],
        agents: [],
        costByRole: {},
        costHistory: [],
        fileLocks: {},
        mergeQueue: [],
        alerts: [],

        // UI state
        centerTab: 'tasks',
        rightTab: 'logs',
        selectedAgent: '',
        logLines: [],
        logOffset: 0,
        killLoading: false,
        sortCol: 'priority',
        sortAsc: true,
        _logInterval: null,
        _agentEventSource: null,

        get totalCost() { return this.stats.cost_usd || 0; },
        get progressPct() {
          if (this.stats.total === 0) return 0;
          return Math.round(this.stats.done / this.stats.total * 100);
        },

        get statItems() {
          return [
            { label: 'Total', value: this.stats.total, dotClass: 'bg-white', valueClass: 'text-text' },
            { label: 'Done', value: this.stats.done, dotClass: 'bg-green-500', valueClass: 'text-green-400' },
            { label: 'Active', value: this.stats.claimed, dotClass: 'bg-yellow-500', valueClass: 'text-yellow-400' },
            { label: 'Failed', value: this.stats.failed, dotClass: 'bg-red-500', valueClass: 'text-red-400' },
            { label: 'Open', value: this.stats.open, dotClass: 'bg-gray-400', valueClass: 'text-white' },
            { label: 'Agents', value: this.stats.agents, dotClass: 'bg-accent', valueClass: 'text-accent' },
            { label: 'Cost', value: '$' + this.totalCost.toFixed(2), dotClass: 'bg-green-500', valueClass: 'text-green-400' },
          ];
        },

        get sortedTasks() {
          const col = this.sortCol;
          const dir = this.sortAsc ? 1 : -1;
          return [...this.tasks].sort((a, b) => {
            const av = (a[col] ?? '').toString().toLowerCase();
            const bv = (b[col] ?? '').toString().toLowerCase();
            const an = parseFloat(av), bn = parseFloat(bv);
            if (!isNaN(an) && !isNaN(bn)) return (an - bn) * dir;
            return av.localeCompare(bv) * dir;
          });
        },

        get ganttTasks() {
          // Sort by created_at for timeline view
          return [...this.tasks].sort((a, b) => (a.created_at || 0) - (b.created_at || 0));
        },

        get costChartPoints() {
          if (this.costHistory.length === 0) return '0,75 300,75';
          const maxCost = Math.max(...this.costHistory.map(p => p.cost), 0.01);
          return this.costHistory.map((p, i) => {
            const x = (i / Math.max(this.costHistory.length - 1, 1)) * 300;
            const y = 75 - (p.cost / maxCost) * 65;
            return `${x.toFixed(1)},${y.toFixed(1)}`;
          }).join(' ');
        },

        get costAreaPoints() {
          if (this.costHistory.length === 0) return '0,75 300,75';
          const line = this.costChartPoints;
          const lastX = this.costHistory.length > 1
            ? ((this.costHistory.length - 1) / Math.max(this.costHistory.length - 1, 1) * 300).toFixed(1)
            : '300';
          return `0,75 ${line} ${lastX},75`;
        },

        init() {
          this.connectSSE();
          this.startTimer();
          this.fetchData();
          setInterval(() => this.fetchData(), 3000);
        },

        async fetchData() {
          try {
            const resp = await fetch('/dashboard/data');
            if (!resp.ok) return;
            const data = await resp.json();
            this.stats = data.stats || this.stats;
            this.tasks = data.tasks || [];
            this.agents = data.agents || [];
            this.costByRole = data.cost_by_role || {};
            this.costHistory = data.cost_history || [];
            this.fileLocks = data.file_locks || {};
            this.mergeQueue = data.merge_queue || [];
            this.alerts = data.alerts || [];
            this.lastUpdate = new Date().toLocaleTimeString();
            this.connected = true;
          } catch (e) {
            this.connected = false;
          }
        },

        selectAgent(id) {
          this.selectedAgent = id;
          this.logLines = [];
          this.logOffset = 0;
          this.rightTab = 'logs';
          this.connectAgentStream();
        },

        connectAgentStream() {
          // Close any previous stream
          if (this._agentEventSource) { this._agentEventSource.close(); this._agentEventSource = null; }
          if (this._logInterval) { clearInterval(this._logInterval); this._logInterval = null; }
          if (!this.selectedAgent) return;

          this.logLines = [];
          this.logOffset = 0;

          try {
            const es = new EventSource(`/agents/${this.selectedAgent}/stream`);
            this._agentEventSource = es;
            es.onmessage = (e) => {
              try {
                const payload = JSON.parse(e.data);
                if (payload.line) {
                  this.logLines = [...this.logLines, payload.line].slice(-500);
                  this.$nextTick(() => {
                    const el = this.$refs.logContainer;
                    if (el) el.scrollTop = el.scrollHeight;
                  });
                }
              } catch (_) {}
            };
            es.onerror = () => {
              // SSE closed (agent done or timeout) — fall back to polling for late logs
              es.close();
              this._agentEventSource = null;
              if (this.selectedAgent && !this._logInterval) {
                this._logInterval = setInterval(() => this.fetchLogs(), 3000);
              }
            };
          } catch (e) {
            // EventSource not supported — fall back to polling
            this._logInterval = setInterval(() => this.fetchLogs(), 2000);
            this.fetchLogs();
          }
        },

        async fetchLogs() {
          if (!this.selectedAgent) return;
          try {
            const url = `/agents/${this.selectedAgent}/logs` + (this.logOffset > 0 ? `?tail_bytes=8192` : '');
            const resp = await fetch(url);
            if (!resp.ok) return;
            const data = await resp.json();
            if (data.content) {
              const lines = data.content.split('\n').filter(l => l.trim());
              if (this.logOffset === 0) {
                this.logLines = lines.slice(-200);
              } else {
                this.logLines = [...this.logLines, ...lines].slice(-200);
              }
              this.logOffset = data.size || 0;
              this.$nextTick(() => {
                const el = this.$refs.logContainer;
                if (el) el.scrollTop = el.scrollHeight;
              });
            }
          } catch (e) { /* agent may not have logs yet */ }
        },

        async killSelectedAgent() {
          if (!this.selectedAgent) return;
          this.killLoading = true;
          try {
            await fetch(`/agents/${this.selectedAgent}/kill`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}' });
            await this.fetchData();
          } finally { this.killLoading = false; }
        },

        connectSSE() {
          try {
            this.eventSource = new EventSource('/events');
            this.eventSource.onopen = () => { this.connected = true; };
            this.eventSource.onerror = () => {
              this.connected = false;
              setTimeout(() => this.connectSSE(), 5000);
            };
            this.eventSource.addEventListener('task_update', () => this.fetchData());
            this.eventSource.addEventListener('agent_update', () => this.fetchData());
          } catch (e) {
            this.connected = false;
            setTimeout(() => this.connectSSE(), 5000);
          }
        },

        startTimer() {
          setInterval(() => {
            this.elapsed = Math.floor((Date.now() - this.startTime) / 1000);
            const h = String(Math.floor(this.elapsed / 3600)).padStart(2, '0');
            const m = String(Math.floor((this.elapsed % 3600) / 60)).padStart(2, '0');
            const s = String(this.elapsed % 60).padStart(2, '0');
            this.elapsedFormatted = `${h}:${m}:${s}`;
          }, 1000);
        },

        sortTasks(col) {
          if (this.sortCol === col) { this.sortAsc = !this.sortAsc; }
          else { this.sortCol = col; this.sortAsc = true; }
        },

        formatRuntime(s) {
          if (s < 60) return s + 's';
          if (s < 3600) return Math.floor(s / 60) + 'm';
          return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
        },

        ganttOffset(task) {
          // Offset based on creation order within the batch
          if (this.ganttTasks.length <= 1) return 0;
          const idx = this.ganttTasks.findIndex(t => t.id === task.id);
          return 0; // All start at 0 since we don't have end times
        },

        statusBadge(status) {
          const map = {
            done: 'bg-green-900/50 text-green-400',
            in_progress: 'bg-yellow-900/50 text-yellow-400',
            failed: 'bg-red-900/50 text-red-400',
            claimed: 'bg-cyan-900/50 text-cyan-400',
            open: 'bg-gray-800 text-white',
            blocked: 'bg-purple-900/50 text-purple-400',
            cancelled: 'bg-red-900/30 text-red-400/70',
            orphaned: 'bg-orange-900/50 text-orange-400',
          };
          return map[status] || 'bg-gray-800 text-white';
        },

        // Task action helpers — loading state prevents double-clicks
        taskActionLoading: null,

        async spawnTask(taskId) {
          this.taskActionLoading = taskId;
          try {
            const resp = await fetch(`/tasks/${taskId}/force-claim`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}' });
            if (resp.ok) await this.fetchData();
          } finally { this.taskActionLoading = null; }
        },

        async prioritizeTask(taskId) {
          this.taskActionLoading = taskId;
          try {
            const resp = await fetch(`/tasks/${taskId}/prioritize`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}' });
            if (resp.ok) await this.fetchData();
          } finally { this.taskActionLoading = null; }
        },

        async cancelTask(taskId) {
          this.taskActionLoading = taskId;
          try {
            const resp = await fetch(`/tasks/${taskId}/cancel`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({reason: 'cancelled via dashboard'}) });
            if (resp.ok) await this.fetchData();
          } finally { this.taskActionLoading = null; }
        },

        async killTaskAgent(task) {
          if (!task.assigned_agent) return;
          this.taskActionLoading = task.id;
          try {
            const resp = await fetch(`/agents/${task.assigned_agent}/kill`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}' });
            if (resp.ok) await this.fetchData();
          } finally { this.taskActionLoading = null; }
        },
      };
    }
  </script>
</body>
