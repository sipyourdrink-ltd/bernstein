# Multi-model demo: same project, four different CLI agents
#
# This example shows Bernstein routing tasks to different AI providers
# in a single run. The orchestrator is the same regardless of which
# CLI agents are installed — swap providers without changing anything else.
#
# Requirements:
#   - Claude Code:  npm install -g @anthropic-ai/claude-code  + ANTHROPIC_API_KEY
#   - Codex CLI:    npm install -g @openai/codex              + OPENAI_API_KEY
#   - Gemini CLI:   npm install -g @google/gemini-cli         + GOOGLE_API_KEY
#   - Qwen:         npm install -g qwen-code                  + DASHSCOPE_API_KEY or OPENROUTER_API_KEY_FREE
#
# You don't need all four. Bernstein uses whatever is installed.
# Run:  bernstein run
# Or:   bernstein run --cli claude  (force a single adapter)

goal: "Build a minimal REST API with a /users endpoint: list, create, and delete users. Include tests and API docs."

# Default adapter — used for roles without an override
cli: auto

# Per-role adapter overrides
role_config:
  # Use Anthropic Claude for architecture and backend implementation
  # (deep tool-use, file editing, high-quality code generation)
  backend:
    cli: claude
    model: sonnet

  # Use OpenAI Codex for test generation
  # (GPT-5.4-mini is strong on test coverage and edge cases)
  qa:
    cli: codex
    model: gpt-5.4-mini

  # Use Gemini Flash for documentation — fast and cheap
  docs:
    cli: gemini
    model: gemini-3-flash

  # Use Qwen (free tier via OpenRouter) for simple scaffolding tasks
  # Set OPENROUTER_API_KEY_FREE to use this
  resolver:
    cli: qwen
    model: qwen/qwen-2.5-coder-32b-instruct

max_agents: 4
budget: "$2.00"

# Merge strategy: "pr" (default) creates a GitHub PR per task for code review.
# Use "direct" to push agent work straight to the main branch without a PR.
merge_strategy: pr
auto_merge: true           # Auto-merge the PR after code review passes
pr_labels: [bernstein, auto-generated]

constraints:
  - "Python 3.12+ with FastAPI"
  - "In-memory storage is fine for this demo"
  - "pytest for tests"
  - "OpenAPI docs auto-generated by FastAPI"
