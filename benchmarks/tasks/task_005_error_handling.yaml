    description: "Add error handling to DELETE /users/{id} (404 not found)"
    estimated_minutes: 6
    depends_on: []

  - id: t005-d
    role: backend
    description: "Add error handling to GET /posts (500 with correlation ID)"
    estimated_minutes: 6
    depends_on: []

  - id: t005-e
    role: backend
    description: "Add error handling to POST /posts (400/422)"
    estimated_minutes: 6
    depends_on: []

