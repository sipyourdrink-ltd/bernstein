id: fix-broken-import
tier: smoke
setup:
  command: >
    python3 -c "
    content = '''from __future__ import annotations

    from bernstein.core.nonexistent_module import MissingClass  # broken import


    def greet(name: str) -> str:
        return f\"Hello, {name}\"
    '''
    open('src/bernstein/_eval_fixture_import.py', 'w').write(content)
    "
task:
  title: "Fix the broken import in src/bernstein/_eval_fixture_import.py"
  description: |
    The file `src/bernstein/_eval_fixture_import.py` has a broken import:
        from bernstein.core.nonexistent_module import MissingClass
    Replace it with a valid import from `bernstein.core.models` (e.g., `Task`).
    The `greet` function must remain unchanged.
  role: backend
  effort: low
  model: haiku
expected_signals:
  - type: file_contains
    path: src/bernstein/_eval_fixture_import.py
    value: "from bernstein.core.models"
  - type: command_succeeds
    value: "python3 -c \"import ast; ast.parse(open('src/bernstein/_eval_fixture_import.py').read())\""
  - type: command_succeeds
    value: "python3 -c \"from bernstein._eval_fixture_import import greet; assert greet('World') == 'Hello, World'\""
limits:
  max_cost_usd: 0.10
  max_duration_seconds: 60
  max_retries: 0
