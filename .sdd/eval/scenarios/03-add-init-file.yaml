id: add-missing-init-file
tier: smoke
setup:
  command: >
    python3 -c "
    import os, pathlib
    p = pathlib.Path('src/bernstein/_eval_subpkg')
    p.mkdir(exist_ok=True)
    (p / 'utils.py').write_text('def hello() -> str:\n    return \"hello\"\n')
    init = p / '__init__.py'
    if init.exists():
        init.unlink()
    "
task:
  title: "Add missing __init__.py to src/bernstein/_eval_subpkg/"
  description: |
    The directory `src/bernstein/_eval_subpkg/` exists but is missing its
    `__init__.py`, so it cannot be imported as a package.
    Create an empty (or minimal) `__init__.py` to make it importable.
  role: backend
  effort: low
  model: haiku
expected_signals:
  - type: path_exists
    value: src/bernstein/_eval_subpkg/__init__.py
  - type: command_succeeds
    value: "python3 -c \"from bernstein._eval_subpkg.utils import hello; assert hello() == 'hello'\""
limits:
  max_cost_usd: 0.10
  max_duration_seconds: 60
  max_retries: 0
