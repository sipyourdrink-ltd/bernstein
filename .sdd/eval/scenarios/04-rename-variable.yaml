id: rename-variable-in-file
tier: smoke
setup:
  command: >
    python3 -c "
    content = '''from __future__ import annotations


    def compute_total(items: list[float]) -> float:
        '''Compute the sum of all items.'''
        totl = 0.0
        for itm in items:
            totl += itm
        return totl
    '''
    open('src/bernstein/_eval_fixture_rename.py', 'w').write(content)
    "
task:
  title: "Rename variables totl -> total and itm -> item in src/bernstein/_eval_fixture_rename.py"
  description: |
    In `src/bernstein/_eval_fixture_rename.py`, rename:
    - `totl` to `total`
    - `itm` to `item`
    The function signature and docstring must remain unchanged.
    Do not introduce any logic changes.
  role: backend
  effort: low
  model: haiku
expected_signals:
  - type: file_contains
    path: src/bernstein/_eval_fixture_rename.py
    value: "total = 0.0"
  - type: file_contains
    path: src/bernstein/_eval_fixture_rename.py
    value: "for item in items"
  - type: command_succeeds
    value: "python3 -c \"from bernstein._eval_fixture_rename import compute_total; assert compute_total([1.0, 2.0, 3.0]) == 6.0\""
limits:
  max_cost_usd: 0.10
  max_duration_seconds: 60
  max_retries: 0
