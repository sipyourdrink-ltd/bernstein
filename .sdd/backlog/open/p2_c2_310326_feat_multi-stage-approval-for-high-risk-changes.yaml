## Summary

High-risk task → security review → human approval → merge

## Objective & Definition of Done

- [ ] Multi-stage approval for high-risk changes implemented and working
- [ ] Unit tests pass
- [ ] Ruff lint clean

## Steps

1. Read relevant source files
2. Implement the feature
3. Add/update unit tests
4. Run `uv run ruff check src/` and `uv run pytest tests/unit/ -x -q`

## Remaining Work

- Repo truth already has approval foundations in `src/bernstein/core/approval.py`, approval workflow config/tests, and compliance-driven mandatory review flags.
- What remains is the explicit multi-stage orchestration:
  - model high-risk stages as separate persisted steps (for example security review -> human approval -> merge)
  - wire those stages into `task_completion.py` / orchestrator merge gating instead of a single approval decision
  - expose stage state in status/CLI so operators can see which gate is pending
- Smallest safe path: extend the existing approval workflow and pending-approval persistence, not replace it with a second approval engine.

