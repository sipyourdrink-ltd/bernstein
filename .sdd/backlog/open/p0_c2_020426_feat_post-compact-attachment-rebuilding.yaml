## Summary

After compaction, rebuild essential attachments—current plan, active skills references, deferred tool deltas—with category-specific token budgets so the agent regains operational context without re-loading the full pre-compact transcript.

## Objective & Definition of Done

- [ ] Attachment categories and default budgets are configurable.
- [ ] Rebuild order prioritizes task-critical attachments over nice-to-have context.
- [ ] Total post-compact size stays within a global cap with explicit truncation logs.
- [ ] Tests added per attachment category and combined caps.

## Verification

- Run targeted unit tests for spawn prompt attachment assembly
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
