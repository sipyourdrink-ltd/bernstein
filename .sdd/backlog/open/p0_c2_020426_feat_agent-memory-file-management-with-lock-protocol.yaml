## Summary

Implement a file-based agent memory layer with PID and mtime-based locks, staleness detection for abandoned writers, and rollback to the last known-good snapshot when consolidation fails, preventing corrupted JSONL or topic files under concurrent agents.

## Objective & Definition of Done

- [ ] Lock acquisition, renewal, and release documented and race-tested.
- [ ] Failed writes roll back to previous snapshot without partial merges.
- [ ] Stale lock recovery safe on POSIX; Windows behavior documented.
- [ ] Tests added for contention, crash mid-write, and rollback.

## Verification

- Run targeted unit tests for lessons and knowledge base file IO
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
