## Summary

Support always-allow rules that match specific tool plus input patterns (for example allow `grep` only when the path argument is under `src/`), reducing approval prompts for known-safe operations while preserving deny and ask rules for everything else.

## Objective & Definition of Done

- [ ] Rule syntax supports tool name and one or more input field patterns.
- [ ] Precedence relative to deny/ask is documented and tested.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Unit tests: allow rule matches safe grep; same tool with `/etc` still asks or denies
- Regression: bypass-immune paths still cannot be always-allowed if policy forbids
