## Summary

Define a structured protocol for agents to report terminal status (completed, failed, killed) to the orchestrator with summary text, machine-readable result payloads, and usage metrics so downstream lifecycle and observability stay consistent.

## Objective & Definition of Done

- [ ] Specify JSON or typed record for status notifications (fields: status, summary, result, usage)
- [ ] Integrate with bulletin or task lifecycle ingestion path
- [ ] Backward compatibility for existing agents that only emit unstructured output
- [ ] Tests added

## Verification

- Run tests
- Verify orchestrator parses notifications and updates task state correctly
