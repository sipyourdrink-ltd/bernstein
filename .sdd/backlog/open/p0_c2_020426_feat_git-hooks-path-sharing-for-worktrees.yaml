## Summary

Configure agent worktrees to use the main repository’s hooks (for example `core.hooksPath` pointing at `.husky` or shared `.git/hooks`) so pre-commit and other hooks run consistently whether the agent works in a linked worktree or the primary checkout.

## Objective & Definition of Done

- [ ] After worktree creation, hooks path is aligned with the main repo (or explicitly documented opt-out).
- [ ] Works with common layouts (default hooks, `core.hooksPath`, husky).
- [ ] No silent override of user’s intentional per-worktree hook config without an explicit Bernstein setting.
- [ ] Tests added for configuration application and edge cases.

## Verification

- Run targeted unit tests for worktree setup
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
