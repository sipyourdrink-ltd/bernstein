## Summary

When a tool or action permission is denied, fire a hook that may attach structured retry hints (for example a safer command, narrowed path, or suggested flag) for the agent or UI to surface without changing the deny outcome.

## Objective & Definition of Done

- [ ] New hookspec for permission-denied with stable payload (reason, tool, redacted args).
- [ ] Approval path invokes hook and merges optional hint into trace or agent-visible metadata.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Unit test: deny triggers hook; hint appears in returned metadata
- Verify hooks cannot override deny to allow without going through policy
