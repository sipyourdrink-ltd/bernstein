## Summary

Bernstein operates in a single git repository. Many projects span multiple repos (frontend + backend, shared libs, microservices). Cross-repo tasks (e.g., "update API schema in both backend and frontend") require manual coordination.

## What's Done

- [x] `bernstein.yaml` supports `workspace.repos` list with `name`, `path`, `url`, `branch` fields
- [x] `bernstein workspace` — shows status of all repos (branch, clean/dirty, ahead/behind)
- [x] `bernstein workspace clone` — clones missing repos from URLs
- [x] `bernstein workspace validate` — checks all repos exist and are valid git repos
- [x] `GET /workspace` API endpoint returns workspace status
- [x] Task `repo` field supported — spawner sets agent workdir to target repo path
- [x] Documented in GETTING_STARTED.md with config examples and CLI reference

## Remaining Work

1. **Cross-repo dependency resolution** — the dependency resolver needs to understand that task `fe:TSK-003` depends on `be:TSK-001` across repos. Currently deps are repo-local.
2. **Merge coordination** — when a task in repo A depends on repo B's task, the orchestrator should not merge repo A's changes until repo B's dependent task is also merged. This requires tracking merge readiness per-repo.
3. **Dashboard multi-repo column** — TUI dashboard should show which repo each task belongs to.

