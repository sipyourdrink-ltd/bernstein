## Best Approach

Cross-repo deps can be implemented by prefixing task IDs with repo name (`be:TSK-001`) in `depends_on`. The dependency resolver in `core/` already does topological sort — extend it to parse the repo prefix and resolve across repos. Merge coordination is a policy layer on top of the existing merge logic in `spawner.py`.

