## Summary

Track multi-agent team membership in a file-backed config with per-member metadata (agentId, name, model, color, mode, isActive) so the orchestrator and UIs can show consistent team state across restarts.

## Objective & Definition of Done

- [ ] Define schema and storage path under `.sdd/` or equivalent
- [ ] Update team state on spawn, complete, fail, and kill
- [ ] Expose read API for CLI/TUI consumers
- [ ] Tests added

