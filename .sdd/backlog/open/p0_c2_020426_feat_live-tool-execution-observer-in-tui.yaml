## Summary

Stream real-time tool call activity (tool name, duration, success or failure) into the TUI as agents execute tools, wired from existing trace or SSE sources without blocking the main orchestrator loop.

## Objective & Definition of Done

- [ ] TUI shows in-flight and recently completed tool calls with name, duration, and status.
- [ ] Updates scale reasonably under high tool churn (batching or ring buffer as needed).
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run `uv run pytest tests/unit/test_tui_helpers.py -x -q`
- Verify behavior in TUI/CLI
