## Summary

When an agent fails a task, the failure is logged locally but nothing happens on GitHub. The human discovers failures only when checking the TUI. Failed tasks should automatically create GitHub issues with context for manual investigation.

## Objective & Definition of Done

1. On task failure (after all retries exhausted): create GitHub issue via GitHub App API
2. Issue content: task title, description, agent logs (last 50 lines), error category, suggested fix
3. Labels: `bernstein`, `agent-failure`, priority level
4. Deduplication: if an open issue with same task title exists, add comment instead of creating new
5. Configurable: `github_app: {auto_issues: true}` in bernstein.yaml. Default off
6. Rate limit: max 5 auto-issues per hour (prevent spam on cascading failures)
7. Test with mocked GitHub API

## Steps

1. Extend `core/github_app.py` (if exists) or create new module
2. On task failure event: format issue body from task + agent logs
3. Search existing issues: `GET /repos/.../issues?labels=bernstein&state=open`
4. Create or comment: `POST /repos/.../issues` or `POST /repos/.../issues/{n}/comments`
5. Track issue creation timestamps for rate limiting

## Tests & Verification

- `uv run ruff check src/bernstein/`
- `uv run pytest tests/unit/ -x -q`

