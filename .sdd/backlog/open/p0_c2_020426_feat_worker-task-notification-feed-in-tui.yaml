## Summary

Surface a live, scrollable feed of task-notification events emitted by worker agents in the TUI, styled as concise status lines with timestamps and task identifiers.

## Objective & Definition of Done

- [ ] Feed subscribes to the same event source as other TUI updates (SSE, polling, or bulletin) without duplicating protocol parsing.
- [ ] High-volume bursts are capped with a ring buffer and clear “N more” indicator.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run `uv run pytest tests/unit/test_tui_helpers.py -x -q`
- Verify behavior in TUI/CLI
