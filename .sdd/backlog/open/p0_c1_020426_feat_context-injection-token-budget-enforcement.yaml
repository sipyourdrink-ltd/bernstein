## Summary

Enforce explicit token budgets when assembling injected context (files, lessons, RAG chunks) so total prompt size stays below model limits and predictable, with graceful truncation and ordering by priority rather than silent overflow.

## Objective & Definition of Done

- [ ] Central budget accounting for each injection category (files, lessons, RAG).
- [ ] Truncation order is documented and tested (high-value content retained first).
- [ ] Logging surfaces when truncation occurs for observability.
- [ ] Tests added for boundary conditions and mixed sources.

## Verification

- Run targeted unit tests for spawn prompt and RAG helpers
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
