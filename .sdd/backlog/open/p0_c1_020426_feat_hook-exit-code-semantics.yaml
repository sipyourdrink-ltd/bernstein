## Summary

Define and enforce exit code semantics for hook commands: `0` success, `2` blocking error with stderr surfaced to the operator, other non-zero codes treated as non-blocking warnings so orchestration can continue with visibility.

## Objective & Definition of Done

- [ ] Contract documented in hookspecs and implemented in plugin manager.
- [ ] Exit code 2 blocks the pipeline and attaches stderr to the failure path.
- [ ] Other non-zero exits log warn and do not abort unless configured otherwise.
- [ ] Tests added for each exit code class

## Verification

- Run targeted unit tests for plugin manager hook execution
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
