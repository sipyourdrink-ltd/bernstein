## Summary

Whitelist safe commands per agent role. Block risky operations (rm -rf, DROP TABLE, etc.).
From Martin Alderson: 'innocuous commands like dotnet test can end up doing much more than that'.
Config per role: `backend: {allow: [pytest, ruff, git], deny: [rm -rf, sudo, curl]}`.
Acceptance: agent trying `rm -rf /` is blocked with audit log entry.

## Objective & Definition of Done

- [ ] Command Allowlist/Denylist Per Agent implemented and working
- [ ] Unit tests pass
- [ ] Ruff lint clean

## Steps

1. Read relevant source files
2. Implement the feature
3. Add/update unit tests
4. Run `uv run ruff check src/` and `uv run pytest tests/unit/ -x -q`

## Tests & Verification

- `uv run ruff check src/bernstein/`
- `uv run pytest tests/unit/ -x -q`

## Remaining Work

- Repo truth already has the policy core in `src/bernstein/core/command_policy.py` plus substantial coverage in `tests/unit/test_command_policy.py`.
- The missing half is runtime enforcement:
  - load role policy from config/seed at orchestrator startup
  - apply verdicts in the real agent execution path (`worker.py` / spawn protocol / post-task command execution seam)
  - surface denials in status or task logs so blocked commands are operator-visible, not just written to metrics
- Smallest safe path: keep `command_policy.py` as the source of truth and wire it into the existing worker/spawner execution flow instead of adding a new security layer.

