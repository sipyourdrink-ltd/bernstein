## Summary

Detect when model output was truncated due to `max_output_tokens` (or provider-equivalent finish reason) and emit a signal so the orchestrator can escalate the output token limit on the next retry instead of repeating the same cap.

## Objective & Definition of Done

- [ ] Truncation is detected from adapter or trace metadata with a single canonical flag or reason code.
- [ ] Retry path applies a bounded escalation policy (cap increases, max ceiling).
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run `uv run pytest tests/unit/test_tick_pipeline.py -x -q` or nearest orchestration unit tests
- Verify escalation appears in logs for a mocked truncated completion
