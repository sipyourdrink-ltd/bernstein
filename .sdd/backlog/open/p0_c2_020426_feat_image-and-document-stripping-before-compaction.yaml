## Summary

Strip or replace image and heavy document blocks from the message payload sent to the compaction LLM so summarization stays within provider limits and avoids prompt-too-long failures while preserving text content needed for a faithful summary.

## Objective & Definition of Done

- [ ] Detects multimodal/document blocks in the compaction input path.
- [ ] Replacement strategy documented (placeholder text vs drop) and consistent.
- [ ] Original agent-facing transcript unchanged outside the compaction call.
- [ ] Tests added for mixed text/media message shapes.

## Verification

- Run targeted unit tests for spawn prompt compaction path
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
