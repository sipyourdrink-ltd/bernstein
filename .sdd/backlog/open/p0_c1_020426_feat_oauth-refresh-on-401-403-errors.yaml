## Summary

On HTTP 401 or 403 from providers that use OAuth or rotating API credentials, automatically attempt token refresh (where a refresh flow exists) and retry the request once, reducing session failures from expired tokens without user intervention.

## Objective & Definition of Done

- [ ] Refresh is attempted only when credentials support it; otherwise fail with a clear error.
- [ ] Single bounded retry after refresh to avoid infinite loops.
- [ ] Adapter base or shared HTTP layer centralizes behavior for CLI agents where applicable.
- [ ] Tests added with mocked auth and HTTP responses.

## Verification

- Run targeted unit tests for adapter base and rate limit integration
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
