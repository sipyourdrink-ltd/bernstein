## Summary

After three consecutive HTTP 529 (overloaded) responses from a provider, automatically switch the agent to a configured fallback model instead of failing the task, with counters scoped appropriately per session or task to avoid cross-talk.

## Objective & Definition of Done

- [ ] 529 errors are detected and counted in rate limit or spawn routing path.
- [ ] On third consecutive 529, router/spawner selects configured fallback model.
- [ ] Configuration documents fallback model key and reset semantics.
- [ ] Tests added with mocked provider responses

## Verification

- Run targeted unit tests for router/rate_limit_tracker
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
