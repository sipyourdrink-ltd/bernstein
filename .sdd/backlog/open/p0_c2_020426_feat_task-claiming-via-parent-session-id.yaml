## Summary

Enable workers to claim tasks from a shared queue scoped by the parent coordinator’s session ID so parallel workers do not steal unrelated tasks and namespaces stay consistent with the task server API.

## Objective & Definition of Done

- [ ] Extend task create/claim APIs or metadata with parent_session_id
- [ ] Filter open tasks for workers to those matching their parent namespace
- [ ] Document interaction with existing task IDs and backlog sync
- [ ] Tests added

## Verification

- Run tests
- Verify workers only claim tasks bound to their coordinator session
