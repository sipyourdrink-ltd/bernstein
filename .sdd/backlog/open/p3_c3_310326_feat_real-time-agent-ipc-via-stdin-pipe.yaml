## Summary

Agent communication uses file-based signal polling with up to 60s latency. When orchestrator sends "save and exit" via `/broadcast`, agents don't act for up to a minute. This makes the system feel disconnected.

## What's Done

- [x] `src/bernstein/core/agent_ipc.py` — IPC module with `register_stdin_pipe()`, `unregister_stdin_pipe()`, `has_stdin_pipe()`, `send_message()` and file-based fallback
- [x] All 10 adapters updated with `stdin=subprocess.PIPE` in `Popen()` calls and `proc` tracking
- [x] `spawner.py` — registers stdin pipe after spawn via `register_stdin_pipe(session_id, proc.stdin)`
- [x] `spawner.py` — unregisters pipe on agent exit via `unregister_stdin_pipe(session.id)`
- [x] Backward compatible: file-based COMMAND signals still work as fallback

## Remaining Work

1. **Update `/broadcast` route** — the broadcast endpoint in `core/routes/` should try `send_message()` via stdin first, then fall back to file-based COMMAND signal. Currently may still only use file-based path.
2. **Latency validation** — verify with a live Claude session that stdin messages arrive within 1-2s.
3. **Unit test** — `tests/unit/test_agent_ipc.py` with mocked `IO[bytes]` pipe verifying write + flush + fallback.
4. **Pyright cleanup** — ensure `agent_ipc.py` passes strict type checking (the `IO[bytes]` typing).

## Objective & Definition of Done

1. ~~Adapters that support stdin pipe receive signals via process stdin~~ ✅ Done
2. ~~Signal format: JSON one-liner on stdin~~ ✅ Done in `agent_ipc.send_message()`
3. ~~Fallback: adapters without stdin support continue using file-based signals~~ ✅ Done
4. Latency: signal delivered within 1s (vs 60s current)
5. ~~Backward compatible: old signal file system still works alongside pipes~~ ✅ Done
6. Unit test: mock process, verify stdin write, verify signal processing

