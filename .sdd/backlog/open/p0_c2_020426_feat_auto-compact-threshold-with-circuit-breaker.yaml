## Summary

Trigger automatic context compaction when estimated prompt tokens approach the model’s context window, coordinated with token monitoring; add a circuit breaker that stops repeated compaction attempts after consecutive failures to avoid infinite loops or provider errors.

## Objective & Definition of Done

- [ ] Thresholds are configurable and default to conservative values.
- [ ] Circuit breaker state is observable (logs/metrics) and resets safely.
- [ ] Compaction integrates with existing token accounting without double-counting.
- [ ] Tests added for threshold crossing, breaker open/close, and recovery.

## Verification

- Run targeted unit tests for spawn prompt and token monitor
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
