## Summary

Hook: on_task_complete → emit custom metric

## Objective & Definition of Done

- [ ] Plugin hooks for custom metrics collection implemented and working
- [ ] Unit tests pass
- [ ] Ruff lint clean

## Steps

1. Read relevant source files
2. Implement the feature
3. Add/update unit tests
4. Run `uv run ruff check src/` and `uv run pytest tests/unit/ -x -q`

## Remaining Work

- Repo truth already has the plugin substrate: `src/bernstein/plugins/hookspecs.py` defines lifecycle hooks and `src/bernstein/plugins/manager.py` loads config and entry-point plugins safely.
- What is still missing is the metrics-specific seam:
  - add a typed metric payload hook such as `on_metric_recorded(...)` or `on_task_metric(...)`
  - invoke it from `src/bernstein/core/metric_collector.py` instead of making plugins scrape JSONL after the fact
  - add deterministic tests that a plugin can emit or observe a custom metric without crashing the orchestrator
- Smallest safe path: extend the existing plugin manager rather than introducing a second plugin/event system.

