## Summary

Implement context collapse that progressively drains older message groups when approaching context limits, with bounded retries when a drain step still overflows, and recovery tracking so the orchestrator can surface degradation instead of silent truncation loops.

## Objective & Definition of Done

- [ ] Drain policy is deterministic (group boundaries, minimum retained tail).
- [ ] Retry/backoff integrates with tick pipeline without blocking unrelated work.
- [ ] Metrics or structured logs record drain rounds and overflow events.
- [ ] Tests added for multi-step drain, retry, and recovery markers.

## Verification

- Run targeted unit tests for spawn prompt and tick pipeline integration
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
