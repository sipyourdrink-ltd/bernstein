## Summary

In unattended mode, retry 429/529 responses with exponential backoff for longer than interactive sessions, emitting periodic heartbeat signals (logs, agent signal files, or TUI updates) so upstream timeouts and operators know the run is still alive rather than stuck silent.

## Objective & Definition of Done

- [ ] Unattended mode enables extended retry policy with documented max ceiling or cap policy.
- [ ] Heartbeat interval configurable; default avoids log spam.
- [ ] Integrates with existing stall/heartbeat detection without false “dead” classification.
- [ ] Tests added with mocked time and HTTP responses.

## Verification

- Run targeted unit tests for rate limit and spawner paths
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
