## Summary

Bernstein orchestrates short-lived CLI coding agents on the local machine. This works well for development tasks, but limits Bernstein to a single-host, coding-only paradigm. OpenClaw is an AI agent platform with multi-agent routing, persistent sessions, background task execution, ACP harness runtime, cron/webhook automation, and multi-channel delivery (Discord, Telegram, Slack, WhatsApp). Integrating Bernstein with OpenClaw as an external runtime opens three strategic paths:

1. **Remote execution** — Bernstein schedules, OpenClaw executes on a separate host (or the same host with OpenClaw managing agent lifecycle)
2. **Agent multiplexing** — OpenClaw's ACP runtime can run `codex`, `claude`, `opencode`, `gemini` and others as harness aliases, letting Bernstein delegate to a broader agent pool without needing every adapter locally
3. **Beyond-coding orchestration** — OpenClaw's session/channel/cron primitives enable orchestration of non-coding workflows: content pipelines, research swarms, business automation, multi-channel customer service — things Bernstein's task model can schedule but has no runtime for today

This is not an adapter in the D02 sense (local CLI binary wrapping). It is a runtime bridge: Bernstein remains the deterministic scheduler, OpenClaw becomes an optional execution backend.

