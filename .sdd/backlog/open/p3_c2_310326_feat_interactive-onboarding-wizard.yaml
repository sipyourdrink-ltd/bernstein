## Summary

New users must manually create `bernstein.yaml`, understand the agent model, configure adapters, and set up `.sdd/`. This friction prevents adoption. A guided wizard would convert "installed but confused" to "running first session in 2 minutes."

## Objective & Definition of Done

1. `bernstein init` — interactive wizard (works in terminal, no GUI)
2. Steps:
   a. Detect installed agents (reuse `discover_agents()`) — show found/missing
   b. Ask: "What's this project? (Python backend / JS frontend / mixed / other)"
   c. Ask: "Budget per session? ($1 / $5 / $20 / unlimited)"
   d. Generate `bernstein.yaml` with detected agents, appropriate defaults
   e. Create `.sdd/` structure
   f. Offer to create a sample backlog ticket
3. Non-interactive mode: `bernstein init --yes` with all defaults
4. Idempotent: if `bernstein.yaml` exists, ask to overwrite or merge
5. Works on first install (no existing config required)

## Steps

1. Create `cli/init_cmd.py`
2. Use `click.prompt()` for questions with defaults
3. Reuse `discover_agents()`, `ensure_sdd()`, `auto_write_bernstein_yaml()`
4. Template system for generated yaml based on project type

## Tests & Verification

- `uv run ruff check src/bernstein/`
- `uv run pytest tests/unit/ -x -q`

