## Summary

When multiple Bash (or shell) tool calls run concurrently in one batch and one fails, abort the remaining siblings immediately to avoid conflicting filesystem mutations and confusing partial state.

## Objective & Definition of Done

- [ ] Detect Bash tool family in concurrent batch handling
- [ ] On first non-zero exit or tool error, cancel pending siblings in the same batch
- [ ] Return aggregated error to the model with clear ordering
- [ ] Tests added

## Verification

- Run tests
- Simulate one failing Bash call and assert siblings do not complete successfully
