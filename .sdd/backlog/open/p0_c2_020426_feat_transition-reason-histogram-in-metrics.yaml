## Summary

Aggregate named transition reasons produced by the tick pipeline into a histogram or labeled counter family, exportable to Prometheus and surfaced in the TUI, so operators can see why ticks end (complete, stall, abort class, etc.) at a glance.

## Objective & Definition of Done

- [ ] Reason labels use a closed set or sanitized dynamic set with cardinality limits.
- [ ] Prometheus export includes the new metric; TUI reads the same source if applicable.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Unit or integration test: emit sample reasons; scrape or inspect metric values
- Align with T401 named reasons if that ticket is merged first
