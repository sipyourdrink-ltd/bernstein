## Summary

Bernstein's task server has a REST API, but there's no Python SDK for programmatic access. Users building integrations (CI pipelines, custom dashboards, Slack bots) must hand-write HTTP requests.

## What's Done

- [x] `sdk/python/` directory with full package structure: `pyproject.toml`, `uv.lock`, `README.md`
- [x] `sdk/python/src/bernstein_sdk/` — package with typed client implementation
- [x] `sdk/python/tests/` — test suite directory with test files
- [x] Also: `sdk/typescript/` exists (TypeScript SDK variant started)

## Remaining Work

1. **Audit API coverage** — verify the SDK covers all endpoints in `core/routes/`: tasks CRUD, status, agents, costs, workspace, bulletin, trigger. Add missing methods.
2. **Async client** — confirm `AsyncBernsteinClient` exists and mirrors sync client. If not, implement it.
3. **Typed response models** — verify all response types are modeled as dataclasses/Pydantic, not raw dicts.
4. **Auth header** — verify bearer token is passed in `Authorization` header on all requests.
5. **Test coverage** — run `uv run pytest` in `sdk/python/` and fix any failures. Add mock transport tests for any uncovered endpoints.
6. **PyPI publish** — set up `hatch build` + `twine upload` or `uv publish` workflow.
7. **README** — ensure `sdk/python/README.md` has install + usage examples.

## Objective & Definition of Done

1. ~~`sdk/python/bernstein_sdk/` package with typed client~~ ✅ Done
2. Core operations: create, get, list, complete tasks
3. Typed responses: `Task`, `AgentStatus`, `Metrics` dataclasses
4. Async variant: `AsyncBernsteinClient` with httpx.AsyncClient
5. Auth support: bearer token passed in constructor
6. Published to PyPI as `bernstein-sdk`
7. 100% API coverage with unit tests using httpx mock transport

