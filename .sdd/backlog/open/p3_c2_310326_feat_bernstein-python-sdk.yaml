## Best Approach

Run the existing tests first (`cd sdk/python && uv run pytest`) to see current state. Then audit `src/bernstein_sdk/` against the full API surface in `src/bernstein/core/routes/`. Add missing methods incrementally. Publish is the last step — get coverage and types right first.

