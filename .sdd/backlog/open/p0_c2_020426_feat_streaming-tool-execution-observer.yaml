## Summary

Implement a tool execution observer that captures real-time tool call events (start, progress, complete, error) from agents and publishes them to the event bus so downstream consumers (metrics, TUI, traces) can subscribe without polling adapter logs.

## Objective & Definition of Done

- [ ] Observer emits structured events for tool start, progress, complete, and error with stable schema.
- [ ] Events integrate with the existing event bus or equivalent pub/sub path used by the orchestrator.
- [ ] Adapter and worker paths instrumented without blocking the main execution loop.
- [ ] Metric collector can record tool-level telemetry from the stream.
- [ ] Tests added proving event ordering and error paths

## Verification

- Run targeted unit tests for worker/metrics integration
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
