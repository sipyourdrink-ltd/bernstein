## Summary

Allow each tool type to declare its interrupt behavior (cancel immediately versus block until done) so the orchestrator handles user interrupts correctly and avoids corrupting partial tool side effects.

## Objective & Definition of Done

- [ ] Tool types (or adapter metadata) can declare interrupt policy explicitly.
- [ ] Worker respects policy when handling interrupt signals.
- [ ] Default behavior documented for tools without explicit classification.
- [ ] Tests added for immediate cancel vs block-until-done paths

## Verification

- Run targeted unit tests for worker interrupt handling
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
