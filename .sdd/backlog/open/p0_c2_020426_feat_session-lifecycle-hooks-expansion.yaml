## Summary

Expand hook events from six to cover the full session lifecycle: SessionStart, SessionEnd, PreCompact, PostCompact, ConfigChange, WorktreeCreate, WorktreeRemove, and CwdChanged, with clear ordering guarantees.

## Objective & Definition of Done

- [ ] All listed events exist in hookspecs with stable names.
- [ ] Manager fires each event at the correct lifecycle point in the codebase.
- [ ] Migration note for plugins relying on old event set.
- [ ] Tests added for event ordering where deterministic

## Verification

- Run targeted unit tests for plugin manager lifecycle
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
