## Summary

Support template variables in plugin hook commands (for example plugin root, data directory, user config values) so plugin definitions stay portable across machines without hard-coded absolute paths.

## Objective & Definition of Done

- [ ] Documented set of variables resolved at hook invocation time.
- [ ] Manager performs substitution safely (no shell injection via values).
- [ ] Unknown variables fail clearly or use empty string per documented policy.
- [ ] Tests added for substitution and edge cases

## Verification

- Run targeted unit tests for plugin manager
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
