## Summary

In headless or unattended runs, route permission decisions through hook-based policy (or configured policy callbacks) before falling back to auto-deny, so the orchestrator can own approvals without an interactive TTY.

## Objective & Definition of Done

- [ ] Headless path consults policy hooks with clear timeout and default when hooks abstain.
- [ ] Orchestrator integrates the same approval entry points as interactive mode where possible.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run unit tests mocking headless context and hook responses
- Smoke: unattended run with policy hook allowing a safe operation completes without stdin
