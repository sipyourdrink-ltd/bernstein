## Summary

Add PID-based lock files for active agent worktrees and automatic cleanup of stale worktrees whose owning process is no longer alive, reducing orphaned directories and disk churn after crashes or killed agents.

## Objective & Definition of Done

- [ ] Lock file format records PID, session id, and created time.
- [ ] Stale detection uses alive checks appropriate for the platform.
- [ ] Active worktrees are never removed while the lock is valid.
- [ ] Tests added using tmp_path and fake PIDs.

## Verification

- Run targeted unit tests for worktree cleanup
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
