## Summary

When an agent run approaches its token budget threshold, inject a short meta-message into the prompt or conversation instructing the agent to summarize and conclude, reducing hard kills and wasted partial work.

## Objective & Definition of Done

- [ ] Threshold and nudge text are configurable with safe defaults.
- [ ] Nudge fires at most once per task phase unless policy says otherwise.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run `uv run pytest tests/unit/test_task_batching.py -x -q` or nearest task lifecycle tests
- Verify nudge appears in spawn prompt fixtures under threshold conditions
