## Summary

After context compaction, reinject critical state (file snapshots, plans, skills) with per-category token budgets so the agent retains grounding without starving the working context window.

## Objective & Definition of Done

- [ ] Categories (files, plan, skills, etc.) have configurable budget caps.
- [ ] Reinjection order documented when total budget is exceeded (priority drop).
- [ ] Spawn prompt builder integrates with compaction events.
- [ ] Prompt caching behavior documented for reinjected blocks.
- [ ] Tests added for budget trimming and ordering

## Verification

- Run targeted unit tests for spawn_prompt
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
