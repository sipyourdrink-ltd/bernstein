## Summary

One-command compliance configuration. `bernstein init --compliance soc2`.
Sets: audit logging, data retention, access controls, encryption.
Preset validates: are all required controls in place?
Acceptance: `bernstein doctor --compliance soc2` shows compliance checklist.

## Objective & Definition of Done

- [ ] Compliance Presets (SOC2, HIPAA, GDPR, FedRAMP) implemented and working
- [ ] Unit tests pass
- [ ] Ruff lint clean

## Steps

1. Read relevant source files
2. Implement the feature
3. Add/update unit tests
4. Run `uv run ruff check src/` and `uv run pytest tests/unit/ -x -q`

## Tests & Verification

- `uv run ruff check src/bernstein/`
- `uv run pytest tests/unit/ -x -q`

## Remaining Work

- Repo truth already implements compliance presets in `src/bernstein/core/compliance.py` and exercises them in `tests/unit/test_compliance.py`.
- Current scope is only the base tiers `development`, `standard`, and `regulated`.
- To finish this ticket:
  - add named aliases `soc2`, `hipaa`, `gdpr`, and `fedramp`
  - map each alias onto concrete `ComplianceConfig` defaults instead of introducing a parallel preset system
  - extend CLI/config parsing (`run_cmd.py`, status/doctor surfaces) and tests so the enterprise aliases behave as first-class inputs
- Smallest safe path: alias on top of the existing `CompliancePreset` model and prerequisite warnings rather than redesigning compliance config.

