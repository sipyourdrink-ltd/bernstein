## Summary

Support multiple agent backends (subprocess, tmux pane, in-process) selectable per task based on isolation requirements and resource constraints, with a clear seam in the spawner so adapters remain backend-agnostic where possible.

## Objective & Definition of Done

- [ ] Backend selection is configurable per task or policy (documented precedence).
- [ ] Subprocess path remains the default; tmux and in-process backends are pluggable.
- [ ] Lifecycle (start, signal, reap) works for each backend with tests.
- [ ] Base adapter or spawner documents contracts for new backends.
- [ ] Tests added with mocks for process/tmux boundaries

## Verification

- Run targeted unit tests for spawner and adapter integration
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
