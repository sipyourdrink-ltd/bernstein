## Summary

When context compaction runs, write structured boundary records into agent trace JSONL (pre/post token counts, summary metadata, correlation id) so post-run analysis can segment conversation history across compactions.

## Objective & Definition of Done

- [ ] Marker type is versioned or namespaced in JSONL records for forward compatibility.
- [ ] Metric collector can optionally increment counters from the same hook path.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Unit test: simulate compaction; parse JSONL and assert marker fields
- Verify markers do not break existing trace consumers (optional field)
