## Summary

Extend session checkpointing so it can capture mid-turn state—current tool, partial output, and a compact context snapshot—enabling finer-grained resume after crashes or `bernstein stop` without forcing agents to restart entire turns from scratch.

## Objective & Definition of Done

- [ ] Checkpoint schema versioned and backward compatible where possible.
- [ ] Serialization excludes secrets and stays within configurable size limits.
- [ ] Resume path consumes mid-turn checkpoints without corrupting task state.
- [ ] Tests added for save, load, and migration of checkpoint format.

## Verification

- Run targeted unit tests for session and checkpoint modules
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
