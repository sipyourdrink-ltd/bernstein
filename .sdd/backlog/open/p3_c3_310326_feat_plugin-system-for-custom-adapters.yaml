## Summary

Adding a new adapter requires modifying Bernstein's source code (adapters/, registry.py, agent_discovery.py). Third-party adapters can't be installed as separate packages. This limits ecosystem growth.

## Objective & Definition of Done

1. Adapters discoverable via Python entry points: `[project.entry-points."bernstein.adapters"]`
2. External package format: `pip install bernstein-adapter-foo`
3. Plugin adapter loaded at startup alongside built-in adapters
4. Plugin must implement `AdapterBase` interface (enforced at load time)
5. `bernstein agents --plugins` shows installed plugin adapters
6. Plugin adapters participate in routing and discovery like built-in adapters
7. Documentation: "How to write a Bernstein adapter plugin" guide

## Steps

1. Use `importlib.metadata.entry_points(group="bernstein.adapters")` for discovery
2. Load at startup in `agent_discovery.py` — call each entry point's `detect()` function
3. Register in adapter registry alongside built-in adapters
4. Validate: check adapter class inherits `AdapterBase`, has required methods
5. Error handling: plugin load failure logs warning, doesn't crash startup
6. Create `docs/plugin-guide.md` with template project

