## Summary

When context compaction or history summarization runs, per-task token budgets can be under-counted or misaligned with actual usage. Track and adjust budgets across compaction so cost limits and telemetry stay accurate.

## Objective & Definition of Done

- [ ] Persist pre-compaction usage and reconcile post-compaction effective budget
- [ ] Integrate with spawn prompt / session continuity so trackers see a single logical task spend
- [ ] Document adjustment rules for operators
- [ ] Tests added

## Verification

- Run tests
- Verify budget math before and after a simulated compaction event
