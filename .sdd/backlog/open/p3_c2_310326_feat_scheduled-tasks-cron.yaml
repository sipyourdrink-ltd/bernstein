## Summary

Maintenance tasks (git hygiene, metrics cleanup, dependency updates, security scans) require manual triggering. No way to run them on a schedule.

## Objective & Definition of Done

1. `bernstein.yaml` supports schedules:
   ```yaml
   schedules:
     - cron: "0 2 * * *"
       task: "Run git hygiene and clean stale branches"
       role: backend
       priority: 3
     - cron: "0 0 * * 0"
       task: "Update dependencies and run tests"
       role: qa
       priority: 2
   ```
2. Cron expressions parsed with `croniter` library
3. Scheduler runs as background thread in orchestrator
4. Missed schedules (server was down): run once on startup if >1 period overdue
5. `bernstein schedules list` shows next run times
6. `bernstein schedules run <name>` triggers manually
7. No external cron dependency (self-contained)

## Steps

1. Add `croniter` to optional dependencies
2. Create `core/scheduler.py` with `CronScheduler` class
3. Background thread: sleep until next trigger, create task, repeat
4. Persist last-run timestamps in `.sdd/runtime/schedules.json`
5. Startup check: compare last-run with expected — catch up if needed

## Tests & Verification

- `uv run ruff check src/bernstein/`
- `uv run pytest tests/unit/ -x -q`

