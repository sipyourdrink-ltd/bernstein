## Summary

Implement a small rule engine that evaluates deny, ask, and allow rules against tool name and structured inputs, with glob-style matching for command strings and filesystem paths so operators can express coarse policies without code changes.

## Objective & Definition of Done

- [ ] Rule schema supports deny/ask/allow with pattern fields for tool and path-like arguments.
- [ ] First matching rule wins (or documented precedence) is implemented and tested.
- [ ] Integration with guardrails and optional alignment with `.bernstein/rules.yaml` conventions.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run unit tests with representative glob matches and edge cases (empty, overlap)
- Pyright strict on touched modules
