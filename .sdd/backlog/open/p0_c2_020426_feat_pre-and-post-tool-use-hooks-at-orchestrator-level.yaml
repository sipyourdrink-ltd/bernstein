## Summary

Add PreToolUse and PostToolUse hook events that fire when agents start and complete tool calls, enabling policy enforcement and auditing at the orchestrator layer independent of any single CLI adapter.

## Objective & Definition of Done

- [ ] PreToolUse receives tool name and arguments metadata (redacted where needed).
- [ ] PostToolUse receives outcome (success, error, truncated) consistent with observer events.
- [ ] Worker invokes plugin manager at both boundaries without deadlocking.
- [ ] Tests added with mocked tool calls

## Verification

- Run targeted unit tests for worker and plugin hooks
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
