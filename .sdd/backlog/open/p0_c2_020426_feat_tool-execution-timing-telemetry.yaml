## Summary

Record per-tool-call timing splits (queue wait, execute, total wall time) and aggregate into p50/p90/p99 histograms per tool type for performance regression detection and provider comparison.

## Objective & Definition of Done

- [ ] Timestamps captured at enqueue, start, and completion with monotonic clock where appropriate.
- [ ] Histograms or summary stats exposed via existing metrics facade.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Unit tests with fake clocks or injected durations
- Confirm cardinality of metric labels is bounded (tool family, not raw args)
