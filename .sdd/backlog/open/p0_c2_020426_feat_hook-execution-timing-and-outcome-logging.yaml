## Summary

For every plugin hook invocation, log structured timing and outcome data (duration, success/failure, async completion status, and effective blocking decision) to improve debugging of slow or flaky hooks.

## Objective & Definition of Done

- [ ] Hook wrapper records start/end and outcome without logging sensitive hook arguments.
- [ ] Optional metric counters or histograms for hook duration by hook name.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Unit test: failing hook logs failure; slow hook records duration above threshold in test
- Confirm log volume is acceptable (sample or debug level if needed)
