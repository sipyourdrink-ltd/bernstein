## Summary

Tag API calls as foreground (task-critical) vs background (session memory, cache warming, housekeeping) and suppress or backoff background retries during 529-style overload so retry storms do not amplify provider pressure while user-visible work still gets fair retries.

## Objective & Definition of Done

- [ ] Request classification plumbed from spawner or HTTP client layer into rate limit handling.
- [ ] Background requests honor stricter backoff or drop policy under overload.
- [ ] Foreground behavior unchanged or improved vs today (documented).
- [ ] Tests added for classification and overload scenarios (mocked HTTP).

## Verification

- Run targeted unit tests for rate limit tracker and spawner
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
