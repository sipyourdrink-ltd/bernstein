## Summary

After context compaction, reinject the most recent snapshots of critical files (cap: five files, ~5k tokens each, configurable) so the agent retains working knowledge of the files it was editing, without undoing the benefits of compaction.

## Objective & Definition of Done

- [ ] Selection policy for “critical” files is deterministic and documented (e.g. owned files, recent edits).
- [ ] Hard caps on file count and tokens enforced before injection.
- [ ] Interaction with prompt caching keys documented to avoid accidental cache poisoning.
- [ ] Tests added for selection, caps, and injection ordering.

## Verification

- Run targeted unit tests for spawn prompt and caching
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
