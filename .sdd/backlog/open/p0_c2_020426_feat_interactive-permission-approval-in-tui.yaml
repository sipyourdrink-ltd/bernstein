## Summary

Let operators approve or deny pending agent permission requests from the TUI, using the same approval gate semantics as CLI or HTTP flows so runs are not blocked on a separate terminal.

## Objective & Definition of Done

- [ ] Pending requests appear in TUI with enough context to decide safely.
- [ ] Approve/deny actions call existing approval APIs or core functions; no duplicate policy logic.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run `uv run pytest tests/unit/test_tui_helpers.py -x -q`
- Verify behavior in TUI/CLI
