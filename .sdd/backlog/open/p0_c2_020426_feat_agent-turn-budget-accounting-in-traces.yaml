## Summary

Record per-turn token budget fields (allocated budget, consumed this turn, remaining) into agent trace JSONL so post-run analysis can evaluate budget efficiency and misfires between cost tracker and actual usage.

## Objective & Definition of Done

- [ ] Trace records include budget snapshot at turn boundaries without duplicating full prompts.
- [ ] Cost tracker remains source of truth; traces receive read-only snapshots.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Unit test: mock budget state; verify trace line contains expected numbers
- Pyright strict on touched modules
