## Summary

Allow hooks to declare asynchronous execution so they run in the background without blocking the orchestration pipeline, with explicit lifecycle (fire-and-forget vs tracked task) documented to avoid silent failures.

## Objective & Definition of Done

- [ ] Hook metadata supports an async/background flag (hookspecs + registration).
- [ ] Manager schedules async hooks without blocking the main tick path.
- [ ] Logging captures start and completion (or failure) of background hooks.
- [ ] Tests added proving non-blocking behavior

## Verification

- Run targeted unit tests for plugin manager
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
