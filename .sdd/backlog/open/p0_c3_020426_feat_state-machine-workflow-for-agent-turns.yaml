## Summary

Model agent turn progression as an explicit state machine with named states and legal transitions. This makes lifecycle behavior testable, observable in metrics/logs, and easier to reason about than implicit branching across modules.

## Objective & Definition of Done

- [ ] Define states, transitions, and entry/exit hooks for a single agent turn lifecycle
- [ ] Refactor or align tick pipeline, task lifecycle, and agent lifecycle with the state machine (minimal behavior change, structural clarity)
- [ ] Add tests that assert valid transitions and reject illegal ones
- [ ] Tests added

## Verification

- Run tests
- Verify orchestrator ticks and spawn/complete paths still behave correctly
