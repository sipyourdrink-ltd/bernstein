## Summary

Correlate cache break events across concurrent agents to distinguish systemic causes (shared template change, global model config update) from per-agent drift, using shared fingerprints and time windows in metrics for cluster-wide visibility.

## Objective & Definition of Done

- [ ] Break events carry a fingerprint of the changed component hash class.
- [ ] Aggregator detects N agents breaking on same fingerprint within configurable window.
- [ ] Systemic vs local labels exposed in metrics or structured logs.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Unit tests: simulate two agents with same break fingerprint vs different
- Cardinality and memory bounds validated for correlation buffer
