## Summary

Detect prompt cache invalidation by tracking stable hashes of system text, tool schemas, and model configuration; when a break occurs, emit a human-readable diff (or field-level summary) explaining what changed to aid debugging and cost analysis.

## Objective & Definition of Done

- [ ] Baseline hashes recorded per cache key; break detected on mismatch.
- [ ] Diff or structured before/after summary logged and/or attached to metrics.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Unit tests: mutate system prefix vs tools vs model id and assert break + diff classification
- Confirm no unbounded growth of stored hash history
