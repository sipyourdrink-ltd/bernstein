## Summary

Add a `concurrency_safe` flag to tool definitions indicating whether a tool may run in parallel with other tools (e.g., read-only operations) versus requiring serialization, enabling smarter batching later.

## Objective & Definition of Done

- [ ] Extend tool metadata model with `concurrency_safe: bool` defaulting to conservative false
- [ ] Annotate built-in or known tools where classification is obvious
- [ ] Expose flag to orchestrator/spawner for scheduling decisions
- [ ] Tests added

## Verification

- Run tests
- Verify tools without explicit flag default to non-concurrent-safe
