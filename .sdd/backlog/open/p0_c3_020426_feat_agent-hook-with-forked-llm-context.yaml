## Summary

Add an agent hook type that forks a lightweight LLM call with hook input and bounded conversation context for AI-powered policy decisions (allow, deny, ask), with token budgets, timeouts, and no feedback loop into the main agent turn.

## Objective & Definition of Done

- [ ] New hook kind declared in hookspecs with input/output schema.
- [ ] Manager invokes `llm` client with isolated context slice and model override option.
- [ ] Cost and latency limits enforced; failures degrade to safe default.
- [ ] Tests added with mocked LLM client

## Verification

- Run targeted unit tests for plugin manager and LLM integration
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
