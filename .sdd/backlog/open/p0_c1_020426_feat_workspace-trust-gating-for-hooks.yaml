## Summary

Skip hook execution until workspace trust is explicitly accepted, preventing untrusted plugin-defined commands from running on first open of a repository or workspace.

## Objective & Definition of Done

- [ ] Trust state is read from a documented store (file or session flag).
- [ ] All hook invocations no-op or defer until trust is granted.
- [ ] Clear operator messaging when hooks are gated.
- [ ] Tests added for trusted vs untrusted workspace

## Verification

- Run targeted unit tests for plugin manager trust gate
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
