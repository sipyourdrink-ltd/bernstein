## Summary

Implement a layered permission check pipeline: deny rules, ask rules, tool-specific checks, safety checks, and mode bypass, ensuring bypass-immune tiers cannot be skipped so high-risk actions always hit mandatory gates.

## Objective & Definition of Done

- [ ] Evaluation order fixed and documented; bypass applies only to eligible tiers.
- [ ] Deny and safety-critical tiers cannot be skipped by mode flags.
- [ ] Guardrails and approval modules share consistent decision types.
- [ ] Tests added for each layer and bypass interaction

## Verification

- Run targeted unit tests for guardrails and approval
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
