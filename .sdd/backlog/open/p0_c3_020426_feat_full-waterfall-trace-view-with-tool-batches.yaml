## Summary

Implement a waterfall-style trace visualization in the TUI that shows tool batches (concurrent versus serial groups), timing bars, and abort or cancellation chains parsed from trace records.

## Objective & Definition of Done

- [ ] Waterfall view groups tool calls into batches with correct overlap semantics from trace data.
- [ ] Aborts and early exits link visually to the triggering span or event.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run `uv run pytest tests/unit/test_tui_helpers.py -x -q`
- Verify behavior in TUI/CLI with a sample trace fixture
