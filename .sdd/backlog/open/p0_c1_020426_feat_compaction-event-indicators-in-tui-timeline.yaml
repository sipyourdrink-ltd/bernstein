## Summary

Add visible markers on the TUI timeline when context compaction events occur during agent sessions, so operators can correlate stalls or quality drops with compaction.

## Objective & Definition of Done

- [ ] Timeline renders distinct markers for compaction events with timestamp alignment to other events.
- [ ] Marker legend or tooltip explains the compaction source when available.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

