## Summary

Define a `CacheSafeParams` structure (system prompt, user context, fork messages) that forked agents must preserve so prompt-cache keys remain stable and prefix reuse works across parent and child agent invocations.

## Objective & Definition of Done

- [ ] `CacheSafeParams` (or equivalent) is a typed structure with documented fields.
- [ ] Spawn prompt building uses it for forked agent paths.
- [ ] Prompt caching integration validates or documents cache key alignment.
- [ ] Tests added proving stable prefixes across fork scenarios

## Verification

- Run targeted unit tests for spawn_prompt/prompt_caching
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
