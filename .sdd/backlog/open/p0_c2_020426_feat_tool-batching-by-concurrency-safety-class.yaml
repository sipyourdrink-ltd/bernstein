## Summary

Partition pending tool calls into concurrent batches (tools marked `concurrency_safe`) versus serial batches for mutating or unsafe tools. Execute safe tools in parallel and unsafe tools strictly sequentially to maximize throughput without violating ordering guarantees.

## Objective & Definition of Done

- [ ] Implement batch planner using `concurrency_safe` metadata
- [ ] Respect dependencies between tools when reordering is invalid
- [ ] Integrate with spawner/worker execution loop
- [ ] Tests added

## Verification

- Run tests
- Verify mixed safe/unsafe queues run parallel then serial with correct results
