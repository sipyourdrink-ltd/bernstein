## Summary

Prevent duplicate hook execution when the same hook template is registered by multiple plugins by deduplicating based on plugin or skill root so identical logic runs once per logical source.

## Objective & Definition of Done

- [ ] Dedup key includes normalized hook identity and plugin root path.
- [ ] First registration wins or documented precedence for conflicts.
- [ ] Logging indicates when a duplicate registration is skipped.
- [ ] Tests added for multi-plugin same-hook scenarios

## Verification

- Run targeted unit tests for plugin manager registration
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
