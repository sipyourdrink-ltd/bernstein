## Best Approach

Wire the CLI first (one-line change in `main.py`), fix the URL bug, then add the server-side `/trigger` route. The `TriggerManager` already handles evaluation logic — the route just needs to construct a `TriggerEvent` from the HTTP payload and call `mgr.evaluate(event)`.

