## Summary

Tasks are created manually or by the manager agent. External systems (GitHub push hooks, Slack commands, CI failures) can't trigger Bernstein tasks. This limits Bernstein to interactive use only.

## What's Done

- [x] `src/bernstein/core/trigger_manager.py` — `TriggerManager` class with config parsing, trigger evaluation, fire history, dedup
- [x] `src/bernstein/core/models.py` — `TriggerEvent` dataclass for typed event payloads
- [x] `src/bernstein/cli/triggers_cmd.py` — CLI commands: `triggers list`, `triggers history`, `triggers fire`
- [x] Config format: reads `.sdd/config/triggers.yaml` for trigger definitions
- [x] Manual fire: `triggers fire <name>` creates synthetic event and evaluates

## Remaining Work

1. **Wire CLI into main.py** — `triggers_cmd.py` exists but is not registered via `cli.add_command(triggers_group, "triggers")` in `main.py`. Has a TODO(D6) comment noting this.
2. **Fix hard-coded URL** — `triggers fire` uses `http://127.0.0.1:8052` instead of `helpers.SERVER_URL`. Replace with `server_post()` from helpers.
3. **Add `/trigger` HTTP route** — create a FastAPI route in `core/routes/` that accepts webhook POST, validates HMAC, evaluates via `TriggerManager`, creates tasks.
4. **GitHub webhook parsing** — parse `X-Hub-Signature-256` header, extract event type from `X-GitHub-Event`, map payload fields to trigger template vars.
5. **Rate limiting** — add rate limit (10/min) to the `/trigger` endpoint.
6. **Integration test** — mock webhook POST with HMAC signature, verify task creation.

## Objective & Definition of Done

1. `POST /trigger` endpoint: accepts JSON payload, creates task from template
2. GitHub webhook support: on push to branch → run tests, on issue opened → create task
3. Generic webhook: `{"title": "...", "description": "...", "priority": 1}` → task created
4. Webhook secret validation (HMAC-SHA256) for GitHub
5. ~~Trigger templates~~ ✅ Done via `TriggerManager` config
6. Rate limit: 10 triggers per minute
7. Auth: webhook secret or bearer token

