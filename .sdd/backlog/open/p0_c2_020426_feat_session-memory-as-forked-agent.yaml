## Summary

Implement periodic session memory extraction using a narrowly scoped “forked” agent run: restricted tool access limited to edits under an approved memory file path, scheduled in the background so main task agents are not blocked and blast radius stays small.

## Objective & Definition of Done

- [ ] Spawn path supports a memory-extraction role or flag with tool ACL limited to the memory artifact path.
- [ ] Scheduling/triggering is defined (interval, idle gate, or post-task) and documented.
- [ ] Failures are logged without failing the primary orchestration tick.
- [ ] Tests added with mocked spawner and filesystem.

## Verification

- Run targeted unit tests for spawner and lessons integration
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
