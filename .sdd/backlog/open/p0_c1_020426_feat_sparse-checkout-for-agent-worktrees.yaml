## Summary

Support sparse checkout when creating agent worktrees via a configurable list of paths (or patterns where git supports them), reducing disk usage and git metadata overhead for large monorepos while keeping Bernstein’s worktree lifecycle safe and documented.

## Objective & Definition of Done

- [ ] Configuration surface documents how users specify sparse checkout paths for agent worktrees.
- [ ] Worktree creation applies sparse checkout when enabled and validates failure modes (unsupported git version, bad paths).
- [ ] Logging and metrics make sparse vs full checkout observable.
- [ ] Tests added (mocked git where appropriate).

## Verification

- Run targeted unit tests for worktree helpers
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
