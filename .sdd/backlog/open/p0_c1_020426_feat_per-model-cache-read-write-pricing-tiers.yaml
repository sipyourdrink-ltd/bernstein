## Summary

Extend cost tracking to treat prompt cache read and cache write tokens separately per model, matching provider billing where distinct rates apply, so dashboards and budgets reflect real spend instead of lumping cached tokens into input pricing only.

## Objective & Definition of Done

- [ ] Model cost metadata supports cache read and cache write rates where known.
- [ ] Cost tracker accumulates and exports the new breakdown without breaking existing fields.
- [ ] Backward compatibility for models without cache breakdown (single input rate).
- [ ] Tests added for cost math and reporting snapshots.

## Verification

- Run targeted unit tests for cost and cost tracker
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
