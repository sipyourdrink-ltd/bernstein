## Summary

Track prompt cache prefix state per agent session with a hard cap (maximum ten agent entries); when the cap is exceeded, evict the oldest entry FIFO so long-running multi-agent runs do not grow memory without bound.

## Objective & Definition of Done

- [ ] Per-agent key includes stable session identifier used elsewhere in Bernstein.
- [ ] FIFO eviction is deterministic and covered by tests.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Unit test: insert 11 agents, assert first evicted and lookups behave as expected
- Memory sanity: no unbounded dict growth in stress loop
