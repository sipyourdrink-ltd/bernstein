## Summary

When execution is provably sandboxed (container boundary, nsjail, or equivalent verified profile), automatically relax ask-rules for Bash and similar tools to reduce friction while keeping deny rules and bypass-immune checks intact.

## Objective & Definition of Done

- [ ] Sandbox detection is explicit (env flag, cgroup, or injected metadata) and spoof-resistant enough for policy use.
- [ ] Relaxation applies only to configured rule classes (e.g. ask → allow for bash in sandbox).
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Unit tests: sandbox on vs off changes decision for the same synthetic command
- Verify deny rules still apply in sandbox mode
