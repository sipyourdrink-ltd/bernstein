## Summary

Allow hooks to elicit additional information from the operator via a structured prompt and response protocol on stdin and stdout, suitable for TUI or CLI frontends, with timeouts and cancellation.

## Objective & Definition of Done

- [ ] Protocol schema documented (request types, response envelope).
- [ ] Hookspecs declare when a hook may elicit input.
- [ ] Manager bridges hook IO to the active UI layer or fails gracefully in non-interactive mode.
- [ ] Tests added with mocked stdin/stdout

## Verification

- Run targeted unit tests for plugin manager
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
