## Summary

Add an optional in-process backend for “spawning” agents inside the same Python process for lightweight tasks, reducing subprocess overhead and enabling shared memory or context where safe. Must not break the default out-of-process CLI agent path.

## Objective & Definition of Done

- [ ] Define backend selection in spawner configuration
- [ ] Implement in-process execution path with same lifecycle hooks as subprocess workers
- [ ] Isolate failure domains (crashes must not take down the task server)
- [ ] Tests added

## Verification

- Run tests
- Verify a trivial task runs in-process and full CLI path unchanged by default
