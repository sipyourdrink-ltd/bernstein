## Summary

Notify the prompt cache tracker when context compaction or explicit cache deletion occurs so expected token or prefix drops are treated as explained events rather than false-positive cache breaks.

## Objective & Definition of Done

- [ ] Public API on cache tracker (or orchestrator callback) for expected invalidation reasons.
- [ ] Compaction and deletion paths call the notifier before resetting baselines.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Unit test: expected drop does not emit cache-break analytics; unexpected still does
- Cross-check with T470/T471 if implemented together
