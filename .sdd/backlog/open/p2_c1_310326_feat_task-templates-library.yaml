## Remaining Work

Repo truth already contains two substantial building blocks for this: reusable YAML scenarios in `src/bernstein/core/scenario_library.py` and shareable execution recipes in `src/bernstein/core/recipe.py` with existing CLI `cook` support in `src/bernstein/cli/run_cmd.py`. What remains is the unifying library/index and the user-facing template workflows described in this ticket.

Best next implementation inside Bernstein:
1. Add a thin `task_template_library` layer that indexes built-in scenario/recipe assets plus optional `.sdd/templates/*.yaml` without inventing a third incompatible schema.
2. Add `bernstein templates list` first, then wire `bernstein run --template <name>` to resolve through that library before any goal decomposition path.
3. Leave community install as a final additive step after the local library and listing command exist, so the core workflow is deterministic and testable first.
