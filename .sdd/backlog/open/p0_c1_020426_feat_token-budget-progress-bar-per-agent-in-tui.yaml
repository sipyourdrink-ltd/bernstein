## Summary

Display a live progress bar in the TUI agent panel for each active agent showing consumption of its allocated token budget, using data already exposed by the orchestrator or task server where available.

## Objective & Definition of Done

- [ ] Each active agent row includes a progress bar reflecting used vs budget tokens (or explicit “unknown” when data is missing).
- [ ] Bar updates on the same refresh cadence as the rest of the agent panel.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run `uv run pytest tests/unit/test_tui_helpers.py -x -q`
- Verify behavior in TUI/CLI
