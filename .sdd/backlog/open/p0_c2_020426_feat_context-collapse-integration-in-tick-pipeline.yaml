## Summary

Implement staged context collapse that progressively drops or summarizes older context when approaching model window limits, coordinated from the tick pipeline before spawn or retry so retries start from a smaller, valid prompt.

## Objective & Definition of Done

- [ ] Collapse stages are ordered and observable (metrics or logs per stage).
- [ ] Integration with spawn prompt builder preserves task goal and critical constraints.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

