## Summary

Add an optional fast / high-throughput mode that prefers aggressive parallelism or premium routes until rate limits hit with long `Retry-After`, then automatically enters a cooldown window and restores fast mode when limits clear, coordinated between the router and rate limit tracker.

## Objective & Definition of Done

- [ ] Configuration toggles fast mode and cooldown parameters.
- [ ] State transitions (fast → cooldown → fast) are logged and testable.
- [ ] Router respects cooldown signals for model/tier selection.
- [ ] Tests added for limit detection and mode transitions.

## Verification

- Run targeted unit tests for rate limit tracker and router
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
