## Summary

Symlink large, read-heavy directories (for example `node_modules`, `.venv`, build output) from the main repository into agent worktrees instead of duplicating them, cutting disk use and worktree setup time while avoiding breakage on platforms or repos where symlinks are unsafe.

## Objective & Definition of Done

- [ ] Configurable list of directory names or paths to symlink from the primary worktree into new agent worktrees.
- [ ] Clear behavior when targets are missing, cross-filesystem, or symlink creation fails (fallback or explicit error).
- [ ] Documentation covers Windows and mixed-OS caveats.
- [ ] Tests added for happy path and failure handling.

## Verification

- Run targeted unit tests for worktree creation
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
