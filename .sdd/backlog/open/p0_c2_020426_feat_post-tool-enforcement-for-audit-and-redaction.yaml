## Summary

Add post-tool-use enforcement points that can inspect tool output, redact sensitive substrings before persistence or display, write audit records, and optionally block continuation when output matches danger patterns.

## Objective & Definition of Done

- [ ] Pluggy hookspecs define post-tool hooks with typed context (tool, args, raw output).
- [ ] Guardrails invoke hooks after tool completion and respect blocking vs advisory outcomes.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Unit tests with mock tool output containing secrets; verify redaction and block paths
- No blocking sync IO in async orchestration paths
