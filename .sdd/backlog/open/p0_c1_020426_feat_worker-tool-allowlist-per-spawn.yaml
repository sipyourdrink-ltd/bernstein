## Summary

Allow the orchestrator to pass a per-spawn tool allowlist that restricts which tools an agent may invoke during that session, supporting least-privilege and role-specific capabilities without changing global adapter defaults.

## Objective & Definition of Done

- [ ] Extend spawn payload or env with optional allowlist
- [ ] Enforce allowlist in base adapter or worker wrapper before tool dispatch
- [ ] Document configuration surface for plan YAML / API if applicable
- [ ] Tests added

## Verification

- Run tests
- Verify disallowed tools are rejected with a clear error for mocked spawns
