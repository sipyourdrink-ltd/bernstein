## Summary

Bernstein orchestrates local CLI agents only. OpenClaw offers remote agent execution, persistent sessions, multi-channel delivery, and a broader agent pool via ACP harnesses. Integrating with OpenClaw as an execution backend enables remote orchestration without local adapter installation.

## What's Done

- [x] `src/bernstein/bridges/__init__.py` — package created with `RuntimeBridge` base class
- [x] `src/bernstein/bridges/base.py` — `RuntimeBridge` ABC (108 lines) defining spawn/poll interface
- [x] `src/bernstein/bridges/openclaw.py` — REST client (108 lines) with session spawn and status polling
- [x] Detailed strategic integration ticket: `.sdd/backlog/closed/D04a-openclaw-runtime-bridge.md`

## Remaining Work

1. **Wire bridge into spawner** — `src/bernstein/core/spawner.py` needs a bridge dispatch path: check `bridges.openclaw.enabled` in config before falling back to local adapter. Currently the bridge exists but spawner doesn't call it.
2. **Config parsing** — add `bridges.openclaw` section support to `SeedConfig` / `.sdd/config.yaml` parser.
3. **Session key tracking** — extend `AgentSession` in `core/models.py` with optional `bridge_session_key` field for lifecycle ops.
4. **`bernstein ps` integration** — show OpenClaw-delegated tasks with `[remote]` indicator.
5. **Fallback logic** — if bridge POST fails, retry with local adapter transparently.
6. **Integration test** — mock OpenClaw API, verify spawn → poll → completion flow.

## Objective & Definition of Done

1. ~~`src/bernstein/bridges/openclaw.py` — REST client for OpenClaw API~~ ✅ Done
