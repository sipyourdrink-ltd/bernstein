## Summary

On provider or transport “prompt too large” responses (HTTP 413 or mapped equivalents), trigger a reactive context compaction path and retry the task once before marking failure, reusing existing compaction utilities where possible.

## Objective & Definition of Done

- [ ] 413 or equivalent errors are classified and do not immediately fail the task.
- [ ] Compaction reduces context deterministically; retry is bounded (e.g. one retry).
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run `uv run pytest tests/unit/test_task_batching.py -x -q` or nearest task lifecycle tests
- Simulate 413 in a mocked HTTP layer and assert retry with compacted prompt
