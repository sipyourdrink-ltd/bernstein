## Summary

Add a TUI panel that visualizes per-model cost tiers and breaks out cache read versus write pricing where the cost engine exposes it, helping operators compare routing choices during a run.

## Objective & Definition of Done

- [ ] Panel lists configured models with tier labels and relative cost hints from `cost.py` data structures.
- [ ] Cache pricing breakdown shown when available; otherwise explicit “not configured”.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

