## Summary

When an agent crashes mid-tool-execution, the API transcript can contain tool-use blocks without matching tool results, breaking consistency on restart. Generate synthetic tool results for orphaned tool-use blocks before restarting the agent so the transcript remains valid and the session can continue safely.

## Objective & Definition of Done

- [ ] Detect orphaned tool-use blocks when recovering from a crashed or restarted agent session
- [ ] Emit synthetic tool results (clearly marked as synthetic/orphan recovery) for those blocks before the next model turn
- [ ] Document behavior and edge cases (partial streams, duplicate IDs)
- [ ] Tests added

## Verification

- Run tests
- Verify behavior with simulated mid-tool crash and restart
