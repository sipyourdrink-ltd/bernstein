## Summary

Enable a split-pane layout in the TUI so each pane can stream live stdout or SSE-backed output from a different selected active agent, with keyboard navigation to focus and resize panes.

## Objective & Definition of Done

- [ ] User can select two or more agents and assign each to a pane without losing global status.
- [ ] Panes resize and reflow on terminal resize; focus indicator is obvious.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run `uv run pytest tests/unit/test_tui_helpers.py -x -q`
- Verify behavior in TUI/CLI with multiple mocked agent streams
