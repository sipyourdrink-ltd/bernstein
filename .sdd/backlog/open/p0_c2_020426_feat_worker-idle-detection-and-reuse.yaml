## Summary

Detect when a worker agent is idle (waiting for input, no active tool use, heartbeat stable) and reuse that process for a new compatible task instead of always spawning a fresh worker, cutting startup latency for bursty workloads.

## Objective & Definition of Done

- [ ] Define idle criteria and timeouts aligned with existing heartbeat/stall detection
- [ ] Pool or reassign idle workers with explicit capacity limits
- [ ] Safe teardown when idle exceeds max or session ends
- [ ] Tests added

## Verification

- Run tests
- Verify second task reuses worker when idle and spawns new when pool empty
