## Summary

Implement a structured compaction pipeline: pre-compact hooks → strip media → LLM summary → boundary marker → reinjection → post-compact hooks, with each stage independently unit-testable and optional hooks failing safe with clear logging.

## Objective & Definition of Done

- [ ] Hook specs added for pre/post compact with typed payloads.
- [ ] Pipeline stages are pure or injectable for testing without real LLM calls.
- [ ] Failure in a hook does not corrupt stored session state without explicit policy.
- [ ] Tests cover ordering, skip paths, and hook errors.

## Verification

- Run targeted unit tests for compaction pipeline and plugin hooks
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
