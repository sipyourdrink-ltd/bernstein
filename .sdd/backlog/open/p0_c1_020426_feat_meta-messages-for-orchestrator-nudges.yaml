## Summary

Introduce a meta-message type the orchestrator can inject into agent context as operational instructions (nudges, policy reminders, phase hints) without presenting them as end-user messages, keeping the user/model transcript clean.

## Objective & Definition of Done

- [ ] Define schema or envelope for meta messages distinct from user/assistant content
- [ ] Wire injection from orchestrator paths that need nudges (spawn, retry, compaction hooks as applicable)
- [ ] Ensure adapters/prompt builders render meta messages consistently
- [ ] Tests added

## Verification

- Run tests
- Verify spawned prompts include meta sections only when configured
