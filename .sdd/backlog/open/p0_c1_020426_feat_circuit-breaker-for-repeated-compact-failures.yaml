## Summary

Repeated context compaction failures can waste API quota and stall tasks. After N consecutive compaction failures (default 3), stop attempting compaction for that session and fall back to a safe path (fail task, truncate, or escalate) with clear logging.

## Objective & Definition of Done

- [ ] Add configurable threshold N with default 3
- [ ] Count consecutive failures per session or task and open circuit when exceeded
- [ ] Emit metrics or log lines when circuit opens
- [ ] Tests added

## Verification

- Run tests
- Verify circuit opens after N simulated failures and compaction is skipped
