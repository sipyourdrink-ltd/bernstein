## Remaining Work

Repo truth already has the backend half of this feature: `AgentSession` persists `tokens_used` and `token_budget`, and `/dashboard/data` reconstructs those fields in `src/bernstein/core/routes/status.py`. What is still missing is the user-facing per-agent rendering in the TUI itself.

Best next implementation inside Bernstein:
1. Extend the agent card rendering in `src/bernstein/cli/dashboard.py` to show a compact per-agent token budget bar and percentage whenever `token_budget > 0`.
2. Add/extend dashboard tests so the card output includes the budget bar when `tokens_used`/`token_budget` are present and hides it cleanly when unset.
3. Keep the computation local to the dashboard render path; do not re-parse traces or introduce a second token-accounting source.
