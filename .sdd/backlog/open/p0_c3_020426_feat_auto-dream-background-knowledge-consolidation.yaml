## Summary

Build a background knowledge consolidation pipeline that periodically merges agent lessons, session memories, and execution patterns into structured topic files under `.sdd/` (or configured paths), improving retrieval quality without bloating per-task prompts.

## Objective & Definition of Done

- [ ] Consolidation job is idempotent, concurrency-safe, and bounded by token/time budgets.
- [ ] Inputs (lessons, session artifacts, patterns) and output schema for topic files are documented.
- [ ] Observability: logs and optional metrics for runs, skipped cycles, and merge conflicts.
- [ ] Tests added for merge logic and filesystem edge cases.

## Verification

- Run targeted unit tests for lessons and knowledge base
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
