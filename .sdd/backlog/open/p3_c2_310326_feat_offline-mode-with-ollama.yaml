## Summary

Bernstein requires cloud API keys. On flights, in restricted networks, or for cost-sensitive users, there's no way to use local models. Ollama runs open-weight models locally with an OpenAI-compatible API.

## Objective & Definition of Done

1. Auto-detect running Ollama instance (`http://localhost:11434/api/tags`)
2. New adapter: `ollama` — routes tasks through Ollama's API
3. Router integration: route low-complexity tasks (scope=small, complexity=low) to Ollama when available
4. Config: `ollama: {enabled: true, model: "qwen2.5-coder:32b", max_complexity: "medium"}`
5. Graceful degradation: if Ollama goes down mid-session, re-route to cloud
6. Cost tracking: Ollama tasks show $0.00 cost
7. Unit test with mocked Ollama API

## Steps

1. Create `adapters/ollama.py` — HTTP client to Ollama API
2. Detection in `agent_discovery.py`: HTTP GET to `/api/tags`, parse available models
3. In router: if task.complexity <= max_complexity and ollama available → prefer ollama
4. Map Bernstein prompt format to Ollama chat API

## Tests & Verification

- `uv run ruff check src/bernstein/`
- `uv run pytest tests/unit/ -x -q`

