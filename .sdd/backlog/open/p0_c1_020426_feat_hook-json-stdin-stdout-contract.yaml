## Summary

Standardize hook communication: JSON on stdin as a single line, structured JSON response on stdout, with schema validation for hook-specific outputs so plugins and Bernstein stay interoperable.

## Objective & Definition of Done

- [ ] Base envelope documented and parsed by manager.
- [ ] Per-hook optional schema hooks or TypedDict validation documented.
- [ ] Malformed JSON surfaces as blocking or warning per hook policy.
- [ ] Tests added for valid and invalid payloads

