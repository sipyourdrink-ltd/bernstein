## Summary

This ticket addresses one of the strongest developer-demand signals: memory that is useful, inspectable, and safe across sessions. Bernstein should keep memory file-backed and reviewable instead of implicit or magical.

## Objective & Definition of Done

- [ ] Implement a first deterministic slice of branch-aware memory retrieval in the affected Bernstein runtime or control-plane modules.
- [ ] Persist or surface the resulting state through `.sdd`, CLI, API, or metrics so operators can inspect it.
- [ ] Add targeted tests or scenario fixtures covering the main path and one governance or failure edge.
- [ ] Tests added proving it works

## Verification

- Run targeted unit tests for memory retrieval, persistence, and trace interactions changed by the feature
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
