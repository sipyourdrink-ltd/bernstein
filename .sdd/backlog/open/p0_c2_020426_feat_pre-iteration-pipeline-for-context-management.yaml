## Summary

Introduce a per-tick pre-iteration pipeline that runs deterministic context steps in order: apply result budget, snip history, micro-compact, then auto-compact, with each step unit-testable in isolation.

## Objective & Definition of Done

- [ ] Pipeline stages are pure or injectable functions with clear inputs/outputs.
- [ ] Tick pipeline invokes the pipeline once per iteration before agent work proceeds.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run `uv run pytest tests/unit/test_tick_pipeline.py -x -q`
- Add or extend tests that assert ordering and no-op when under limits
