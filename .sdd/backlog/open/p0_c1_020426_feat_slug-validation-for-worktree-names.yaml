## Summary

Validate worktree slugs before use: maximum length 64 characters, safe segment pattern (no path traversal, no reserved names), and normalize by flattening slashes so git worktree paths cannot collide or enable unsafe deletion edges.

## Objective & Definition of Done

- [ ] Validation runs at API boundary where slugs enter `WorktreeManager`.
- [ ] Clear error messages for invalid slugs; documented allowed charset.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Unit tests: `../`, long strings, empty, slashes, and valid slugs
- Manual: `bernstein` worktree create with edge-case names rejected safely
