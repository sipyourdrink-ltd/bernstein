## Summary

Restrict forked subagents to a defined set of tools (for example read-only tools, or edits only under specific paths) enforced at spawn time so delegated work cannot exceed the parent task's authority.

## Objective & Definition of Done

- [ ] Task or spawn metadata can specify tool allowlist and optional path scopes.
- [ ] Spawner passes ACL constraints into adapter invocation (env, flags, or prompt contract as appropriate).
- [ ] Guardrails align with spawn-time enforcement where redundant checks apply.
- [ ] Tests added for denied tool and out-of-scope path cases

## Verification

- Run targeted unit tests for spawner/guardrails
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
