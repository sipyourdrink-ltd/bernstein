## Summary

Assign distinct color badges to agents in the TUI agent panel so operators can visually distinguish multiple concurrent workers at a glance without reading full session IDs.

## Objective & Definition of Done

- [ ] Each active agent row shows a consistent, unique badge color derived deterministically from agent identity.
- [ ] Colors remain readable in light and dark TUI themes (contrast-safe palette).
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run `uv run pytest tests/unit/test_tui_helpers.py -x -q`
- Verify behavior in TUI/CLI
