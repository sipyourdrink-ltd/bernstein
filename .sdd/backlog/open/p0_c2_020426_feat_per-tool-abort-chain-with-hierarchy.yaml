## Summary

Implement a hierarchical abort chain: session abort, sibling abort, and per-tool abort, where each level can propagate or contain failures independently so operators can stop work at the right granularity without leaving orphaned tools or inconsistent agent state.

## Objective & Definition of Done

- [ ] Session-level abort tears down the agent session according to defined semantics.
- [ ] Sibling and per-tool abort levels are distinguishable and composable.
- [ ] Failures at one level do not silently mask required cleanup at another when configured to propagate.
- [ ] Agent lifecycle documents and enforces the chain (signals, reaping).
- [ ] Tests added for propagation vs containment scenarios

## Verification

- Run targeted unit tests with mocked adapter/spawn paths
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
