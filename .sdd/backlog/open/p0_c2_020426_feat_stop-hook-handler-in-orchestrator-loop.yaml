## Summary

Add post-completion stop hooks invoked from the orchestrator task lifecycle so plugins can veto completion, enqueue follow-up work, or surface blocking errors before a task is closed and merged.

## Objective & Definition of Done

- [ ] Hook spec is declared in `hookspecs.py` with typed arguments and return contract (allow / block / defer).
- [ ] Task lifecycle calls hooks after janitor success and respects block or defer outcomes.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run `uv run pytest tests/unit/test_task_batching.py -x -q` or plugin-related unit tests
- Verify a test plugin can block completion and leaves task in expected state
