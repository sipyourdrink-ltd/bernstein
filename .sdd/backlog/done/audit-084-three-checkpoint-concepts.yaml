## Summary

Three dataclasses with overlapping fields, inconsistent atomicity, inconsistent wiring. Impossible for operators to know what bernstein actually saves.

## Evidence

checkpoint.py::Checkpoint (atomic, tests-only); session.CheckpointState (non-atomic, CLI subcommand); session_checkpoint.SessionCheckpoint (non-atomic, 0 uses).

## Reproduction

Read all three.

## Proposed fix

Pick ONE (checkpoint.Checkpoint is most complete). Deprecate session_checkpoint.py. Fold session.CheckpointState into checkpoint.Checkpoint as optional partial-state view. Document in .sdd/README.md.

## Risks / out of scope

CLI `bernstein checkpoint` behavior change.
