## Summary

prompt_optimizer (725L) is a spawn_prompt parameter that's never assigned (default None). example_gallery (503L) is test-only. ARCHITECTURE.md lists both as 'standalone top-level files' misleadingly.

## Evidence

grep -rE 'PromptOptimizer\(|ExampleGallery' src/bernstein — empty.

## Reproduction

grep.

## Proposed fix

Delete both files + tests. Remove prompt_optimizer param from spawn_prompt (no caller passes non-None value). Update ARCHITECTURE.md.

## Risks / out of scope

Deleting prompt_optimizer changes spawn_prompt signature — make it inner _noop.
