## Summary

Loadable YAML plans for multi-stage projects. Standard DevOps vocabulary:
plan, stage, step. Like Ansible playbook / K8s manifest / Airflow DAG.

`bernstein run plan.yaml` — same command, file argument.

No new metaphors. No recipe, no score, no musical terms.

