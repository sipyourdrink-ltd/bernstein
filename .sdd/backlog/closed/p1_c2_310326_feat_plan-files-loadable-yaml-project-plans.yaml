- [ ] templates/plan.yaml with format spec
- [ ] examples/plans/flask-api.yaml working example
- [ ] `bernstein run <plan.yaml>` detects file and loads plan
- [ ] docs/concepts.html: Plan Files section
- [ ] README mentions plan files

