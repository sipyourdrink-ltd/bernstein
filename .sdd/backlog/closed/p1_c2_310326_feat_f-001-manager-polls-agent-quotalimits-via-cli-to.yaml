## Motivation

The Bernstein dashboard shows four providers as "ok" (ready) based solely on static
`providers.yaml` config — it has no live signal about remaining API budget or rate-limit
windows. When a provider runs out of quota (as happened with Claude on 2026-03-30), the
orchestrator discovers this only when the spawned process exits non-zero — wasting an agent
spawn, a worktree, and potentially minutes of wait time.

Several CLI agents expose quota information directly:

| Agent CLI    | Quota command / signal                                      |
|:-------------|:------------------------------------------------------------|
| `claude`     | `claude /cost` or parse `~/.claude/logs/` for usage events |
| `gemini`     | REST `GET /v1/usage` with `GOOGLE_API_KEY`; or CLI flag     |
| `codex`      | `GET https://api.openai.com/v1/usage` with `OPENAI_API_KEY`|
| `qwen`       | OpenRouter `/api/v1/auth/key` endpoint                      |

If the manager checked quota every 5 minutes, it could:
- Skip providers with < 5 requests remaining today.
- Show a warning before the provider is exhausted (not after).
- Dynamically route expensive tasks away from nearly-exhausted providers.
- Display quota health in the dashboard and send Telegram alerts.

## Implementation plan

### F-001.1  `QuotaSnapshot` data model

In `src/bernstein/core/quota_probe.py` (new file):

```python
@dataclass(frozen=True)
class QuotaSnapshot:
    """Point-in-time quota reading for one provider."""

    provider_name: str
    queried_at: float           # unix timestamp
    requests_remaining: int | None   # None = unknown
    requests_limit: int | None
    tokens_remaining: int | None
    tokens_limit: int | None
    reset_at: float | None      # unix timestamp when quota resets
    raw: dict[str, Any] = field(default_factory=dict)

    @property
    def pct_remaining(self) -> float | None:
        if self.requests_limit and self.requests_remaining is not None:
            return self.requests_remaining / self.requests_limit
        return None

    @property
    def is_exhausted(self) -> bool:
        r = self.pct_remaining
        return r is not None and r < 0.02   # < 2% remaining → treat as exhausted
```

### F-001.2  `QuotaProbe` ABC

```python
class QuotaProbe(ABC):
    """Interface for provider-specific quota polling."""

    provider_name: str

    @abstractmethod
    def probe(self) -> QuotaSnapshot | None:
        """Return current quota, or None if not queryable (key missing, CLI absent)."""
```

### F-001.3  Concrete implementations

**`ClaudeQuotaProbe`**:
- Run `claude api usage --json` (if flag exists in current release).
- If CLI flag unavailable, parse `~/.claude/logs/*.jsonl` for `usage_exceeded` events
  and `remaining_requests` fields.
- Fall back to `None` gracefully if neither works.

**`GeminiQuotaProbe`**:
- Hit `https://generativelanguage.googleapis.com/v1beta/models` with the API key and
  inspect `x-ratelimit-remaining-requests` response header.
- Or read `free_tier_used` / `free_tier_limit` from `providers.yaml` and track locally.

**`CodexQuotaProbe`**:
- `GET https://api.openai.com/v1/usage` with `Authorization: Bearer $OPENAI_API_KEY`.
- Parse `data.total_requests`, `data.total_tokens` for today's date.
- Return `None` if `OPENAI_API_KEY` is not set.

**`QwenQuotaProbe`**:
- `GET https://openrouter.ai/api/v1/auth/key` with `Authorization: Bearer $OPENROUTER_API_KEY`.
- Returns `{ "data": { "limit": 10, "usage": 3 } }` — easy to parse.
- Return `None` if key is missing.

### F-001.4  `QuotaPoller` background thread

In `src/bernstein/core/quota_poller.py` (new file):

```python
class QuotaPoller:
    """Polls quota probes periodically and updates router state."""

    def __init__(
        self,
        probes: list[QuotaProbe],
        router: TierAwareRouter,
        poll_interval_seconds: float = 300.0,   # 5 minutes
    ) -> None: ...

    def start(self) -> None:
        """Start background polling thread."""

    def stop(self) -> None:
        """Stop polling thread (called on orchestrator shutdown)."""

    def _poll_once(self) -> None:
        for probe in self._probes:
            snapshot = probe.probe()
            if snapshot is None:
                continue
            self._router.update_provider_quota(probe.provider_name, snapshot)
            if snapshot.is_exhausted:
                logger.warning(
                    "Provider %s quota exhausted (%.0f%% remaining) — marking unavailable",
                    probe.provider_name,
                    (snapshot.pct_remaining or 0) * 100,
                )
                self._router.state.providers[probe.provider_name].available = False
```

### F-001.5  Router integration

In `src/bernstein/core/router.py`, add:

```python
def update_provider_quota(self, provider_name: str, snapshot: QuotaSnapshot) -> None:
    """Update provider health and availability based on quota snapshot."""
    cfg = self.state.providers.get(provider_name)
    if cfg is None:
        return
    cfg.quota_snapshot = snapshot
    if snapshot.is_exhausted:
        cfg.available = False
    elif snapshot.pct_remaining is not None and snapshot.pct_remaining > 0.05:
        cfg.available = True   # restore if quota recovered (after reset)
```

Add `quota_snapshot: QuotaSnapshot | None = None` to `ProviderConfig`.

### F-001.6  Orchestrator lifecycle

In `src/bernstein/core/orchestrator.py`, in `start()` / `stop()`:

```python
self._quota_poller = QuotaPoller(
    probes=[ClaudeQuotaProbe(), GeminiQuotaProbe(), CodexQuotaProbe(), QwenQuotaProbe()],
    router=self._router,
    poll_interval_seconds=300,
)
self._quota_poller.start()

# In stop():
self._quota_poller.stop()
```

