- `claude api quota` / `claude /quota` — existence uncertain; research needed.
  Safe fallback: parse `~/.claude/logs/*.jsonl` for `"type": "usage"` events.
- `gemini quota` — not confirmed. Use REST API with key instead.
- `codex usage` — check `codex --help` for usage subcommand.
- OpenRouter key info — REST API is documented and stable.
