## Summary

Create a shared scratchpad directory per run or per coordinator session where worker agents can read and write durable notes and artifacts without triggering permission prompts for every file, while staying outside the main git worktree when appropriate.

## Objective & Definition of Done

- [ ] Reserve scratchpad path and create on spawn with safe permissions
- [ ] Pass path to agents via env or prompt contract
- [ ] Worktree isolation rules documented (what is committed vs scratch)
- [ ] Tests added

## Verification

- Run tests
- Verify scratchpad exists for spawned workers and is cleaned up per policy
