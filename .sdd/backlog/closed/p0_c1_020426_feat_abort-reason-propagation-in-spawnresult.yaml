## Summary

Extend `SpawnResult` to carry a structured abort reason (for example `user_interrupt`, `timeout`, `oom`, `permission_denied`, `model_error`) so downstream orchestration, metrics, and janitor logic can branch on cause instead of inferring from exit codes alone.

## Objective & Definition of Done

- [ ] Typed enum or dataclass represents abort reasons; covers listed categories (extensible).
- [ ] Spawner populates reason on abnormal termination paths.
- [ ] Backward compatible for callers that ignore the new field.
- [ ] Tests added for each reason path where mockable

## Verification

- Run targeted unit tests for spawner/adapter spawn result
- Run `uv run ruff check src/` and `uv run pyright src/` on touched modules
