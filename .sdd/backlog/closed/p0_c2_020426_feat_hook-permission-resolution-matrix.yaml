## Summary

Implement and document the invariant that hook-level allow does not override stronger rule outcomes: when a rule says deny, the result is deny; when a rule says ask, the result is prompt (even if a hook would allow). Hook allow only elevates within the bounds of static rules.

## Objective & Definition of Done

- [ ] Resolution order is explicit (rules vs hooks) and covered by unit tests.
- [ ] Plugin manager and approval layer share one matrix or single resolver function.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run `uv run pytest` on new or existing approval/plugin tests with `-x -q`
- Scenario test: hook allow + rule deny → deny; hook allow + rule ask → prompt
