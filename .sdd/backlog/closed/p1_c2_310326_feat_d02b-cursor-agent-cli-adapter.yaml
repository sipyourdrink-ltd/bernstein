# D02b — Cursor Agent CLI Adapter

**Priority:** P1
**Scope:** small (15-20 min)
**Wave:** 1 — Developer Love

## Problem

Cursor is one of the most popular AI-powered editors (millions of users). It has a CLI agent mode (`cursor agent`) that can run headless in the terminal. Bernstein has no adapter for it — missing a massive user base that could adopt orchestration immediately.

## CLI Reference

```
cursor agent  — Start the Cursor agent in your terminal.
```

Cursor CLI also supports:
- `--chat` — standalone chat window without full IDE
- `--add-mcp <json>` — MCP server injection
- `--wait` — wait for files to close
- `--profile <name>` — profile selection
- `--user-data-dir <dir>` — custom data directory (useful for isolation)

Key flags for headless agent operation:
- `cursor agent` starts the agent in terminal mode (non-GUI)
- Cursor inherits VS Code CLI flags (it's a fork)
- Authentication: user must be logged into Cursor app (OAuth session stored in `~/.cursor/`)

## Solution

### 1. Create `src/bernstein/adapters/cursor.py`

Follow the existing adapter pattern (see `claude.py`, `codex.py`):

```python
class CursorAdapter(CLIAdapter):
    """Adapter for Cursor Agent CLI."""

    def name(self) -> str:
        return "cursor"

    def spawn(self, *, prompt, workdir, model_config, session_id, mcp_config=None):
        cmd = ["cursor", "agent"]

        # Use --user-data-dir for session isolation
        data_dir = workdir / ".sdd" / "runtime" / "cursor" / session_id
        data_dir.mkdir(parents=True, exist_ok=True)
        cmd += ["--user-data-dir", str(data_dir)]

        # MCP config injection
        if mcp_config:
            import json
            cmd += ["--add-mcp", json.dumps(mcp_config)]

        # Prompt via stdin (pipe the task prompt)
        # cursor agent reads from stdin when piped
        ...

    def detect_tier(self) -> ApiTierInfo | None:
        # Cursor Pro: $20/mo, 500 fast requests
        # Cursor Business: $40/mo, unlimited
        # Free: 50 slow requests
        # Detection: check ~/.cursor/ for subscription info
        ...
```

### 2. Add detection to `agent_discovery.py`

```python
def _detect_cursor():
    binary = shutil.which("cursor")
    if binary is None:
        return None, []

    version = _extract_version(_run_probe(["cursor", "--version"]))

    # Login check: Cursor stores auth in ~/.cursor/
    logged_in = Path.home().joinpath(".cursor").exists()
    login_method = "Cursor app" if logged_in else ""

    return AgentCapabilities(
        name="cursor",
        binary=binary,
        version=version,
        logged_in=logged_in,
        login_method=login_method,
        available_models=["claude-sonnet-4-6", "claude-opus-4-6", "gpt-5.4", "cursor-small"],
        default_model="claude-sonnet-4-6",
        supports_headless=True,
        supports_sandbox=False,
        supports_mcp=True,  # --add-mcp flag
        max_context_tokens=200_000,
        reasoning_strength="very_high",  # uses Claude/GPT under the hood
        best_for=["full-stack", "refactoring", "code-generation"],
        cost_tier="moderate",  # $20/mo Pro subscription
    ), warnings
```

### 3. Register in `adapters/registry.py`

Add `"cursor"` → `CursorAdapter` to the registry.

### 4. Add to `agent_discovery.py` detector list

Add `_detect_cursor` to the `discover_agents()` detector tuple.

