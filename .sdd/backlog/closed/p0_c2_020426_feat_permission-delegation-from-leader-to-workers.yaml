## Summary

When a coordinator (leader) spawns workers, allow delegation of approval context so workers inherit or reference the same approval flow instead of prompting humans separately for identical scopes.

## Objective & Definition of Done

- [ ] Model delegation token or parent approval ID in spawn metadata
- [ ] Approval gate checks delegation before blocking worker actions
- [ ] Security: scope boundaries and expiry for delegated permissions
- [ ] Tests added

## Verification

- Run tests
- Verify workers under an approved coordinator do not double-prompt for equivalent operations
