## Summary

Implement a file-backed mailbox for direct asynchronous messaging between agents with priority queues and optional idle notifications so workers can coordinate without overloading the bulletin board’s append-only semantics.

## Objective & Definition of Done

- [ ] Define on-disk layout (per-agent queues, priorities, TTL if needed)
- [ ] API for send, receive, and peek used by orchestrator or adapters
- [ ] Hook idle detection to wake or nudge recipients
- [ ] Tests added

## Verification

- Run tests
- Verify ordering, priority, and concurrent writers with tmp_path
