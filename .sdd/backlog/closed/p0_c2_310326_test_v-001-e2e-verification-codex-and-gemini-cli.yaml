## How to run manual verification today

```bash
# Gemini — check if the CLI is installed and what flags it accepts:
which gemini && gemini --help | head -40

# Codex — check installed version and available models:
which codex && codex --version && codex --help | head -40

# Check API keys are set:
echo "GOOGLE_API_KEY=${GOOGLE_API_KEY:0:8}..."
echo "OPENAI_API_KEY=${OPENAI_API_KEY:0:8}..."
```

