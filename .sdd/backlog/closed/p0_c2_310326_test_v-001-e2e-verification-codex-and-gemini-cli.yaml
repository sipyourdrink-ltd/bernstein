## Problem

No production run has ever confirmed that `CodexAdapter` or `GeminiAdapter` successfully:
1. Spawned a real CLI process.
2. Received output from that process.
3. Posted `/complete` to the Bernstein task server with a non-empty result.

All observed spawns (including 2026-03-30 session ec4ed69b11e8) used Claude-family agents
selected from the Agency catalog. `GeminiAdapter` and `CodexAdapter` exist in
`src/bernstein/adapters/` but have never been exercised end-to-end under orchestrator
control.

## What to verify

### 2.1  CLI flag correctness

**GeminiAdapter** (`src/bernstein/adapters/gemini.py`):

Current command assembled:
```
gemini --model <model> --sandbox none --prompt <text>
```

Issues to check:
- `@google/gemini-cli` (npm package) does not use `--sandbox none`; the non-interactive
  flag is `--non-interactive` or prompt is passed as a positional argument.
- Run `gemini --help` and diff the actual flags against what the adapter builds.
- The `GOOGLE_API_KEY` env var must be named exactly as Gemini CLI expects (vs
  `GEMINI_API_KEY` — both are tried via `build_filtered_env` but the CLI may only honour
  one).

**CodexAdapter** (`src/bernstein/adapters/codex.py`):

Current command assembled:
```
codex --model <model> --approval-mode full-auto --quiet <prompt>
```

Issues to check:
- The installed `codex` CLI version (run `codex --version`) determines which flags exist.
  `--approval-mode full-auto` was introduced in a specific release and may have changed.
- Model aliases `gpt-5.4`, `o3`, `o4-mini`, `codex-mini` must be confirmed against
  what the local `codex` binary accepts — run `codex --help` or `codex models list`.
- `--quiet` may suppress output that Bernstein needs to read the result.

### 2.2  Missing-key startup warning

Both adapters call `build_filtered_env([...])` but do not warn if the API key is absent.
A missing key causes silent process launch failure that is only detected by the janitor
much later.

Add at the top of each `spawn()` method:

```python
api_key = os.environ.get("GOOGLE_API_KEY") or os.environ.get("GEMINI_API_KEY")
if not api_key:
    logger.warning(
        "GeminiAdapter: neither GOOGLE_API_KEY nor GEMINI_API_KEY is set — spawn will fail"
    )
```

Same pattern for `CodexAdapter` checking `OPENAI_API_KEY`.

### 2.3  `bernstein test-adapter` CLI command

Add a command to directly exercise any adapter without running the full orchestrator:

```
bernstein test-adapter --adapter gemini \
    --task "Create a file /tmp/gemini_test.txt with content 'Gemini OK'" \
    [--model gemini-2.5-flash] [--timeout 120]
```

Behaviour:
1. Instantiate the named adapter.
2. Create a temporary worktree under `.sdd/worktrees/test-<adapter>-<timestamp>/`.
3. Call `adapter.spawn(prompt=..., workdir=..., model_config=..., session_id=...)`.
4. Wait for the process to exit (up to `--timeout` seconds).
5. Print: exit code, last 40 lines of the log, and whether the expected file exists.
6. Clean up the temp worktree.

Implement in `src/bernstein/cli/adapter_cmd.py`, register as `bernstein test-adapter`.

### 2.4  Provider→adapter routing smoke test

Run with Claude disabled to force fallback:

```bash
# Temporarily disable Claude in providers.yaml, then:
bernstein run --dry-run
# Expected: plan shows gemini_standard or codex_standard as selected provider
```

Alternatively, add a `--force-adapter` flag to `bernstein run` that overrides the router
for a single session, for testing purposes only.

### 2.5  Unit tests for adapter CLI arg assembly

`tests/unit/test_adapters.py`:

```python
def test_gemini_adapter_assembles_correct_cmd():
    adapter = GeminiAdapter()
    # Capture the Popen call args without actually running the process
    with patch("subprocess.Popen") as mock_popen:
        ...
    cmd = mock_popen.call_args[0][0]
    assert "gemini" in cmd[0]
    assert "--non-interactive" in cmd  # or whatever the correct flag is

def test_codex_adapter_assembles_correct_cmd():
    ...
    assert "--approval-mode" in cmd
    assert "full-auto" in cmd

def test_gemini_adapter_warns_when_api_key_missing(caplog):
    with patch.dict(os.environ, {}, clear=True):
        adapter = GeminiAdapter()
        # Trigger warning path
        assert "GOOGLE_API_KEY" in caplog.text or "GEMINI_API_KEY" in caplog.text
```

## Acceptance criteria

- [ ] `bernstein test-adapter --adapter gemini --task "echo hello"` exits 0 on a machine
      with `GOOGLE_API_KEY` set.
- [ ] `bernstein test-adapter --adapter codex --task "echo hello"` exits 0 on a machine
      with `OPENAI_API_KEY` set.
- [ ] Both adapters log a clear warning (not crash) when the API key env var is absent.
- [ ] Unit tests for CLI arg assembly pass (`uv run pytest tests/unit/test_adapters.py`).
- [ ] `bernstein run --dry-run` with Claude disabled shows a non-Claude provider in the
      execution plan.

