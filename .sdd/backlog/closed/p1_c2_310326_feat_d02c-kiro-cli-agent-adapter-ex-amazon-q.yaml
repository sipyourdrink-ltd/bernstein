# D02c — Kiro CLI Agent Adapter (ex-Amazon Q)

**Priority:** P1
**Scope:** small (15-20 min)
**Wave:** 1 — Developer Love

## Problem

Kiro CLI (formerly Amazon Q Developer CLI) is backed by AWS and has a growing enterprise user base. It has a fully headless `kiro-cli chat` mode with rich flag support. Bernstein has no adapter for it — missing the AWS ecosystem.

## CLI Reference

```
kiro-cli chat [OPTIONS] [INPUT]

Key flags:
  [INPUT]                     First question to ask (inline prompt)
  -a, --trust-all-tools       Allow all tools without confirmation (headless mode)
  --trust-tools <NAMES>       Trust specific tools: '--trust-tools=fs_read,fs_write'
  --no-interactive            Run without user input (headless)
  --model <MODEL>             Select model
  --agent <AGENT>             Context profile
  -r, --resume                Resume last conversation
  --resume-picker             Interactively select conversation
  --require-mcp-startup       Require MCP servers to start (exit 3 on failure)
  --list-models               List available models
  -l, --list-sessions         List saved sessions
  -d, --delete-session <ID>   Delete session
  -f, --format <FORMAT>       Output format: plain, json, json-pretty
  --tui                       New terminal UI
  --legacy-ui                 Legacy terminal UI
  -v, --verbose               Increase verbosity
```

## Solution

### 1. Create `src/bernstein/adapters/kiro.py`

```python
class KiroAdapter(CLIAdapter):
    """Adapter for Kiro CLI (ex-Amazon Q Developer)."""

    def name(self) -> str:
        return "kiro"

    def spawn(self, *, prompt, workdir, model_config, session_id, mcp_config=None):
        cmd = ["kiro-cli", "chat"]

        # Headless mode — no user interaction
        cmd += ["--no-interactive"]

        # Trust all tools for autonomous operation
        cmd += ["--trust-all-tools"]

        # Model selection
        if model_config and model_config.model:
            cmd += ["--model", model_config.model]

        # MCP server requirement
        if mcp_config:
            cmd += ["--require-mcp-startup"]

        # Output format for parsing
        cmd += ["--format", "plain"]

        # Prompt as positional argument (INPUT)
        cmd += [prompt]

        env = {**os.environ, "BERNSTEIN_SESSION_ID": session_id}

        proc = subprocess.Popen(
            cmd,
            cwd=workdir,
            stdout=log_file,
            stderr=subprocess.STDOUT,
            env=env,
        )
        return SpawnResult(pid=proc.pid, log_path=log_path, proc=proc)

    def detect_tier(self) -> ApiTierInfo | None:
        # Kiro Free: limited requests
        # Kiro Pro: $19/mo (Amazon Q Pro)
        # Enterprise: via AWS IAM
        aws_profile = os.environ.get("AWS_PROFILE", "")
        aws_sso = os.environ.get("AWS_SSO_SESSION", "")

        if aws_sso or aws_profile:
            tier = ApiTier.PRO
            rate_limit = RateLimit(requests_per_minute=60, tokens_per_minute=10000)
        else:
            tier = ApiTier.FREE
            rate_limit = RateLimit(requests_per_minute=10, tokens_per_minute=2000)

        return ApiTierInfo(
            provider=ProviderType.KIRO,  # add to enum
            tier=tier,
            rate_limit=rate_limit,
        )
```

### 2. Add detection to `agent_discovery.py`

```python
def _detect_kiro():
    binary = shutil.which("kiro-cli")
    if binary is None:
        return None, []

    version = _extract_version(_run_probe(["kiro-cli", "--version"]))

    # Login check: AWS credentials or kiro-cli session
    logged_in = False
    login_method = ""

    # Check AWS auth
    if os.environ.get("AWS_PROFILE") or os.environ.get("AWS_ACCESS_KEY_ID"):
        logged_in = True
        login_method = "AWS credentials"
    elif os.environ.get("AWS_SSO_SESSION"):
        logged_in = True
        login_method = "AWS SSO"
    else:
        # Check if kiro-cli has stored sessions
        sessions = _run_probe(["kiro-cli", "chat", "--list-sessions"])
        if sessions and sessions.returncode == 0:
            logged_in = True
            login_method = "kiro session"

    # Discover available models
    available_models = ["kiro-default"]
    models_probe = _run_probe(["kiro-cli", "chat", "--list-models", "--format", "plain"])
    if models_probe and models_probe.returncode == 0:
        lines = models_probe.stdout.strip().splitlines()
        if lines:
            available_models = [l.strip() for l in lines if l.strip()]

    return AgentCapabilities(
        name="kiro",
        binary=binary,
        version=version,
        logged_in=logged_in,
        login_method=login_method,
        available_models=available_models,
        default_model=available_models[0] if available_models else "kiro-default",
        supports_headless=True,   # --no-interactive
        supports_sandbox=False,
        supports_mcp=True,        # --require-mcp-startup
        max_context_tokens=200_000,
        reasoning_strength="high",
        best_for=["aws-services", "infrastructure", "backend", "devops"],
        cost_tier="cheap",  # generous free tier, Pro at $19/mo
    ), warnings
```

