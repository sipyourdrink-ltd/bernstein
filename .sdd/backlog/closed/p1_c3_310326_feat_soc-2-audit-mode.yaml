## Summary

Enable SOC 2 compliance logging. Every agent action logged to append-only audit trail with cryptographic seals.

## What's Done

- [x] `cli/audit_cmd.py` updated with enhanced audit trail logging
- [x] `core/lifecycle.py` updated with audit event emission
- [x] `core/orchestrator.py` updated with audit hooks
- [x] `core/task_store.py` updated with audit entry on state transitions
- [x] `core/merkle.py` exists with Merkle tree seal implementation
- [x] `bernstein audit seal` and `bernstein audit verify` commands exist

## Remaining Work

1. **Add `--audit` flag to `bernstein run`** — currently audit is always-on or off. Add explicit flag in `run_cmd.py` that sets `config.audit_mode = True`.
2. **Structured audit entry format** — ensure every entry has `{timestamp, actor, action, resource, input_hash, output_hash}`. Check `core/audit.py` vs `core/lifecycle.py` for format consistency.
3. **Unit tests** — add `tests/unit/test_audit_mode.py` covering: event emission on task state changes, Merkle seal generation, chain verification with tampered entries.
4. **Documentation** — add `docs/AUDIT.md` explaining how to use audit mode for SOC 2 compliance.

