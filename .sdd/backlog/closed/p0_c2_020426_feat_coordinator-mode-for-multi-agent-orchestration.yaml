## Summary

Implement a coordinator role that dispatches work to worker agents, synthesizes their outputs, and manages parallel execution phases. This formalizes multi-agent patterns that today are implicit or ad hoc.

## Objective & Definition of Done

- [ ] Define coordinator vs worker responsibilities and configuration flags
- [ ] Orchestrator recognizes coordinator tasks and spawns workers with correct context
- [ ] Use bulletin (or related IPC) for phase handoffs
- [ ] Tests added

## Verification

- Run tests
- Verify end-to-end flow with mocked adapters (coordinator + N workers)
