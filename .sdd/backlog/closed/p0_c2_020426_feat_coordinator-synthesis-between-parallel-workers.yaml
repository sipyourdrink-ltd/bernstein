## Summary

After parallel workers finish, run a coordinator synthesis step that merges findings into a single coherent summary before surfacing results to the user or completing the parent task, reducing fragmented or contradictory output.

## Objective & Definition of Done

- [ ] Gate synthesis on coordinator mode or explicit task flag
- [ ] Collect worker artifacts/summaries and invoke synthesis (deterministic merge or optional LLM hook per policy)
- [ ] Attach synthesized result to parent task completion
- [ ] Tests added

## Verification

- Run tests
- Verify parent task receives one merged summary after N workers complete
