# D03b — Real-Time Agent IPC (Replace File Polling with Stdin/Pipe)

**Priority:** P2
**Scope:** medium (20-30 min)
**Wave:** 1 — Developer Love

## Problem

Agent communication relies on file-based signal polling with a 60-second interval. When a user sends a command like "save work and exit" via `/broadcast`, agents may not act for up to 60 seconds. This feels unresponsive and makes the orchestrator seem disconnected from its agents.

Current mechanism:
- Orchestrator writes signal files to `.sdd/runtime/signals/{session_id}/COMMAND`
- Agent prompt includes instructions to check for signals periodically
- Agent checks every ~60 seconds (embedded in prompt as `sleep 60 && cat ...`)
- Latency: 0–60 seconds. Unpredictable. Not interactive.

## Solution

Replace file polling with stdin pipe communication for supported adapters.

### Phase 1: Stdin pipe for Claude Code
Claude Code supports `--input-format stream-json` which reads JSON messages from stdin. Use this to send real-time commands:

1. **Modify `spawner.py`**: When spawning Claude, keep a reference to `proc.stdin` (the Popen stdin pipe).
2. **Modify `AgentSession`**: Add `stdin_pipe: IO | None` field to store the pipe handle.
3. **Create `src/bernstein/core/agent_ipc.py`**:
   ```python
   def send_message(session: AgentSession, message: str) -> bool:
       """Send a real-time message to an agent via stdin pipe."""
       if session.stdin_pipe is None:
           return False  # fallback to file-based signal
       try:
           payload = json.dumps({"type": "user_message", "content": message})
           session.stdin_pipe.write(payload.encode() + b"\n")
           session.stdin_pipe.flush()
           return True
       except (BrokenPipeError, OSError):
           return False
   ```
4. **Update `/broadcast` route**: Try stdin pipe first, fall back to COMMAND file if pipe unavailable.
5. **Keep file-based signals as fallback** for adapters that don't support stdin (Codex, Gemini, Aider).

### Phase 2: Per-adapter IPC (future)
- Codex: investigate `--pipe` or `--input-file` flags
- Gemini: investigate stdin support
- Generic: always file-based (lowest common denominator)

## Acceptance

- [ ] Commands sent via `/broadcast` reach Claude agents within 1-2 seconds
- [ ] File-based fallback still works for non-Claude adapters
- [ ] No regression in existing SHUTDOWN/WAKEUP signal mechanism
- [ ] `AgentSession` tracks stdin pipe handle when available
- [ ] TUI can send messages to agents and see response within seconds
