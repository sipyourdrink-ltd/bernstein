## Goal

Run the first ever Bernstein session in which **two different CLI adapters** each complete
at least one task — for example Claude handles `role: backend` and Gemini handles `role: qa`.
This is the fundamental promise of multi-agent orchestration and has never been demonstrated
end-to-end.

## Prerequisites

Before attempting this ticket, complete:
- V-001 (Codex/Gemini adapter E2E verification)
- V-002 (auto-failover rate-limit hardening)
- BUG-001 (ghost-completion cache fix)
- BUG-002 (shutdown race fix)

## Setup

### 3.1  Pin adapters by role in `bernstein.yaml`

Add or update the `role_model_policy` section:

```yaml
role_model_policy:
  backend:
    provider: claude_standard
    model: sonnet
  qa:
    provider: gemini_standard
    model: gemini-2.5-flash   # use flash for speed/cost during smoke test
  security:
    provider: codex_standard
    model: o4-mini
```

This forces the router to select different providers for different roles without disabling
any provider globally.

### 3.2  Create canary tasks

Create two minimal smoke-test tasks in `backlog/open/`:

**`smoke-backend-01.md`**:
```markdown
---
title: "Smoke test: backend canary — append timestamp to file"
role: backend
priority: 0
scope: small
complexity: low
---
Append the current UTC timestamp (ISO 8601) to the file `.sdd/smoke_test_log.txt`.
Do not create any other files. Exit cleanly.
```

**`smoke-qa-01.md`**:
```markdown
---
title: "Smoke test: qa canary — read and report smoke test log"
role: qa
priority: 0
scope: small
complexity: low
---
Read `.sdd/smoke_test_log.txt` and verify it contains at least one timestamp line.
Write a one-line report to `.sdd/smoke_test_qa_report.txt`: either "PASS: <count>
timestamps found" or "FAIL: file missing or empty".
```

### 3.3  Verify environment before running

```bash
# Confirm both keys are set
echo "GOOGLE_API_KEY starts with: ${GOOGLE_API_KEY:0:8}"
echo "OPENAI_API_KEY starts with: ${OPENAI_API_KEY:0:8}"

# Confirm gemini and codex CLIs are installed
which gemini && gemini --version
which codex && codex --version

# (Optional) Clear stale semantic cache to avoid ghost-completions:
truncate -s 0 .sdd/caching/response_cache.jsonl
```

## What to verify

1. **Provider selection**: orchestrator log shows two distinct provider names:
   ```
   INFO  Spawned backend-<id> ... provider=claude_standard
   INFO  Spawned qa-<id>      ... provider=gemini_standard
   ```

2. **Adapter selection**: each worktree log shows the correct CLI binary was invoked:
   - `.sdd/worktrees/backend-*/` log contains `claude` in the command line.
   - `.sdd/worktrees/qa-*/` log contains `gemini` in the command line.

3. **Task completion**: both tasks reach `status: complete` in the task server:
   ```bash
   curl -s http://127.0.0.1:8052/tasks?status=complete | python3 -m json.tool | grep title
   ```

4. **Artifact validation**:
   - `.sdd/smoke_test_log.txt` has at least one timestamp line.
   - `.sdd/smoke_test_qa_report.txt` contains `PASS`.

5. **Clean shutdown**: after `bernstein stop`, no orphaned worktrees remain:
   ```bash
   ls .sdd/worktrees/   # should be empty or pruned
   git worktree list    # should show only the main worktree
   ```

## Stretch goals

### 3.4  `bernstein run --report` flag

After the session ends, print a summary table:

```
Session summary (2026-03-30 21:40 UTC)
──────────────────────────────────────────────────────────────
Task                          Role      Provider          Model
smoke-backend-01              backend   claude_standard   sonnet
smoke-qa-01                   qa        gemini_standard   flash
──────────────────────────────────────────────────────────────
Total: 2 tasks, 2 providers, ~$0.04
```

This enables post-hoc analysis and confirms cross-agent orchestration in production.

Store the per-task provider assignment in the replay JSONL
(`.sdd/runs/<session>/replay.jsonl`) so it can be queried without running the server.

### 3.5  Extend the smoke test to three adapters

Add a `security` canary task to exercise Codex:

```markdown
---
title: "Smoke test: security canary — check for hardcoded secrets"
role: security
priority: 0
scope: small
complexity: low
---
Run `rg -i "api_key\s*=\s*['\"][A-Za-z0-9]" src/` and write the output (or "CLEAN") to
`.sdd/smoke_test_security_report.txt`.
```

## Acceptance criteria

- [ ] Session log contains `provider=claude_standard` and `provider=gemini_standard`
      (or `provider=codex_standard`) in two distinct spawn log lines.
- [ ] Both canary tasks appear in `backlog/closed/` after the session.
- [ ] `.sdd/smoke_test_log.txt` exists and has a timestamp.
- [ ] `.sdd/smoke_test_qa_report.txt` contains `PASS`.
- [ ] Zero `Connection refused` errors in the log (BUG-002 prerequisite).
- [ ] Zero ghost-completions (BUG-001 prerequisite).

## How to run

```bash
# From the bernstein project root:
uv run bernstein run --max-agents 2
# Then observe with:
uv run bernstein logs --follow
# When done:
uv run bernstein stop
```
