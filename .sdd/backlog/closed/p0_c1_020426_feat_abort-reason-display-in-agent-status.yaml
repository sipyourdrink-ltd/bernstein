## Summary

Propagate and display the specific abort reason when an agent stops (user interrupt, timeout, out-of-memory, permission denied, etc.) in CLI status output and the TUI agent panel.

## Objective & Definition of Done

- [ ] Agent lifecycle records a structured abort reason on abnormal exit paths.
- [ ] TUI and `bernstein status`-style output show the reason string when present.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run `uv run pytest tests/unit/test_tui_helpers.py -x -q`
- Run `uv run pytest tests/unit/test_agent_lifecycle.py -x -q` if present, or nearest agent lifecycle tests
- Verify behavior in TUI/CLI
