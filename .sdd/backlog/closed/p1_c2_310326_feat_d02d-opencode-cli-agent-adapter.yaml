## Stretch: Phase 2 — Server-Aware Mode

OpenCode's `opencode serve` runs a persistent HTTP server (default port 4096) with OpenAPI 3.1 endpoints for session management, config, and provider auth. Combined with `opencode run --attach <url>`:

- Bernstein could start `opencode serve` once per orchestration run
- Subsequent task spawns use `opencode run --attach http://localhost:4096` to skip cold start
- Server provides session continuity across tasks assigned to the same agent
- Auth via `OPENCODE_SERVER_PASSWORD` env var

This would require extending `CLIAdapter` or `spawner.py` to support a "warm pool" pattern — spawn server on first use, reuse for subsequent tasks, teardown on `bernstein stop`.

## Stretch: Phase 3 — ACP Subprocess Mode

OpenCode's `opencode acp` mode starts it as a JSON-RPC subprocess over stdio, compatible with ACP-aware editors. Bernstein could use this path if/when it gains native ACP client support, enabling structured tool-call routing instead of fire-and-exit CLI invocations.

