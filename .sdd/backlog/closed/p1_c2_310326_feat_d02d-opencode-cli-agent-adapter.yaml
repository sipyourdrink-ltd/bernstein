# D02d — OpenCode CLI Agent Adapter

**Priority:** P1
**Scope:** small (15-20 min)
**Wave:** 1 — Developer Love

## Problem

OpenCode is a fast-growing open-source AI coding CLI with headless `opencode run` mode, a persistent HTTP server (`opencode serve`), ACP support, MCP integration, and a skills framework. It supports multiple LLM providers (OpenAI, Anthropic, Google, local) through a unified config. Bernstein has no adapter for it — missing one of the most versatile open-source coding agents available today.

OpenCode is also supported as an ACP harness alias in OpenClaw, making it a bridge point between Bernstein's local orchestration and OpenClaw's remote runtime (see D04a).

## CLI Reference

```
opencode run [OPTIONS] [PROMPT]

Key flags:
  [PROMPT]                    Prompt text to execute (inline)
  --model <MODEL>             Select model (e.g. "anthropic/claude-sonnet-4-20250514")
  --session <ID>              Resume or create named session
  --continue                  Continue last conversation
  --file <PATH>               Read prompt from file
  --format json               Output as JSON (for parsing)
  --attach <SERVER_URL>       Connect to running opencode serve instance
  --output <PATH>             Write output to file

opencode serve [OPTIONS]

  --port <PORT>               HTTP server port (default: 4096)
  --host <HOST>               Bind address

  Server exposes OpenAPI 3.1 at /doc
  Auth via OPENCODE_SERVER_PASSWORD env var (HTTP basic, username: "opencode")

opencode acp

  Starts OpenCode as ACP subprocess (JSON-RPC over stdio)
  Used by compatible editors: Zed, JetBrains, Avante.nvim, CodeCompanion.nvim
```

## Solution

### 1. Create `src/bernstein/adapters/opencode.py`

```python
class OpenCodeAdapter(CLIAdapter):
    """Adapter for OpenCode CLI."""

    def name(self) -> str:
        return "OpenCode"

    def spawn(self, *, prompt, workdir, model_config, session_id, mcp_config=None):
        cmd = ["opencode", "run"]

        if model_config and model_config.model:
            cmd += ["--model", model_config.model]

        # JSON output for structured parsing
        cmd += ["--format", "json"]

        # Prompt as positional argument
        cmd += [prompt]

        log_path = workdir / ".sdd" / "runtime" / f"{session_id}.log"
        log_path.parent.mkdir(parents=True, exist_ok=True)

        pid_dir = workdir / ".sdd" / "runtime" / "pids"
        wrapped_cmd = build_worker_cmd(
            cmd,
            role=session_id.rsplit("-", 1)[0],
            session_id=session_id,
            pid_dir=pid_dir,
            model=model_config.model if model_config else "",
        )

        env = build_filtered_env([
            "OPENAI_API_KEY",
            "ANTHROPIC_API_KEY",
            "GOOGLE_API_KEY",
            "OPENCODE_SERVER_PASSWORD",
        ])

        with log_path.open("w") as log_file:
            try:
                proc = subprocess.Popen(
                    wrapped_cmd,
                    cwd=workdir,
                    env=env,
                    stdout=log_file,
                    stderr=subprocess.STDOUT,
                    start_new_session=True,
                )
            except FileNotFoundError as exc:
                raise RuntimeError(
                    "opencode not found in PATH. Install: go install github.com/opencode-ai/opencode@latest"
                ) from exc

        return SpawnResult(pid=proc.pid, log_path=log_path)

    def detect_tier(self) -> ApiTierInfo | None:
        # OpenCode is multi-provider; tier depends on which provider is configured.
        # Check for common provider keys in priority order.
        anthropic_key = os.environ.get("ANTHROPIC_API_KEY", "")
        openai_key = os.environ.get("OPENAI_API_KEY", "")
        google_key = os.environ.get("GOOGLE_API_KEY", "")

        if not any([anthropic_key, openai_key, google_key]):
            return None

        # Default to PRO if any key is set (OpenCode requires BYOK)
        return ApiTierInfo(
            provider=ProviderType.OPENCODE,
            tier=ApiTier.PRO,
            rate_limit=RateLimit(requests_per_minute=60, tokens_per_minute=10000),
            is_active=True,
        )
```

### 2. Add detection to `agent_discovery.py`

```python
def _detect_opencode():
    binary = shutil.which("opencode")
    if binary is None:
        return None, []

    warnings: list[str] = []
    version = _extract_version(_run_probe(["opencode", "--version"]))

    # OpenCode uses config file for provider auth, not standalone env vars for login
    # Check if config exists as a proxy for "logged in"
    config_path = Path.home() / ".config" / "opencode" / "config.json"
    logged_in = config_path.exists()
    login_method = "config file" if logged_in else ""

    # Also check env vars as fallback
    if not logged_in:
        for key in ("ANTHROPIC_API_KEY", "OPENAI_API_KEY", "GOOGLE_API_KEY"):
            if os.environ.get(key):
                logged_in = True
                login_method = f"env ({key})"
                break

    # OpenCode does not have a --list-models CLI probe; hardcode known provider models
    available_models = [
        "anthropic/claude-sonnet-4-20250514",
        "openai/gpt-4.1",
        "google/gemini-2.5-pro",
    ]

    return AgentCapabilities(
        name="opencode",
        binary=binary,
        version=version,
        logged_in=logged_in,
        login_method=login_method,
        available_models=available_models,
        default_model=available_models[0],
        supports_headless=True,    # opencode run
        supports_sandbox=False,
        supports_mcp=True,         # MCP servers supported via config
        max_context_tokens=200_000,
        reasoning_strength="high",
        best_for=["full-stack", "multi-provider", "open-source"],
        cost_tier="moderate",      # BYOK — depends on provider
    ), warnings
```

