### Step 5 — Manual verification protocol

```bash
# 1. Confirm Claude is rate-limited (either wait for it or use a burned key)
# 2. In providers.yaml, keep claude_standard.available=true
# 3. Run bernstein run
# 4. Expected log line:
#    "Rate-limit detected for provider=claude_standard; retrying with alternate provider"
# 5. Expected: second spawn uses gemini or codex adapter
# 6. Task completes via alternate provider
```

## Acceptance criteria

- [ ] `RateLimitError` is defined in `src/bernstein/core/spawner.py` (or `adapters/base.py`).
- [ ] All three adapters (Claude, Gemini, Codex) implement the 5-second eager probe.
- [ ] Unit test `test_spawn_fails_with_rate_limit_retries_alternate_adapter` passes.
- [ ] Log line `"Rate-limit detected for provider=..."` appears during failover.
- [ ] Janitor re-queues (not fails) rate-limited tasks.
- [ ] Manual test: disabling Claude in `providers.yaml` causes bernstein to use Gemini or
      Codex for subsequent tasks without crashing.

