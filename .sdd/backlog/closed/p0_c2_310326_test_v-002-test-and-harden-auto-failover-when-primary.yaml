## Problem

When Claude Code returns a rate-limit error the `AgentSpawner.spawn_for_tasks()` retry loop
is supposed to call `_router.select_provider_for_task()` and re-spawn with an alternate
provider (Gemini or Codex). This failover path has **never been exercised on real hardware**
and has a fundamental architectural gap: the retry loop only catches exceptions thrown
*synchronously during* the `subprocess.Popen()` call, but rate-limit failures surface
*asynchronously* — the process starts, exchanges tokens, and then exits with a non-zero
code seconds or minutes later.

This means that even though `spawn_for_tasks` has a retry loop, real-world rate limits
are invisible to it.

## Architecture diagram

```
spawn_for_tasks()
    └─ adapter.spawn()          ← Popen returns immediately; only OSError caught here
           └─ subprocess runs  ← Claude CLI starts, gets 429, exits code 1 ~2s later
                                  (too late for retry loop)

janitor.py (runs separately)
    └─ detects PID exit code 1  ← calls POST /tasks/{id}/fail
                                   but does NOT: re-queue task, update router health,
                                                 or trigger failover to another adapter
```

## Root causes to fix

### Issue A — Lazy failure detection is not fed back to the spawner

`ClaudeAdapter.spawn()` (and Gemini/Codex equivalents) return a `SpawnResult` with a live
PID. The spawner considers the spawn successful at this point. The janitor later detects the
process died, but:
1. Does not categorise the failure reason (rate limit vs bug vs timeout).
2. Does not mark the provider as temporarily unhealthy in the router.
3. Does not re-queue the task to `status=open` — it calls `/fail` and stops.

### Issue B — Eager 5-second probe is missing

For fast exits (rate limits typically surface within 1–3 seconds of starting Claude CLI)
there is no post-Popen wait with timeout. Adding one would catch the most common case.

## Fix

### Step 1 — Eager exit-code probe in all adapters

In `ClaudeAdapter.spawn()`, `GeminiAdapter.spawn()`, and `CodexAdapter.spawn()`, after
`subprocess.Popen()`:

```python
# Probe for fast exits (rate limits typically appear within 1–3 s)
try:
    exit_code = proc.wait(timeout=5.0)
except subprocess.TimeoutExpired:
    exit_code = None  # still running, good

if exit_code is not None and exit_code != 0:
    stderr_tail = _read_last_lines(log_path, n=10)
    if _is_rate_limit_error(stderr_tail):
        raise RateLimitError(
            f"Provider {self.name!r} rate-limited: {stderr_tail[-1]!r}"
        )
    raise SpawnError(f"Fast exit code={exit_code}: {stderr_tail[-1]!r}")
```

`_is_rate_limit_error()` matches strings: `"rate limit"`, `"usage limit"`, `"overloaded"`,
`"quota exceeded"`, `"429"`, `"Too Many Requests"`.

### Step 2 — `RateLimitError` triggers router failover in `spawn_for_tasks`

In `src/bernstein/core/spawner.py`, the retry loop already catches `Exception` and marks
the provider unavailable. Make `RateLimitError` a first-class exception so it can be
distinguished from generic failures:

```python
class RateLimitError(Exception):
    """Raised when an adapter detects the provider is rate-limited."""

# In spawn_for_tasks retry loop:
except RateLimitError as exc:
    logger.warning(
        "Rate-limit detected for provider=%s adapter=%s; retrying with alternate provider",
        provider_name, adapter_name,
    )
    # same path as generic spawn failure: mark provider unhealthy, re-select
    ...
```

### Step 3 — Janitor re-queues rate-limited tasks

In `src/bernstein/core/janitor.py`, when a task is about to be failed:

```python
if _is_rate_limit_log(session_log_tail):
    # Mark provider unhealthy
    if router:
        router.update_provider_health(session.provider, success=False)
    # Re-queue task instead of failing it
    client.post(f"/tasks/{task_id}/requeue")   # new endpoint, or reuse /fail + re-open
    logger.info("Rate-limited task %s re-queued; provider %s marked unhealthy",
                task_id, session.provider)
else:
    client.post(f"/tasks/{task_id}/fail", json={"reason": "agent_error"})
```

If `/requeue` endpoint doesn't exist yet, implement it in the task server: it sets
`status=open` and clears `claimed_by`.

