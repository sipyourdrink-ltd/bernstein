## Summary

Define a canonical set of safety-critical paths (for example `.sdd/`, `.git/`, and shell configuration locations) that always require human approval or explicit policy allow-listing, regardless of permissive permission modes or hook overrides that might otherwise bypass checks.

## Objective & Definition of Done

- [ ] Safety-critical path list is documented in code and enforced in guardrails.
- [ ] These checks cannot be skipped by bypass modes or hook-only overrides.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run targeted unit tests for `guardrails` after changes
- Manually verify a permissive mode still blocks or prompts on a listed critical path
