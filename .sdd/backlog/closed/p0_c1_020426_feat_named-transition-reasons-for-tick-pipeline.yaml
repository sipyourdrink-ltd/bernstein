## Summary

Add explicit named reason strings (for example `completed`, `aborted`, `prompt_too_long`, `max_turns`, and other exit paths) to tick pipeline state transitions so logs, metrics, and retries can be audited without inferring intent from generic status codes.

## Objective & Definition of Done

- [ ] Every major tick pipeline transition carries a stable, documented reason enum or string constant.
- [ ] Exit and retry paths in task lifecycle propagate the same reason for correlation in traces.
- [ ] Tests added proving the feature works
- [ ] Documentation updated if applicable

## Verification

- Run `uv run pytest tests/unit/test_tick_pipeline.py -x -q` (or nearest existing tests touching tick pipeline)
- Verify reason fields appear in structured logs during a short `bernstein run` dry scenario
