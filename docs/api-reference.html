<script>
  (function () {
    // Determine color scheme for Redoc theming
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var storedTheme = localStorage.getItem('theme');
    var isDark = storedTheme === 'dark' || (!storedTheme && prefersDark);

    var colors = isDark
      ? {
          primaryColor: '#7c3aed',
          backgroundColor: '#0f172a',
          textColor: '#e2e8f0',
          secondaryTextColor: '#94a3b8',
          headerBg: '#1e293b',
          borderColor: '#334155',
          codeBackground: '#1e293b',
          codeFontSize: '13px',
        }
      : {
          primaryColor: '#6d28d9',
          backgroundColor: '#ffffff',
          textColor: '#1e293b',
          secondaryTextColor: '#64748b',
          headerBg: '#f8fafc',
          borderColor: '#e2e8f0',
          codeBackground: '#f1f5f9',
          codeFontSize: '13px',
        };

    Redoc.init(
      'openapi.json',
      {
        theme: {
          colors: {
            primary: { main: colors.primaryColor },
            text: { primary: colors.textColor, secondary: colors.secondaryTextColor },
            border: { dark: colors.borderColor, light: colors.borderColor },
            http: {
              get: '#0369a1',
              post: '#15803d',
              put: '#b45309',
              delete: '#b91c1c',
              patch: '#7c3aed',
            },
          },
          schema: {
            nestedBackground: isDark ? '#162032' : '#f8fafc',
            typeNameColor: colors.primaryColor,
          },
          sidebar: {
            backgroundColor: isDark ? '#111827' : '#f8fafc',
            textColor: colors.textColor,
            activeTextColor: colors.primaryColor,
            width: '260px',
          },
          rightPanel: {
            backgroundColor: isDark ? '#0c1a2e' : '#1e293b',
            textColor: '#e2e8f0',
          },
          typography: {
            fontSize: '15px',
            lineHeight: '1.6',
            fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
            headings: {
              fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
            },
            code: {
              fontSize: colors.codeFontSize,
              fontFamily: '"SF Mono", "Fira Code", Consolas, "Liberation Mono", monospace',
              color: isDark ? '#a78bfa' : '#6d28d9',
              backgroundColor: colors.codeBackground,
            },
          },
        },
        scrollYOffset: 64,        // nav height
        hideDownloadButton: false,
        disableSearch: false,
        expandResponses: '200,201',
        pathInMiddlePanel: false,
        noAutoAuth: false,
        nativeScrollbars: false,
        requiredPropsFirst: true,
        sortPropsAlphabetically: false,
        showExtensions: false,
        hideSingleRequestSampleTab: false,
        jsonSampleExpandLevel: 2,
        enumSkipQuotes: false,
      },
      document.getElementById('redoc-container'),
      function () {
        // Redoc loaded — sync with site theme toggle
        document.addEventListener('themeChange', function (e) {
          // Reload page to re-init Redoc with new theme colors
          // (Redoc doesn't support runtime theme switching)
          location.reload();
        });
      }
    );
  })();
</script>
