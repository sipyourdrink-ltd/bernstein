name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect vs what actually happened?
      placeholder: "I ran `bernstein conduct --goal '...'` and got..."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, bernstein version, which CLI agents you use
      value: |
        - OS:
        - Python:
        - Bernstein:
        - Agent CLI: Claude Code / Codex / Gemini CLI / Other
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs from `bernstein notes` or `.sdd/runtime/`
      render: shell
    validations:
      required: false
