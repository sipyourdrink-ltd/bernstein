name: Feature Request
description: Suggest an idea
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's frustrating today?
      placeholder: "When I try to ... I have to ..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? CLI examples welcome.
      placeholder: "`bernstein conduct --parallel 4 --goal '...'`"
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Orchestration
        - Agent adapters (Claude/Codex/Gemini/Qwen)
        - CLI / UX
        - Self-evolution
        - Verification / Janitor
        - Documentation
        - Other
    validations:
      required: true
