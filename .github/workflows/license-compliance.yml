name: License Compliance

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "requirements*.txt"
  pull_request:
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "requirements*.txt"

concurrency:
  group: license-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  license-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Export dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip freeze > requirements-all.txt

      - name: Check licenses
        id: license_check_report
        uses: pilosus/action-pip-license-checker@e909b0226ff49d3235c99c4585bc617f49fff16a # v3
        with:
          requirements: "requirements-all.txt"
          report-format: "json-pretty"
          fail: "StrongCopyleft,NetworkCopyleft,Other,Error"

      - name: Save report
        if: always()
        run: echo '${{ steps.license_check_report.outputs.report }}' > license-report.json

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: license-report
          path: license-report.json
