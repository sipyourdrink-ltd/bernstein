name: AI PR Review (GitHub Models)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  models: read

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ai-review:
    name: AI triage review
    runs-on: ubuntu-latest
    if: >
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ai')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          DIFF=$(git diff --unified=3 origin/${{ github.base_ref }}...HEAD | head -c 50000)
          echo "diff<<DIFF_EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "DIFF_EOF" >> "$GITHUB_OUTPUT"

      - name: Analyze with GitHub Models
        id: ai
        uses: actions/ai-inference@v2
        with:
          model: openai/gpt-4o-mini
          system-prompt: >-
            You are a senior Python library maintainer reviewing a pull request
            for Bernstein, a multi-agent CLI orchestrator (Python 3.12+).
            Review the diff for correctness, API stability, and security.
            Respond with concise markdown: Summary (2-3 sentences), Risk
            Assessment (low/medium/high with justification), and Actionable
            Recommendations (bullet list, max 5 items).
          prompt: |
            PR #${{ github.event.pull_request.number }}: "${{ github.event.pull_request.title }}"

            ```diff
            ${{ steps.diff.outputs.diff }}
            ```

      - name: Post review comment
        uses: actions/github-script@v7
        env:
          AI_RESPONSE: ${{ steps.ai.outputs.response }}
        with:
          script: |
            const marker = '<!-- ai-review-gh-models -->';
            const response = process.env.AI_RESPONSE || '(no response)';
            const body = marker + '\n### AI Review (GitHub Models)\n\n' + response;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
