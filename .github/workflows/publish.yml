name: Publish

on:
  push:
    tags:
      - "v*"

# Permissions are declared per-job so that each job gets only what it
# needs (Sonar S8264). The default permission for any job that does not
# declare ``permissions:`` is an empty set.
permissions: {}

jobs:
  # Protocol compatibility gate — blocks release if breaking changes found
  protocol-gate:
    name: Protocol Compatibility Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true

      - name: Run protocol compatibility check
        run: |
          # Install test dependencies
          uv pip install mcp a2a || true

          # Run protocol tests
          uv run pytest tests/protocol/ -v 2>&1 | tee test-output.log || true

          # Generate results
          python << 'EOF'
          import json
          import subprocess

          results = []
          test_output = open('test-output.log').read()

          # Simplified: mark as pass/fail based on pytest output
          status = "pass" if "FAILED" not in test_output else "fail"

          result = {
            "python": "3.12",
            "mcp": "1.0",
            "a2a": "0.2",
            "status": status
          }
          results.append(result)

          compat_data = {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "release": "${{ github.ref_name }}",
            "results": results
          }

          with open('release-compat-results.json', 'w') as f:
              json.dump(compat_data, f, indent=2)
          EOF

      - name: Check against baseline
        run: |
          python scripts/check_compatibility.py \
            --current-results release-compat-results.json \
            --baseline tests/protocol/compatibility-baseline.json 2>&1 | tee gate-check.log

      - name: Gate decision
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if grep -q "ACKNOWLEDGE_BREAKING_CHANGES" <<< "$COMMIT_MSG"; then
            echo "✅ Operator acknowledged breaking changes"
            exit 0
          fi

          if grep -q '"breaking_changes": \[\]' gate-check.log; then
            echo "✅ Gate passed — no breaking changes detected"
            exit 0
          else
            echo "❌ Release blocked — breaking changes detected"
            echo "To proceed: include 'ACKNOWLEDGE_BREAKING_CHANGES' in commit message"
            exit 1
          fi

  # Safety: run tests before publishing even on manual tag push
  test:
    name: Verify tests pass
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true
      - run: uv run ruff check src/
      - run: uv run pyright
      - run: uv run python scripts/run_tests.py -x

  version-check:
    name: Verify tag matches pyproject.toml
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Compare tag to pyproject.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version:    $TAG"
          echo "Package version: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match pyproject.toml version $PKG"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, protocol-gate, version-check]
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true
      - run: uv build
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    environment:
      name: pypi
      url: https://pypi.org/p/bernstein
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --generate-notes \
            || echo "Release already exists"

  publish-npm:
    name: Publish npm wrapper
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cd packaging/npm
          npm version "$VERSION" --no-git-tag-version
      - name: Publish to npm
        # continue-on-error: npm token may be expired or package may already exist
        continue-on-error: true
        run: cd packaging/npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # COPR RPM rebuild — triggers a new build from the updated PyPI release.
  trigger-copr:
    name: Trigger COPR rebuild
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Trigger COPR build
        run: |
          pip install copr-cli
          mkdir -p ~/.config
          cat > ~/.config/copr << EOF
          [copr-cli]
          login = ${{ secrets.COPR_LOGIN }}
          username = alexchernysh
          token = ${{ secrets.COPR_TOKEN }}
          copr_url = https://copr.fedorainfracloud.org
          EOF
          copr-cli buildpypi --packagename bernstein alexchernysh/bernstein --nowait
