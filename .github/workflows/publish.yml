name: Publish

on:
  push:
    tags:
      - "v*"

# Permissions are declared per-job so that each job gets only what it
# needs (Sonar S8264). The default permission for any job that does not
# declare ``permissions:`` is an empty set.
permissions: {}

jobs:
  # Protocol compatibility gate — blocks release if breaking changes found
  protocol-gate:
    name: Protocol Compatibility Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true

      - name: Run protocol compatibility check
        run: |
          # Install test dependencies
          uv pip install mcp a2a || true

          # Run protocol tests
          uv run pytest tests/protocol/ -v 2>&1 | tee test-output.log || true

          # Generate results
          python << 'EOF'
          import json
          import subprocess

          results = []
          test_output = open('test-output.log').read()

          # Simplified: mark as pass/fail based on pytest output
          status = "pass" if "FAILED" not in test_output else "fail"

          result = {
            "python": "3.12",
            "mcp": "1.0",
            "a2a": "0.2",
            "status": status
          }
          results.append(result)

          compat_data = {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "release": "${{ github.ref_name }}",
            "results": results
          }

          with open('release-compat-results.json', 'w') as f:
              json.dump(compat_data, f, indent=2)
          EOF

      - name: Check against baseline
        run: |
          python scripts/check_compatibility.py \
            --current-results release-compat-results.json \
            --baseline tests/protocol/compatibility-baseline.json 2>&1 | tee gate-check.log

      - name: Gate decision
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if grep -q "ACKNOWLEDGE_BREAKING_CHANGES" <<< "$COMMIT_MSG"; then
            echo "✅ Operator acknowledged breaking changes"
            exit 0
          fi

          if grep -q '"breaking_changes": \[\]' gate-check.log; then
            echo "✅ Gate passed — no breaking changes detected"
            exit 0
          else
            echo "❌ Release blocked — breaking changes detected"
            echo "To proceed: include 'ACKNOWLEDGE_BREAKING_CHANGES' in commit message"
            exit 1
          fi

  # Safety: run tests before publishing even on manual tag push
  test:
    name: Verify tests pass
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true
      - name: Quick lint check (full tests already passed in CI)
        run: uv run ruff check src/

  version-check:
    name: Verify tag matches pyproject.toml
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Compare tag to pyproject.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version:    $TAG"
          echo "Package version: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match pyproject.toml version $PKG"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, protocol-gate, version-check]
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true
      - run: uv build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    environment:
      name: pypi
      url: https://pypi.org/p/bernstein
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --generate-notes \
            || echo "Release already exists"

  publish-npm:
    name: Publish npm wrapper
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cd packaging/npm
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      # Absorb npm-publish failures so they don't fail the tag-triggered
      # publish workflow (matching the behaviour in auto-release.yml).
      # NPM_TOKEN currently lacks publish rights for bernstein-orchestrator
      # after the sipyourdrink-ltd repo transfer; until a fresh token is
      # provisioned, the npm wrapper stays at its last successful version
      # while PyPI / GHCR / GitHub Release continue shipping.
      - name: Publish to npm
        continue-on-error: true
        env:
          # packaging/npm/.npmrc uses ${NPM_TOKEN} for interpolation, so
          # both variables must be set. NODE_AUTH_TOKEN is kept for
          # compatibility with actions/setup-node's default config.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packaging/npm
          if ! npm publish --access public; then
            echo "::warning::npm publish failed — continuing release. Likely cause: NPM_TOKEN needs to be re-issued with publish rights for bernstein-orchestrator."
          fi

  # COPR RPM rebuild — triggers a new build from the updated PyPI release.
  trigger-copr:
    name: Trigger COPR rebuild
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Trigger COPR build
        run: |
          pip install copr-cli
          mkdir -p ~/.config
          cat > ~/.config/copr << EOF
          [copr-cli]
          login = ${{ secrets.COPR_LOGIN }}
          username = alexchernysh
          token = ${{ secrets.COPR_TOKEN }}
          copr_url = https://copr.fedorainfracloud.org
          EOF
          copr-cli buildpypi --packagename bernstein alexchernysh/bernstein --nowait
