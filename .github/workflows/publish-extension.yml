name: Publish VS Code Extension

on:
  release:
    types: [published]
  push:
    tags:
      - 'ext-v*'   # trigger: git tag ext-v0.1.0 && git push --tags

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      VS_MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}
      OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/vscode/package-lock.json

      - name: Validate extension icon (>= 128x128)
        run: |
          node -e "
          const fs = require('fs');
          const buf = fs.readFileSync('packages/vscode/media/bernstein-icon.png');
          if (buf[0] !== 0x89 || buf[1] !== 0x50 || buf[2] !== 0x4E || buf[3] !== 0x47) {
            console.error('ERROR: media/bernstein-icon.png is not a valid PNG file');
            process.exit(1);
          }
          const width = buf.readUInt32BE(16);
          const height = buf.readUInt32BE(20);
          console.log('Icon dimensions: ' + width + 'x' + height);
          if (width < 128 || height < 128) {
            console.error('ERROR: Icon must be at least 128x128 pixels (got ' + width + 'x' + height + ')');
            process.exit(1);
          }
          console.log('Icon validation passed.');
          "

      - name: Install dependencies
        working-directory: packages/vscode
        run: npm ci

      - name: Type check
        working-directory: packages/vscode
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: packages/vscode
        run: npm test

      - name: Build extension
        working-directory: packages/vscode
        run: npm run compile

      - name: Package extension
        working-directory: packages/vscode
        run: npx vsce package --no-dependencies

      - name: Find VSIX file
        id: vsix
        run: echo "path=$(ls packages/vscode/*.vsix)" >> "$GITHUB_OUTPUT"

      # Publish to VS Code Marketplace (requires VS_MARKETPLACE_TOKEN secret)
      # continue-on-error: version may already exist if re-running for same tag
      - name: Publish to VS Code Marketplace
        if: env.VS_MARKETPLACE_TOKEN != ''
        continue-on-error: true
        uses: HaaLeo/publish-vscode-extension@ca5561daa085dee804bf9f37fe0165785a9b14db # v2
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ steps.vsix.outputs.path }}

      # Publish to Open VSX — used by Cursor, VSCodium, Gitpod (requires OPEN_VSX_TOKEN secret)
      # continue-on-error: version may already exist if re-running for same tag
      - name: Publish to Open VSX
        if: env.OPEN_VSX_TOKEN != ''
        continue-on-error: true
        uses: HaaLeo/publish-vscode-extension@ca5561daa085dee804bf9f37fe0165785a9b14db # v2
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          registryUrl: https://open-vsx.org
          extensionFile: ${{ steps.vsix.outputs.path }}

      # VSIX is published to VS Code Marketplace and Open VSX above.
      # No GitHub Release — avoids cluttering the main release list.
