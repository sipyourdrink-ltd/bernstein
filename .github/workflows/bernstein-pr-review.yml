name: "Bernstein PR Review"

# Trigger: automatically review every non-draft pull request.
# Add the label "skip-bernstein" to a PR to opt out.
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

concurrency:
  group: bernstein-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review with Bernstein
    runs-on: ubuntu-latest
    if: >
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.labels.*.name, 'skip-bernstein')
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Check API key
        id: check
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Bernstein review — no ANTHROPIC_API_KEY secret"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.skip != 'true'
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Review PR
        if: steps.check.outputs.skip != 'true'
        continue-on-error: true
        uses: ./
        with:
          task: >
            Review pull request #${{ github.event.pull_request.number }}
            titled "${{ github.event.pull_request.title }}".
            Check code quality, run the test suite, verify type correctness, and
            identify any security or correctness issues. Summarise your findings
            and post them as a PR comment. Do not push any changes.
          budget: "3.00"
          post-comment: "true"
