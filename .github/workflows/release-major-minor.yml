name: Major/Minor Release

# Manual trigger for significant releases (x.0.0 or x.y.0)
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - minor
          - major
      changelog:
        description: "Release highlights (markdown)"
        required: true
        type: string
      dry_run:
        description: "Dry run (don't publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: "${{ inputs.bump }} release"
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bernstein
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      # Read and bump version
      - name: Bump version
        id: bump
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR _PATCH <<< "$VERSION"

          if [ "${{ inputs.bump }}" = "major" ]; then
            NEW="$((MAJOR + 1)).0.0"
          else
            NEW="${MAJOR}.$((MINOR + 1)).0"
          fi

          {
            echo "old=$VERSION"
            echo "new=$NEW"
          } >> "$GITHUB_OUTPUT"
          echo "Bumping $VERSION → $NEW (${{ inputs.bump }})"

      # Verify CI passed on current commit
      - name: Verify CI green
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/status --jq '.state')
          if [ "$STATUS" != "success" ]; then
            echo "::error::CI is not green (status: $STATUS). Fix CI before releasing."
            exit 1
          fi

      # Run tests as safety check
      - name: Run tests
        run: uv run python scripts/run_tests.py -x

      # Apply version bump
      - name: Update pyproject.toml
        if: inputs.dry_run == false
        run: |
          sed -i "s/^version = \"${{ steps.bump.outputs.old }}\"/version = \"${{ steps.bump.outputs.new }}\"/" pyproject.toml

      # Generate changelog section
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline "$PREV_TAG"..HEAD | head -30)
          else
            COMMITS=$(git log --oneline -20)
          fi
          {
            echo "commits<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Commit, tag, build, publish
      - name: Commit and tag
        if: inputs.dry_run == false
        run: |
          git config user.name "bernstein[bot]"
          git config user.email "bernstein-bot@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "release: v${{ steps.bump.outputs.new }}"
          git tag "v${{ steps.bump.outputs.new }}"
          git push
          git push origin "v${{ steps.bump.outputs.new }}"

      - name: Build
        run: uv build

      - name: Publish to PyPI
        if: inputs.dry_run == false
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

      - name: GitHub Release
        if: inputs.dry_run == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.bump.outputs.new }}
          OLD_VERSION: ${{ steps.bump.outputs.old }}
          CHANGELOG: ${{ inputs.changelog }}
          COMMITS: ${{ steps.changelog.outputs.commits }}
        run: |
          gh release create "v${RELEASE_VERSION}" dist/* \
            --title "v${RELEASE_VERSION}" \
            --notes "$(cat <<NOTES
          ## Bernstein v${RELEASE_VERSION}

          ${CHANGELOG}

          ### Changes since v${OLD_VERSION}

          ${COMMITS}

          ---
          Full changelog: https://github.com/${{ github.repository }}/compare/v${OLD_VERSION}...v${RELEASE_VERSION}
          NOTES
          )"

      - name: Dry run summary
        if: inputs.dry_run == true
        env:
          BUMP_TYPE: ${{ inputs.bump }}
          OLD_VERSION: ${{ steps.bump.outputs.old }}
          NEW_VERSION: ${{ steps.bump.outputs.new }}
          CHANGELOG: ${{ inputs.changelog }}
          COMMITS: ${{ steps.changelog.outputs.commits }}
        run: |
          {
            echo "## Dry Run Summary"
            echo "- **Bump**: $BUMP_TYPE"
            echo "- **Version**: $OLD_VERSION → $NEW_VERSION"
            echo "- **Changelog**: $CHANGELOG"
            echo "- **Commits since last tag**:"
            echo '```'
            echo "$COMMITS"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
