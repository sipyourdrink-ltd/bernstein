name: Yank PyPI release

# Manually yank a broken release from PyPI.  Uses the PYPI_API_TOKEN secret.
# PyPI's API tokens are documented as upload-only; this workflow probes the
# Warehouse management endpoint and logs the response so we know whether
# token auth covers yank or whether the web UI is still the only way.
on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to yank (e.g. 1.8.9)
        required: true
        type: string
      reason:
        description: Yank reason (shown on PyPI)
        required: true
        type: string

permissions: {}

jobs:
  yank:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Call PyPI yank endpoint
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
          REASON: ${{ github.event.inputs.reason }}
        run: |
          set -euo pipefail
          echo "Attempting yank of bernstein==$VERSION"
          STATUS=$(curl -sS -o /tmp/response.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: token $PYPI_TOKEN" \
            -F "yanked=on" \
            -F "yanked_reason=$REASON" \
            "https://pypi.org/manage/project/bernstein/release/$VERSION/" || true)
          echo "HTTP status: $STATUS"
          echo "---response body (first 500 chars)---"
          head -c 500 /tmp/response.txt
          echo
          echo "---end---"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "303" ]; then
            echo "yank likely succeeded"
          else
            echo "yank did not succeed via API token — this is expected; use the PyPI web UI"
            echo "Direct link: https://pypi.org/manage/project/bernstein/release/$VERSION/"
            exit 1
          fi
