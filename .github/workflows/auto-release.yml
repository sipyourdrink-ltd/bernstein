name: Auto-release

# Triggers after CI passes on main — bumps patch version and publishes
# Only releases when meaningful source/test/template files changed.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: auto-release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions: {}

jobs:
  gate:
    name: Release gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
    steps:
      - name: Check for meaningful changes
        id: decide
        run: |
          # Skip bot commits (prevents release loop)
          AUTHOR=$(gh api repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }} \
            --jq '.author.login // ""')
          if [ "$AUTHOR" = "bernstein-orchestrator[bot]" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: bot commit"
            exit 0
          fi

          # Find latest release tag
          PREV_TAG=$(gh api repos/${{ github.repository }}/releases/latest \
            --jq '.tag_name' 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "No previous release — proceeding"
            exit 0
          fi

          # Count changed files that matter for a release:
          #   src/         — Python source code
          #   tests/       — test suite
          #   templates/   — role/prompt templates
          #   scripts/     — build/test scripts
          #   packaging/   — npm/docker packaging
          #   infra/       — infrastructure configs
          #   sdk/         — SDK code
          #   services/    — service code
          #   Dockerfile*  — container builds
          #   requirements*— dependency pins
          #   pyproject.toml — version, deps, config
          CHANGED=$(gh api "repos/${{ github.repository }}/compare/${PREV_TAG}...${{ github.event.workflow_run.head_sha }}" \
            --jq '[.files[].filename | select(
              test("^src/") or
              test("^tests/") or
              test("^templates/") or
              test("^scripts/") or
              test("^packaging/") or
              test("^infra/") or
              test("^sdk/") or
              test("^services/") or
              test("^Dockerfile") or
              test("^requirements") or
              test("^pyproject\\.toml$")
            )] | length')

          echo "Meaningful files changed since $PREV_TAG: ${CHANGED:-0}"
          if [ "${CHANGED:-0}" = "0" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No source/test/template changes — skipping release"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  release:
    name: Patch release
    needs: gate
    if: needs.gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    environment:
      name: pypi
      url: https://pypi.org/p/bernstein
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: 3262738
          private-key: ${{ secrets.BERNSTEIN_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true

      # Read current version
      - name: Get version
        id: ver
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "current=$VERSION" >> "$GITHUB_OUTPUT"

      # Skip if this version is already tagged
      - name: Check tag
        id: check
        run: |
          if git tag -l "v${{ steps.ver.outputs.current }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Only bump if tag already exists (means this is a new CI pass on same version)
      - name: Bump patch
        if: steps.check.outputs.exists == 'true'
        id: bump
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.ver.outputs.current }}"
          NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version = \"${{ steps.ver.outputs.current }}\"/version = \"${NEW}\"/" pyproject.toml
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          git config user.name "bernstein-orchestrator[bot]"
          git config user.email "3262738+bernstein-orchestrator[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: auto-bump to v${NEW}"
          git push

      # Final version (bumped or current)
      - name: Set version
        id: final
        run: |
          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            echo "version=${{ steps.bump.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.ver.outputs.current }}" >> "$GITHUB_OUTPUT"
          fi

      # Tag + build + publish
      - name: Tag
        run: |
          git tag "v${{ steps.final.outputs.version }}"
          git push origin "v${{ steps.final.outputs.version }}"

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          attestations: true

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Build notes from recent commit messages since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --oneline "$PREV_TAG"..HEAD | head -10)
          else
            NOTES=$(git log --oneline -5)
          fi
          gh release create "v${{ steps.final.outputs.version }}" dist/* \
            --title "v${{ steps.final.outputs.version }}" \
            --notes "Patch release. Changes since previous version:

          $NOTES"

      # --- npm wrapper ---
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish npm wrapper
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packaging/npm
          npm version "${{ steps.final.outputs.version }}" --no-git-tag-version
          npm publish --access public

      # --- Docker / OCI ---
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build and push Docker image
        continue-on-error: true
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/chernistry/bernstein:latest
            ghcr.io/chernistry/bernstein:${{ steps.final.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
