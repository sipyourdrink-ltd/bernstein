name: Auto-release

# Triggers after CI passes on main — bumps patch version and publishes
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: auto-release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Patch release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: pypi
      url: https://pypi.org/p/bernstein
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: 3262738
          private-key: ${{ secrets.BERNSTEIN_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      # Read current version
      - name: Get version
        id: ver
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "current=$VERSION" >> "$GITHUB_OUTPUT"

      # Skip if this version is already tagged
      - name: Check tag
        id: check
        run: |
          if git tag -l "v${{ steps.ver.outputs.current }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Only bump if tag already exists (means this is a new CI pass on same version)
      - name: Bump patch
        if: steps.check.outputs.exists == 'true'
        id: bump
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.ver.outputs.current }}"
          NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version = \"${{ steps.ver.outputs.current }}\"/version = \"${NEW}\"/" pyproject.toml
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          git config user.name "bernstein-orchestrator[bot]"
          git config user.email "3262738+bernstein-orchestrator[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: auto-bump to v${NEW}"
          git push

      # Final version (bumped or current)
      - name: Set version
        id: final
        run: |
          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            echo "version=${{ steps.bump.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.ver.outputs.current }}" >> "$GITHUB_OUTPUT"
          fi

      # Tag + build + publish
      - name: Tag
        run: |
          git tag "v${{ steps.final.outputs.version }}"
          git push origin "v${{ steps.final.outputs.version }}"

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Build notes from recent commit messages since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --oneline "$PREV_TAG"..HEAD | head -10)
          else
            NOTES=$(git log --oneline -5)
          fi
          gh release create "v${{ steps.final.outputs.version }}" dist/* \
            --title "v${{ steps.final.outputs.version }}" \
            --notes "Patch release. Changes since previous version:

          $NOTES"

      # --- npm wrapper ---
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish npm wrapper
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packaging/npm
          npm version "${{ steps.final.outputs.version }}" --no-git-tag-version
          npm publish --access public

      # --- Docker / OCI ---
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build and push Docker image
        continue-on-error: true
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/chernistry/bernstein:latest
            ghcr.io/chernistry/bernstein:${{ steps.final.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
