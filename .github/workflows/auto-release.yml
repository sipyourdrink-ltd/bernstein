name: Auto-release

# Triggers after CI passes on main — bumps patch version and publishes
# Only releases when meaningful source/test/template files changed.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: auto-release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions: {}

jobs:
  gate:
    name: Release gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
    steps:
      - name: Check for meaningful changes
        id: decide
        run: |
          # Skip bot commits (prevents release loop)
          AUTHOR=$(gh api repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }} \
            --jq '.author.login // ""')
          if [ "$AUTHOR" = "bernstein-orchestrator[bot]" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: bot commit"
            exit 0
          fi

          # Find latest release tag
          PREV_TAG=$(gh api repos/${{ github.repository }}/releases/latest \
            --jq '.tag_name' 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "No previous release — proceeding"
            exit 0
          fi

          # Count changed files that matter for a release:
          #   src/         — Python source code
          #   tests/       — test suite
          #   templates/   — role/prompt templates
          #   scripts/     — build/test scripts
          #   packaging/   — npm/docker packaging
          #   infra/       — infrastructure configs
          #   sdk/         — SDK code
          #   services/    — service code
          #   Dockerfile*  — container builds
          #   requirements*— dependency pins
          #   pyproject.toml — version, deps, config
          CHANGED=$(gh api "repos/${{ github.repository }}/compare/${PREV_TAG}...${{ github.event.workflow_run.head_sha }}" \
            --jq '[.files[].filename | select(
              test("^src/") or
              test("^tests/") or
              test("^templates/") or
              test("^scripts/") or
              test("^packaging/") or
              test("^infra/") or
              test("^sdk/") or
              test("^services/") or
              test("^Dockerfile") or
              test("^requirements") or
              test("^pyproject\\.toml$")
            )] | length')

          echo "Meaningful files changed since $PREV_TAG: ${CHANGED:-0}"
          if [ "${CHANGED:-0}" = "0" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No source/test/template changes — skipping release"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  release:
    name: Patch release
    needs: gate
    if: needs.gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true

      # Read current version
      - name: Get version
        id: ver
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "current=$VERSION" >> "$GITHUB_OUTPUT"

      # Skip if this version is already tagged
      - name: Check tag
        id: check
        run: |
          if git tag -l "v${{ steps.ver.outputs.current }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Only bump if tag already exists (means this is a new CI pass on same version)
      - name: Bump patch
        if: steps.check.outputs.exists == 'true'
        id: bump
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.ver.outputs.current }}"
          NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version = \"${{ steps.ver.outputs.current }}\"/version = \"${NEW}\"/" pyproject.toml
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: auto-bump to v${NEW}"
          git push

      # Final version (bumped or current)
      - name: Set version
        id: final
        run: |
          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            echo "version=${{ steps.bump.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.ver.outputs.current }}" >> "$GITHUB_OUTPUT"
          fi

      # Tag + build + publish
      - name: Tag
        run: |
          git tag "v${{ steps.final.outputs.version }}"
          git push origin "v${{ steps.final.outputs.version }}"

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.final.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          # Delete any pre-existing *draft* release with the same tag
          # (release-drafter often has one queued). Skip if it's a real
          # published release — never touch cleanup-tag on a real tag.
          IS_DRAFT=$(gh release view "v${VERSION}" --json isDraft --jq '.isDraft' 2>/dev/null || echo "none")
          if [ "$IS_DRAFT" = "true" ]; then
            gh release delete "v${VERSION}" --yes
          fi

          # Build human-readable notes from conventional-commit messages
          # since the previous release tag. Commits are grouped by prefix
          # (feat/fix/refactor/perf/docs/ci/chore/test); their subject
          # lines — not raw hashes — become bullet points.
          PREV_TAG=$(git describe --tags --abbrev=0 "HEAD^" 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --no-merges --pretty='%s' -20 > /tmp/commits.txt
          else
            git log --no-merges --pretty='%s' "${PREV_TAG}..HEAD" > /tmp/commits.txt
          fi

          python3 scripts/format_release_notes.py \
            --version "$VERSION" \
            --prev-tag "$PREV_TAG" \
            --repo "$REPO" \
            --commits /tmp/commits.txt \
            > RELEASE_NOTES.md

          gh release create "v${VERSION}" dist/* \
            --title "v${VERSION}" \
            --notes-file RELEASE_NOTES.md

      # --- npm wrapper ---
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish npm wrapper
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packaging/npm
          npm version "${{ steps.final.outputs.version }}" --no-git-tag-version
          npm publish --access public

      # --- Docker / OCI ---
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build and push Docker image
        continue-on-error: true
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.final.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
